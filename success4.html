<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 확인 중...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">데이터 확인 중... (F12 콘솔 확인)</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
            authDomain: "ecogr-636c6.firebaseapp.com",
            projectId: "ecogr-636c6",
            storageBucket: "ecogr-636c6.firebasestorage.app",
            messagingSenderId: "95745358447",
            appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function debugPayment() {
            const statusText = document.getElementById("status-text");
            const price = new URLSearchParams(window.location.search).get('price');

            if (!price) {
                statusText.innerText = "URL에 price 파라미터가 없음!";
                return;
            }

            try {
                console.log("--- 디버깅 시작 ---");
                console.log("URL에서 받아온 가격:", price);

                // 1. 컬렉션 전체 데이터를 가져와서 확인
                const q = query(collection(db, "boards"), where("status", "==", "대기"));
                const querySnapshot = await getDocs(q);

                console.log("대기 상태인 문서 개수:", querySnapshot.size);

                let found = false;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    console.log("문서 ID:", doc.id, "| DB 저장 가격:", data.price, "| 타입:", typeof data.price);
                    
                    if (String(data.price) === String(price)) {
                        found = true;
                        updateDoc(doc.ref, { status: "카드결제" });
                        console.log(">> 일치하는 문서 발견! 업데이트 성공!");
                    }
                });

                if (found) {
                    statusText.innerText = "결제 완료! 창을 닫습니다.";
                    setTimeout(() => window.close(), 1500);
                } else {
                    statusText.innerText = "일치하는 주문 없음 (콘솔 확인)";
                }

            } catch (err) {
                console.error("에러 발생:", err);
                statusText.innerText = "에러: " + err.message;
            }
        }

        debugPayment();
    </script>
</body>
</html>
