<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50">
    <div class="p-8 bg-white rounded-xl shadow-lg text-center">
        <h2 class="text-2xl font-bold text-green-600">결제 및 전표 발행 완료!</h2>
        <p class="text-gray-500 mt-2">잠시 후 자동으로 창이 닫힙니다.</p>
    </div>
    <script>
        // 2초 뒤 창 닫기
        setTimeout(() => { window.close(); }, 2000);
    </script>
</body>
</html>
