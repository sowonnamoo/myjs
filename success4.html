<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center">

    <div class="text-center text-white">
        <div class="mb-6 animate-bounce">
            <svg class="w-20 h-20 mx-auto text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 id="status-text" class="text-3xl font-bold">결제 정보를 처리 중입니다...</h1>
        <p class="mt-4 text-blue-200">잠시만 기다려주세요.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // 결제 페이지와 동일한 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
            authDomain: "ecogr-636c6.firebaseapp.com",
            projectId: "ecogr-636c6",
            storageBucket: "ecogr-636c6.firebasestorage.app",
            messagingSenderId: "95745358447",
            appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processPaymentStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const price = urlParams.get('price'); // URL에서 가격만 딱 뽑음
            const statusText = document.getElementById("status-text");

            if (!price) {
                statusText.innerText = "결제 정보 오류";
                return;
            }

            try {
                // '대기' 상태이면서 가격이 일치하는 문서 찾기
                const q = query(collection(db, "boards"), where("status", "==", "대기"));
                const querySnapshot = await getDocs(q);

                let found = false;
                for (const doc of querySnapshot.docs) {
                    if (String(doc.data().price) === String(price)) {
                        await updateDoc(doc.ref, { status: "카드결제" });
                        found = true;
                        break;
                    }
                }

                if (found) {
                    statusText.innerText = "결제가 완료되었습니다";
                    // 부모창(게시판) 새로고침
                    if (window.opener) window.opener.location.reload();
                    setTimeout(() => window.close(), 2000);
                } else {
                    statusText.innerText = "일치하는 주문을 찾을 수 없습니다";
                }
            } catch (err) {
                console.error(err);
                statusText.innerText = "처리 중 오류 발생";
            }
        }

        processPaymentStatus();
    </script>
</body>
</html>
