<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료 | 감사드립니다</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        
        .check-anim {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md check-anim">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            
            <div class="bg-blue-900 pt-12 pb-8 text-center text-white">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-500 rounded-full mb-4 shadow-lg shadow-green-500/30">
                    <i class="fa-solid fa-check text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold">결제가 완료되었습니다</h1>
                <p class="text-blue-200 mt-2 text-sm">소중한 주문 진심으로 감사드립니다.</p>
            </div>

            <div class="p-8">
                <div class="space-y-4">
                    <div class="flex justify-between items-center pb-4 border-b border-gray-50">
                        <span class="text-gray-400 text-sm">결제 금액</span>
                        <span id="display-amount" class="text-xl font-bold text-gray-800">0원</span>
                    </div>
                    
                    <div class="space-y-3 pt-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">주문 번호</span>
                            <span id="display-order-id" class="text-gray-600 font-medium">-</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">결제 일시</span>
                            <span id="display-date" class="text-gray-600">-</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">결제 상태</span>
                            <span class="text-green-600 font-semibold bg-green-50 px-2 py-0.5 rounded text-xs">결제성공</span>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button onclick="window.close()" class="w-full py-4 bg-gray-900 text-white font-bold rounded-xl hover:bg-black transition">
                        닫기
                    </button>
                </div>
            </div>
            
            <div class="bg-gray-50 p-4 text-center">
                <p class="text-xs text-gray-400">결제 취소 및 환불 안내는 고객센터로 문의 바랍니다.</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('paymentId');
        const total = Number(localStorage.getItem("totalAmount")) || 0;

        document.getElementById("display-amount").innerText = total.toLocaleString() + "원";
        document.getElementById("display-order-id").innerText = paymentId || "-";
        
        const now = new Date();
        const dateStr = now.getFullYear() + '.' + (now.getMonth() + 1) + '.' + now.getDate() + ' ' + now.getHours() + ':' + now.getMinutes();
        document.getElementById("display-date").innerText = dateStr;
    </script>
</body>
</html>
