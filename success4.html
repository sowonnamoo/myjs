<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold text-blue-900">결제 완료!</h2>
        <p class="text-gray-600 mt-4">전표가 생성되었습니다.</p>
        
        <a id="bill-btn" href="#" target="_blank" class="block mt-6 w-full py-3 bg-green-600 text-white font-bold rounded hover:bg-green-500 transition">
            전표 출력하기
        </a>
    </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const tno = params.get('tno');        // 포트원에서 받은 txId
    const order_no = params.get('order_no'); // paymentId
    const price = params.get('price');

    if(tno && order_no && price) {
        // 사장님이 방금 보여주신 파라미터명에 맞춰서 다시 조합했습니다!
        const billUrl = `https://partner.kcp.co.kr/bill/card?cmd=card_bill&C_TRADE_NO=${tno}&ORDER_NO=${order_no}&TRADE_MONY=${price}&lang=ko`;
        
        document.getElementById("bill-btn").href = billUrl;
    } else {
        alert("전표 정보를 불러올 수 없습니다. 파라미터 오류입니다.");
    }

    // 5초 대기 후 버튼 표시 (서버 동기화 시간 확보)
    setTimeout(() => {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("bill-btn").classList.remove("hidden");
    }, 5000); 
</script>
</body>
</html>
