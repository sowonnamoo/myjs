<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-blue-900 pt-12 pb-8 text-center text-white">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-500 rounded-full mb-4 shadow-lg shadow-green-500/30">
                    <i class="fa-solid fa-check text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold">결제가 완료되었습니다</h1>
            </div>

            <div class="p-8">
                <div class="space-y-4">
                    <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                        <span class="text-gray-400 text-sm">결제 금액</span>
                        <span id="display-amount" class="text-2xl font-bold text-gray-800">0원</span>
                    </div>
                    
                    <div class="pt-2">
                        <div class="flex justify-between text-sm py-2">
                            <span class="text-gray-400">결제 일시</span>
                            <span id="display-date" class="text-gray-600">-</span>
                        </div>
                        <div class="flex justify-between text-sm py-2">
                            <span class="text-gray-400">결제 상태</span>
                            <span class="text-green-600 font-semibold bg-green-50 px-2 py-0.5 rounded text-xs">결제성공</span>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button onclick="window.close()" class="w-full py-4 bg-gray-900 text-white font-bold rounded-xl hover:bg-black transition">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // payment.html에서 넘겨준 amount를 직접 받습니다.
        const amount = urlParams.get('amount') || 0;

        document.getElementById("display-amount").innerText = Number(amount).toLocaleString() + "원";
        
        const now = new Date();
        const dateStr = now.getFullYear() + '.' + (now.getMonth() + 1) + '.' + now.getDate() + ' ' + 
                        now.getHours().toString().padStart(2,'0') + ':' + 
                        now.getMinutes().toString().padStart(2,'0');
        document.getElementById("display-date").innerText = dateStr;
    </script>
</body>
</html>
