<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold text-blue-900">결제 완료!</h2>
        <p class="text-gray-600 mt-4">전표가 생성되었습니다.</p>
        
        <a id="bill-btn" href="#" target="_blank" class="block mt-6 w-full py-3 bg-green-600 text-white font-bold rounded hover:bg-green-500 transition">
            전표 출력하기
        </a>
    </div>

// success4.html의 스크립트 부분을 이렇게 변경하세요
<script>
    const params = new URLSearchParams(window.location.search);
    const txId = params.get('tno'); // 포트원 txId (기존 tno 파라미터)
    const storeId = "store-d7a076d7-2e69-4b3e-88d2-7d08759d5d75"; // <--- 여기를 실제 StoreID로 바꾸세요!

    if(txId) {
        // 포트원 공식 전표 조회 URL
        const billUrl = `https://portone.io/receipt/payment/${storeId}/${txId}`;
        document.getElementById("bill-btn").href = billUrl;
    } else {
        alert("전표 정보를 찾을 수 없습니다.");
    }

    setTimeout(() => {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("bill-btn").classList.remove("hidden");
    }, 2000);
</script>
</body>
</html>
