<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center">

    <div class="text-center text-white">
        <div class="mb-6 animate-bounce">
            <svg class="w-20 h-20 mx-auto text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold">결제가 완료되었습니다</h1>
        <p class="mt-4 text-blue-200">잠시 후 자동으로 창이 닫힙니다.</p>
    </div>

    <script>
        // 3초(3000ms) 뒤에 자동으로 창 닫기
        setTimeout(() => {
            window.close();
        }, 3000);
    </script>
</body>
</html>
