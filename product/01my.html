<!DOCTYPE html>

async function loadAllOptions() {
    // 4번의 개별 호출 대신 1번의 통합 호출 수행
    const docSnap = await getDoc(doc(db, "products", "all_options"));

        if (docSnap.exists()) {
            const select = document.getElementById(config.id);
            if (!select) continue;

            docSnap.data().options.forEach(opt => {

    });

    sizeList.addEventListener('change', () => {
        const [w, h] = sizeList.value.split(',');
        wIn.value = w; hIn.value = h;
        updatePrice();
    });

    updatePrice();

    // [중요] 첫 옵션 이미지 자동 적용 (위치: 함수 마지막, 닫는 괄호 위)
    setTimeout(() => {
        const firstSelect = document.querySelector('select');
        if (firstSelect && firstSelect.options.length > 0) {

}














   // 옵션추가 
async function updatePrice() {
    if (!priceConfigCache) {
        const configSnap = await getDoc(doc(db, "products", "sticker_price2"));
        if (!configSnap.exists()) return;
        priceConfigCache = configSnap.data();
    }
    const { base500, areaRate, marginRate, tiers } = priceConfigCache;
    
    const { base500, areaRate, marginRate, tiers } = configSnap.data();
    
    const w = parseFloat(document.getElementById('widthInput')?.value) || 0;
    const h = parseFloat(document.getElementById('heightInput')?.value) || 0;
    const qty = document.getElementById('qtySelect').value;

    const area = areaRate * w * h;
    const margin = 1 + (marginRate / 100);
    let calculatedPrice = 0;

    // 1. 수량별 기본 가격 계산
    if (qty === "500") {
        calculatedPrice = Math.round((base500 + area - 100) * margin);
    } else if (qty === "1000") {
        const factor = 1.445 - (0.0000002 * w * h);
        calculatedPrice = Math.round(((base500 + area - 100) * factor) * margin);
    } else if (tiers && tiers[qty]) {
        const { rate, discount } = tiers[qty];
        calculatedPrice = Math.round(((base500 + area - 100) * rate * discount) * margin);
    }

    // 2. 옵션별 추가 가격 합산
    let optionPriceSum = 0; 
    let totalOptionMarginFactor = 1; 

    // 여기서부터 모든 select를 순회하며 계산합니다
    document.querySelectorAll('select').forEach(sel => {
        // A. 후가공 옵션 계산 (finishing-select 클래스)
        if (sel.classList.contains('finishing-select')) {
            const selectedOpt = sel.options[sel.selectedIndex];
            if (selectedOpt && selectedOpt.dataset.price) {
                const p = parseFloat(selectedOpt.dataset.price) || 0;
                const cm = parseFloat(selectedOpt.dataset.costMargin) || 0;
                optionPriceSum += (p * (1 + (cm / 100)));
            }
        } 
        // B. 기존 일반 옵션 계산 (제외항목 설정)
        else if (sel.id !== 'qtySelect' && sel.id !== 'sizeType' && sel.id !== 'sizeList' && sel.selectedIndex >= 0) {
            const selectedOpt = sel.options[sel.selectedIndex];
            const p = parseFloat(selectedOpt.dataset.price) || 0;
            const m = parseFloat(selectedOpt.dataset.margin) || 0;
            const cm = parseFloat(selectedOpt.dataset.costMargin) || 0;

            const priceWithCostMargin = p * (1 + (cm / 100));
            optionPriceSum += priceWithCostMargin;
            
            if (m > 0) {
                totalOptionMarginFactor *= (1 + (m / 100));
            }
        }
    });

    // 3. 최종 결제액 합산
let finalPrice = Math.round(calculatedPrice + (optionPriceSum * totalOptionMarginFactor));

    // 4. 규격 사이즈 5% 할인 적용
  if (document.getElementById('sizeType').value === 'standard') {
        finalPrice = Math.round(finalPrice * 0.95);
    }

// [추가] 건수만큼 곱하기
   const count = parseInt(document.getElementById('setCountInput').value) || 1;
    finalPrice = finalPrice * count;

    document.getElementById('priceDisplay').textContent = finalPrice.toLocaleString() + '원';
}

    // 초기화 및 이벤트 연결
    loadAllOptions(); // 옵션 불러오기 함수

const setCountInput = document.getElementById('setCountInput');
setCountInput.addEventListener('change', updatePrice);

    
    // 이벤트 리스너 설정
    const sizeType = document.getElementById('sizeType');
    const sizeList = document.getElementById('sizeList');
    const wIn = document.getElementById('widthInput');
    const hIn = document.getElementById('heightInput');
    const workW = document.getElementById('workWidthInput');
    const workH = document.getElementById('workHeightInput');

    function updateSizeMode() {
        const isCustom = sizeType.value === 'custom';
        wIn.disabled = !isCustom;
        hIn.disabled = !isCustom;
        sizeList.disabled = isCustom;

        let w = parseFloat(wIn.value) || 0;
        let h = parseFloat(hIn.value) || 0;

        if (!isCustom) {
            const [svW, svH] = sizeList.value.split(',');
            w = parseFloat(svW);
            h = parseFloat(svH);
            wIn.value = w;
            hIn.value = h;
        }

        // 작업사이즈 자동 계산 (재단사이즈 + 2mm)
        workW.value = w + 2;
        workH.value = h + 2;
        
        updatePrice();
    }




// 영업일 계산 함수 추가 (이 코드가 반드시 있어야 합니다)
function calculateDeliveryDate(daysToAdd) {
    let date = new Date();
    let added = 0;
    while (added < daysToAdd) {
        date.setDate(date.getDate() + 1);
        if (date.getDay() !== 0 && date.getDay() !== 6) { // 주말 제외
            added++;
        }
    }
    return `${date.getMonth() + 1}월 ${date.getDate()}일`;
}








// 영업일 계산 함수 (주말 제외)
function updateDeliveryDisplay() {
    let totalDeliveryDays = 0;
    
    document.querySelectorAll('select').forEach(sel => {
        if (sel.selectedIndex >= 0) {
            const selectedOpt = sel.options[sel.selectedIndex];
            // 1. dataset.delivery 값을 가져옵니다.
            const rawDelivery = selectedOpt.dataset.delivery;
            
            // 2. Number()를 사용하여 문자열 "3"을 숫자 3으로 확실하게 변환합니다.
            const d = Number(rawDelivery);
            
            // 3. 변환된 값이 숫자인 경우에만 합산합니다.
            if (!isNaN(d)) {
                totalDeliveryDays += d;
            }
        }
    });

    const display = document.getElementById('deliveryDisplay');
    if (totalDeliveryDays > 0) {
        const dateStr = calculateDeliveryDate(totalDeliveryDays);
        display.innerHTML = `<span style="color:blue; font-weight:bold;">${dateStr}</span> 배송 예정`;
    } else {
        display.textContent = "1박2일";
    }
}













    sizeType.addEventListener('change', updateSizeMode);
    sizeList.addEventListener('change', updateSizeMode);

// 1. 사이즈 검증 함수 (순수하게 검증과 업데이트만 수행)
const validateSize = (input, min, max, defaultVal) => {
    const val = parseFloat(input.value);
    
    if (isNaN(val) || val < min || val > max) {
        alert(`설정할 수 없는 사이즈입니다. \n가로: 90~300mm, 세로: 50~400mm만 입력 가능합니다.`);
        input.value = defaultVal;
    }
    
    // 작업사이즈 동기화
    workW.value = parseFloat(wIn.value) + 2;
    workH.value = parseFloat(hIn.value) + 2;
    updatePrice();
};

// 2. 이벤트 리스너 등록 (여기서 한 번만 등록!)
wIn.addEventListener('blur', () => {

});
hIn.addEventListener('blur', () => {

// 3. 기타 이벤트 연결
document.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', (e) => {
		
    const selectedOpt = e.target.options[e.target.selectedIndex];
    const productImg = document.querySelector('.product-image'); //[cite: 2]

    // 이미지 URL이 있을 경우에만 배경 변경[cite: 2]
 if (selectedOpt.dataset.imageUrl && selectedOpt.dataset.imageUrl.trim() !== "") {
    productImg.style.cssText += `background-image: url("${selectedOpt.dataset.imageUrl}") !important;`;
}

    if (selectedOpt.dataset.url && selectedOpt.dataset.url.startsWith('http')) {
        window.open(selectedOpt.dataset.url, '_blank');
    }


		
 // 하단 스크립트 영역에 디바운스 변수 추가: let debounceTimer;
    debounceUpdatePrice(); // 기존 updatePrice() 대신 사용
    updateDeliveryDisplay();
    });
});

function debounceUpdatePrice() {
    clearTimeout(window.debounceTimer);
    window.debounceTimer = setTimeout(() => {
        updatePrice();
    }, 300);
}


	

// 초기 실행
loadAllOptions();
updateSizeMode();
updateDeliveryDisplay();

// [추가] 초기 후가공 옵션 로딩
loadFinishingOptions(document.querySelector('.finishing-select'));





async function loadFinishingOptions(selectElement) {
    // 1. 함수 실행 즉시 기본 옵션 생성 (공란 방지)
    selectElement.innerHTML = '<option value="" data-price="0">선택안함</option>';
    
    const docSnap = await getDoc(doc(db, "products", "sticker_bg"));
    if (docSnap.exists()) {
        const currentValue = selectElement.value; // 기존 선택값 유지
        
        docSnap.data().options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.name;
            el.textContent = opt.name;
            el.dataset.price = opt.price || 0;
            el.dataset.imageUrl = opt.imageUrl || "";
            el.dataset.delivery = opt.delivery || 0; 
            selectElement.appendChild(el);
        });

        // 2. 데이터 로드 후 기존에 선택했던 값이 있다면 복구[cite: 6]
        if (currentValue) selectElement.value = currentValue; 
    }
}




document.getElementById('addFinishingBtn').addEventListener('click', () => {
    const container = document.getElementById('finishingContainer');
    const newRow = document.createElement('div');
    newRow.className = 'option-row';
    // 수정: 초기값을 "선택안함"으로 설정
    newRow.innerHTML = `
        <div class="label">후가공 추가</div>
        <select class="finishing-select" style="flex:1"><option value="">선택안함</option></select>
        <button type="button" style="margin-left:5px; background:#eee;" onclick="this.parentElement.remove(); updatePrice();">삭제</button>
    `;
    container.appendChild(newRow);
    
    // 새로 생성된 셀렉트 박스에 데이터 로드
    loadFinishingOptions(newRow.querySelector('.finishing-select'));
    
    // 이벤트 리스너 추가
    newRow.querySelector('.finishing-select').addEventListener('change', updatePrice);
});
