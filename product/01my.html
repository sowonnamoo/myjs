<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    body {
        display: block;
        margin: 0;
        padding-top: 20px;
        font-family: sans-serif;
    }

    .product-container,
    div[style*="width: 1195px"] {
        margin-left: auto;
        margin-right: auto;
    }
    .product-container { display: flex; gap: 40px; width: 1195px; align-items: flex-start; }
    .product-image { width: 600px; height: 600px; background-color: #ccc; background-size: cover; background-position: center; flex-shrink: 0; }
    .options-section { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .option-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 4px 0; }
    .label { width: 120px; font-weight: bold; font-size: 14px; }
    select, input { padding: 4px; border: 1px solid #ccc; font-size: 14px; }
    .size-inputs { display: flex; gap: 5px; align-items: center; font-size: 14px; }
    .btn-group { display: flex; gap: 5px; }
    button { padding: 6px 15px; cursor: pointer; border: 1px solid #ccc; background: #eee; font-size: 13px; }
    button.active { background: #66a8a8; color: white; border-color: #66a8a8; }
    .total-price { text-align: right; font-size: 1.3em; font-weight: bold; margin-top: 10px; }
    .order-btn { background: #2b7bc3; color: white; padding: 15px; text-align: center; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; }
    input:disabled { background-color: #eee; cursor: not-allowed; border: 1px solid #ccc; }
</style>

<div id="printable-quote" style="display:none;">
    <div id="quote-content" style="font-family: sans-serif; padding: 20px;"></div>
</div>
<style>
    @media print {
        body * { visibility: hidden; }
        #printable-quote, #printable-quote * { visibility: visible; }
        #printable-quote { position: absolute; left: 0; top: 0; width: 100%; }
    }
</style>
<script src="delivery.js"></script>
<script src="quote.js"></script>
<script src="validate.js"></script>

</head>
<body>

<div class="product-container">
    <div class="product-image"></div>

    <div class="options-section">
        <h2 style="margin: 0 0 10px 0;">명함</h2>
        
        <div class="option-row">
            <div class="label">용지</div>
            <select id="paperSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>

        <div class="option-row">
            <div class="label">편집</div>
            <select id="inkSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>

        <!-- 수량 옆에 건수 박스를 한 줄에 나란히 배치 (크기 축소) -->
        <div class="option-row">
            <div class="label">수량/건수</div>
            <div style="display: flex; gap: 5px; align-items: center; flex: 1;">
               <select id="qtySelect" onchange="updatePrice()" style="flex:1;">
    <option value="100" data-multi="1.1">100매</option>
    <option value="200" data-multi="1.5">200매</option>
    <option value="300" data-multi="5.5">300매</option>
    <option value="500" data-multi="2.0">500매</option>
    <option value="1000" data-multi="3.5">1000매</option>
    <option value="2000" data-multi="6.0">2000매</option>
</select>
                <span style="font-size: 14px; font-weight: bold; margin: 0 2px;">x</span>
                <input type="number" id="setCountInput" value="1" min="1" max="50" onchange="updatePrice()" style="width: 45px; padding: 4px; text-align: center;"> 
                <span style="font-size: 14px;">건</span>
            </div>
        </div>

        <div class="option-row">
            <div class="label">사이즈</div>
            <div style="flex:1; display:flex; gap:10px;">
                <select id="sizeType" style="width:100px;">
                    <option value="standard">규격사이즈</option>
                    <option value="custom">비규격사이즈</option>
                </select>
                <select id="sizeList" style="flex:1;">
                    <option value="90,50">90x50 mm</option>
                    <option value="86,52">86x52 mm</option>
                    <option value="85,49">85x49 mm</option>
                    <option value="85,55">85x55 mm</option>
                    <option value="86,50">86x50 mm</option>
                    <option value="89,51">89x51 mm</option>
                    <option value="91,51">91x51 mm</option>
                </select>
            </div>
        </div>

        <div class="option-row" style="flex-direction: column; align-items: flex-start; padding-left: 120px;">
            <!-- 재단사이즈 -->
            <div class="size-inputs">
                <span style="color:red; width:100px;">재단사이즈</span> 
                <input type="number" id="widthInput" value="60" style="width: 20%; margin-left: 5px;" disabled> x 
                <input type="number" id="heightInput" value="50" style="width: 20%; margin-left: 5px;" disabled> mm
            </div>
            <!-- 작업사이즈 (재단 + 2mm) -->
            <div class="size-inputs" style="margin-top:5px;">
                <span style="width:100px;">작업사이즈</span> 
                <input type="number" id="workWidthInput" value="62" style="width: 20%; margin-left: 5px;" disabled> x 
                <input type="number" id="workHeightInput" value="52" style="width: 20%; margin-left: 5px;" disabled> mm
            </div>
        </div>

        <div id="finishingContainer">
            <div class="option-row" id="finishingRow">
                <div class="label">후가공선택</div>
                <select class="finishing-select" style="flex:1"><option>불러오는 중...</option></select>
                <button type="button" id="addFinishingBtn" style="margin-left:5px; background:#ddd;">후가공 추가하기</button>
            </div>
        </div>

        <div class="option-row">
            <div class="label">종이무게, 컬러</div>
            <span style="margin-right:2px; font-size:13px; color:#666;">약</span>
            <span id="weightDisplay" style="margin-right:10px; font-size:13px; color:#666;">0kg</span>
            <span class="fixed-option" style="font-size:13px; color:#666;">CMYK (컬러인쇄)</span>
        </div>

        <div class="option-row">
            <div class="label">예상 출고일</div>
            <div id="deliveryDisplay" style="color:red; border:1px dashed red; padding:3px 10px; font-size:13px;">통상 1일</div>
        </div>

        <div class="total-price" style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px;">
            <!-- 좌측: 견적서 출력 버튼 -->
            <button type="button" id="printQuoteBtn" style="padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #ccc;">
                견적서 인쇄
            </button>

            <!-- 우측: 총 결제액 영역 -->
            <div style="text-align: right;">
                <div id="selectedOptionsSummary" style="font-size:12px; color:#999; margin-bottom:5px;"></div>
                총 결제액 <br>
                <span id="priceDisplay" style="color:#4aa3ff; font-size:1.3em; font-weight:700;">0원</span>
            </div>
        </div>

        <button class="order-btn">파일 업로드 & 주문하기</button>
    </div>
</div>

<div style="width:100%; display:flex; justify-content:center; margin-top:80px;">
    <div style="width:1195px;">
        <div style="display:flex; border:1px solid #ccc; text-align:center; border-bottom:2px solid #ccc;">
            <div onclick="setTab(this)" style="flex:1; padding:15px; background:#999; color:white; border-right:1px solid #ccc; cursor:pointer;">제품정보</div>
            <div onclick="setTab(this)" style="flex:1; padding:15px; background:white; color:#333; border-right:1px solid #ccc; cursor:pointer;">공지사항</div>
            <div onclick="setTab(this)" style="flex:1; padding:15px; background:white; color:#333; border-right:1px solid #ccc; cursor:pointer;">출고/배송</div>
            <div onclick="setTab(this)" style="flex:1; padding:15px; background:white; color:#333; cursor:pointer;">재작업/취소/환불</div>
        </div>

        <div id="ai-holiday-banner" style="display:none; width: 100%; margin-bottom: 20px;">
            <div style="background: #2b7bc3; color: white; padding: 15px; text-align: center; font-size: 16px; font-weight: bold; border-radius: 5px;"></div>
        </div>

        <div style="text-align:center; margin-top:80px;">
            <h2 style="font-size:24px; color:#333;">저렴한 가격 & 가장 많은 매수</h2>
            <div id="bottomProductImage" style="width:1200px; height:1000px; background:#222; margin-top:80px; background-size: cover; background-position: center;"></div>
        </div>
    </div>
</div>

<div id="ai-recommendation-zone" style="display:none; width: 100%; margin-top: 40px; border: 2px dashed #2b7bc3; padding: 20px; border-radius: 10px; text-align: center;">
    <h3 style="margin-bottom: 15px; color: #333;">이런 상품은 어떠세요?</h3>
    <div id="ai-recommendation-content"></div>
</div>

<script>
function setTab(el) {
    const tabs = el.parentElement.children;
    for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.background = "white";
        tabs[i].style.color = "#333";
    }
    el.style.background = "#999";
    el.style.color = "white";
}
</script>

</body>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzHogA2iaQ...",
        authDomain: "ecogr-636c6.firebaseapp.com",
        projectId: "ecogr-636c6",
        storageBucket: "ecogr-636c6.appspot.com",
        messagingSenderId: "95745358447",
        appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let priceConfigCache = null;
    let finishingOptionsCache = null;

    async function loadAllOptions() {
        const optionConfigs = [
            { id: "paperSelect", docId: "myeong_paper" },
            { id: "inkSelect", docId: "myeong_ink" },
        ];

        for (const config of optionConfigs) {
            const docSnap = await getDoc(doc(db, "products", config.docId));
            if (docSnap.exists()) {
                const select = document.getElementById(config.id);
                if (!select) continue;
                select.innerHTML = '';
                
                docSnap.data().options.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt.name;
                    el.textContent = opt.name;
                    el.dataset.price = opt.price || 0;
                    el.dataset.margin = opt.margin || 0;
                    el.dataset.url = opt.url || "";
                    el.dataset.imageUrl = opt.imageUrl || ""; 
                    el.dataset.costMargin = opt.costMargin || 0;
                    el.dataset.delivery = opt.delivery || 0; 
                    el.dataset.weight = opt.weight || 0; 
                    select.appendChild(el);
                });
            }
        }

        const sizeType = document.getElementById('sizeType');
        const sizeList = document.getElementById('sizeList');
        const wIn = document.getElementById('widthInput');
        const hIn = document.getElementById('heightInput');

        sizeType.addEventListener('change', () => {
            const isCustom = sizeType.value === 'custom';
            wIn.disabled = !isCustom;
            hIn.disabled = !isCustom;
            sizeList.disabled = isCustom;
            if (!isCustom) {
                const [w, h] = sizeList.value.split(',');
                wIn.value = w; hIn.value = h;
                updatePrice();
            }
        });

        sizeList.addEventListener('change', () => {
            const [w, h] = sizeList.value.split(',');
            wIn.value = w; hIn.value = h;
            updatePrice();
        });

        updatePrice();

        setTimeout(() => {
            const firstSelect = document.querySelector('select');
            if (firstSelect && firstSelect.options.length > 0) {
                const firstOpt = firstSelect.options[0];
                if (firstOpt.dataset.imageUrl) {
                    updateMainImage(firstOpt.dataset.imageUrl);
                }
            }
            updateDeliveryDisplay(); 
        }, 500);
    }

    function updateMainImage(imageUrl) {
        if (!imageUrl || imageUrl.trim() === "") return;
        const mainImg = document.querySelector('.product-image');
        const bottomImg = document.getElementById('bottomProductImage');
        const style = `background-image: url("${imageUrl}") !important;`;
        if (mainImg) mainImg.style.cssText += style;
        if (bottomImg) bottomImg.style.cssText += style;
    }

    // 중략 없이 모든 파이어베이스 용지/편집 옵션 마진 및 할증 공식이 복구된 가격 산출 함수
    async function updatePrice() {
        if (!priceConfigCache) {
            const configSnap = await getDoc(doc(db, "products", "myeong_price2"));
            if (!configSnap.exists()) return;
            priceConfigCache = configSnap.data();
        }

        const { base500, areaRate, marginRate } = priceConfigCache;
        const w = parseFloat(document.getElementById('widthInput').value) || 0;
        const h = parseFloat(document.getElementById('heightInput').value) || 0;
        
        // 사용자가 선택한 수량과 건수를 UI에서 동적으로 확보
        const qty = parseInt(document.getElementById('qtySelect').value) || 500;
        const count = parseInt(document.getElementById('setCountInput').value) || 1;

        // 용지 무게(g/㎡) 연산 로직 복구
        const paperSelect = document.getElementById('paperSelect');
        const weightDisplay = document.getElementById('weightDisplay');

        let paperWeight = 0;
        if (paperSelect && paperSelect.options[paperSelect.selectedIndex]) {
            paperWeight = parseFloat(paperSelect.options[paperSelect.selectedIndex].dataset.weight) || 0;
        }

        if (paperWeight > 0) {
            const totalWeightKg = ((w * h) / 1000000) * (paperWeight / 1000) * qty * count;
            if (totalWeightKg < 1) {
                weightDisplay.textContent = Math.round(totalWeightKg * 1000) + 'g';
            } else {
                weightDisplay.textContent = totalWeightKg.toFixed(2) + 'kg';
            }
            weightDisplay.style.display = 'inline';
        } else {
            weightDisplay.textContent = '0kg';
            weightDisplay.style.display = 'inline';
        }

        // 비규격 사이즈 판정 및 보정 공식
        let calcW = w;
        let calcH = h;
        const currentSizeType = document.getElementById('sizeType').value;

        if (currentSizeType === 'custom') {
            if ((w <= 90 && h <= 50) || (w <= 50 && h <= 90)) {
                calcW = 90;
                calcH = 50;
            }
        }

        // 파이어베이스 기본 인쇄비 산출 공식 (면적 면적비 x 마진율)
        const area = areaRate * calcW * calcH;
        const margin = 1 + (marginRate / 100);
        let calculatedPrice = area * margin;
        
        // 수량별 기본 배율 조정 (500매 기준 비율 추산)
const qtySelect = document.getElementById('qtySelect');

const qtyFactor =
    parseFloat(
        qtySelect.options[qtySelect.selectedIndex].dataset.multi
    ) || 1;

let finalPrice = calculatedPrice * qtyFactor;

        // 용지, 편집(단면/양면 할증), 후가공 옵션별 연산 로직 완벽 복구
        let optionPriceSum = 0;

        document.querySelectorAll('select').forEach(sel => {
            // A. 후가공 옵션 합산
            if (sel.classList.contains('finishing-select')) {
                const selectedOpt = sel.options[sel.selectedIndex];
                if (selectedOpt && selectedOpt.dataset.price) {
                    const p = parseFloat(selectedOpt.dataset.price) || 0;
                    const cm = parseFloat(selectedOpt.dataset.costMargin) || 0;
                    optionPriceSum += (p * (1 + (cm / 100)));
                }
            } 
            // B. 일반 옵션 합산 (용지 선택 및 편집 디자인 선택)
            else if (sel.id !== 'sizeType' && sel.id !== 'sizeList' && sel.id !== 'qtySelect' && sel.selectedIndex >= 0) {
                const selectedOpt = sel.options[sel.selectedIndex];
                const p = parseFloat(selectedOpt.dataset.price) || 0;
                const m = parseFloat(selectedOpt.dataset.margin) || 0;
                const cm = parseFloat(selectedOpt.dataset.costMargin) || 0;
                let priceWithCostMargin = p * (1 + (cm / 100));

                // 양면/단면 선택에 따른 비규격 할증률 2.9배 연산 반영
                if (selectedOpt.value.includes('양면')) {
                    if (currentSizeType === 'custom') {
                        priceWithCostMargin *= 2.9; 
                    }
                } else if (selectedOpt.value.includes('단면')) {
                    priceWithCostMargin *= 1.0; 
                }

                optionPriceSum += (priceWithCostMargin * (1 + (m / 100)));
            }
        });

        // 규격 사이즈 지정 할인 (40% 가격 적용)
        if (currentSizeType === 'standard') {
            finalPrice = Math.round(finalPrice * 0.4); 
        }

        // 인쇄비와 옵션비를 합산한 후, 최종 건수(count)를 곱함
        finalPrice = Math.round(((finalPrice + optionPriceSum) * count) / 100) * 100;

        // 하단 선택 옵션 서머리 문자열 구성
        const summary = [];
        summary.push(document.getElementById('paperSelect')?.value || '');
        summary.push(document.getElementById('inkSelect')?.value || '');
        summary.push(`가로 ${w}mm × 세로 ${h}mm`);
        summary.push(`${qty}매`);
        summary.push(`${count}건`);

        document.querySelectorAll('.finishing-select').forEach(sel => {
            if (sel.value) {
                summary.push(sel.value);
            }
        });

        // 후가공 중복 방지 검증
        const finishingValues = [];
        let hasDuplicateFinishing = false;
        document.querySelectorAll('.finishing-select').forEach(sel => {
            if (!sel.value) return;
            if (finishingValues.includes(sel.value)) {
                hasDuplicateFinishing = true;
            }
            finishingValues.push(sel.value);
        });

        if (hasDuplicateFinishing) {
            document.getElementById('selectedOptionsSummary').innerHTML = '<span style="color:red">동일한 후가공을 중복 선택할 수 없습니다.</span>';
            return;
        }

       document.getElementById('selectedOptionsSummary').textContent = summary.filter(Boolean).join(' + ');
document.getElementById('priceDisplay').textContent = finalPrice.toLocaleString() + '원';
    }

    const sizeType = document.getElementById('sizeType');
    const sizeList = document.getElementById('sizeList');
    const wIn = document.getElementById('widthInput');
    const hIn = document.getElementById('heightInput');
    const workW = document.getElementById('workWidthInput');
    const workH = document.getElementById('workHeightInput');

    function updateSizeMode() {
        const isCustom = sizeType.value === 'custom';
        wIn.disabled = !isCustom;
        hIn.disabled = !isCustom;
        sizeList.disabled = isCustom;

        let w = parseFloat(wIn.value) || 0;
        let h = parseFloat(hIn.value) || 0;

        if (!isCustom) {
            const [svW, svH] = sizeList.value.split(',');
            w = parseFloat(svW);
            h = parseFloat(svH);
            wIn.value = w;
            hIn.value = h;
        }

        workW.value = w + 2;
        workH.value = h + 2;
        
        updatePrice();
    }

    function updateDeliveryDisplay() {
        let totalDeliveryDays = 0;
        
        document.querySelectorAll('select').forEach(sel => {
            if (sel.selectedIndex >= 0) {
                const selectedOpt = sel.options[sel.selectedIndex];
                const rawDelivery = selectedOpt.dataset.delivery;
                const d = Number(rawDelivery);
                
                if (!isNaN(d)) {
                    totalDeliveryDays += d;
                }
            }
        });

        const display = document.getElementById('deliveryDisplay');
        if (totalDeliveryDays > 0) {
            const dateStr = calculateDeliveryDate(totalDeliveryDays);
            display.innerHTML = `<span style="color:blue; font-weight:bold;">${dateStr}</span> 발송 예정`;
        } else {
            display.textContent = "1박2일";
        }
    }

    sizeType.addEventListener('change', updateSizeMode);
    sizeList.addEventListener('change', updateSizeMode);

    const validateSize = (input, min, max, defaultVal) => {
        const val = parseFloat(input.value);
        
        if (isNaN(val) || val < min || val > max) {
            alert(`설정할 수 없는 사이즈입니다. \n가로: 60mm, 세로: 50mm부터 입력 가능합니다.`);
            input.value = defaultVal;
        }
        
        workW.value = parseFloat(wIn.value) + 2;
        workH.value = parseFloat(hIn.value) + 2;
        updatePrice();
    };

    wIn.addEventListener('blur', () => {
        setTimeout(() => validateSize(wIn, 60, 500, 60), 100);
    });
    hIn.addEventListener('blur', () => {
        setTimeout(() => validateSize(hIn, 50, 500, 50), 100);
    });

    document.getElementById('paperSelect').addEventListener('change', (e) => {
        const selectedOpt = e.target.options[e.target.selectedIndex];
        if (selectedOpt.dataset.imageUrl && selectedOpt.dataset.imageUrl.trim() !== "") {
            updateMainImage(selectedOpt.dataset.imageUrl);
        }
    });

    document.querySelectorAll('select').forEach(sel => {
        sel.addEventListener('change', (e) => {
            const selectedOpt = e.target.options[e.target.selectedIndex];
            if (selectedOpt && selectedOpt.dataset.url && selectedOpt.dataset.url.startsWith('http')) {
                window.open(selectedOpt.dataset.url, '_blank');
            }
            updatePrice();
            updateDeliveryDisplay();
        });
    });

    loadAllOptions();
    updateSizeMode();
    updateDeliveryDisplay();
document.getElementById('setCountInput').addEventListener('input', updatePrice);

loadFinishingOptions(document.querySelector('.finishing-select'));

    async function loadFinishingOptions(selectElement) {
        selectElement.innerHTML = '<option value="" data-price="0">선택안함</option>';

        if (!finishingOptionsCache) {
            const docSnap = await getDoc(doc(db, "products", "myeong_bg"));
            if (!docSnap.exists()) return;
            finishingOptionsCache = docSnap.data().options;
        }

        const currentValue = selectElement.value;

        finishingOptionsCache.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.name;
            el.textContent = opt.name;
            el.dataset.price = opt.price || 0;
            el.dataset.imageUrl = opt.imageUrl || "";
            el.dataset.delivery = opt.delivery || 0;
            selectElement.appendChild(el);
        });

        if (currentValue) {
            selectElement.value = currentValue;
        }
    }

    document.getElementById('addFinishingBtn').addEventListener('click', () => {
        const container = document.getElementById('finishingContainer');
        const newRow = document.createElement('div');
        newRow.className = 'option-row';
        newRow.innerHTML = `
            <div class="label">후가공 추가</div>
            <select class="finishing-select" style="flex:1"><option value="">선택안함</option></select>
            <button type="button" style="margin-left:5px; background:#eee;" onclick="this.parentElement.remove(); updatePrice();">삭제</button>
        `;
        container.appendChild(newRow);
        
        loadFinishingOptions(newRow.querySelector('.finishing-select'));
        newRow.querySelector('.finishing-select').addEventListener('change', updatePrice);
    });
</script>
