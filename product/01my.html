<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    body { display: flex; justify-content: center; padding-top: 20px; margin: 0; font-family: sans-serif; }
    .product-container { display: flex; gap: 40px; width: 1195px; align-items: flex-start; }
    .product-image { width: 600px; height: 600px; background-color: #ccc; background-image: url('https://sowonnamoo1005.cafe24.com/1/260701.jpg'); background-size: cover; background-position: center; flex-shrink: 0; }
    .options-section { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .option-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 4px 0; }
    .label { width: 120px; font-weight: bold; font-size: 14px; }
    select, input { padding: 4px; border: 1px solid #ccc; font-size: 14px; }
    .size-inputs { display: flex; gap: 5px; align-items: center; font-size: 14px; }
    .btn-group { display: flex; gap: 5px; }
    button { padding: 6px 15px; cursor: pointer; border: 1px solid #ccc; background: #eee; font-size: 13px; }
    button.active { background: #66a8a8; color: white; border-color: #66a8a8; }
    .total-price { text-align: right; font-size: 1.3em; font-weight: bold; margin-top: 10px; }
    .order-btn { background: #2b7bc3; color: white; padding: 15px; text-align: center; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; }
input:disabled { background-color: #eee; cursor: not-allowed; border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="product-container">
    <div class="product-image"></div>

    <div class="options-section">
        <h2 style="margin: 0 0 10px 0;">컬러 재단스티커</h2>
        


        <div class="option-row">
            <div class="label">용지</div>
            <select id="paperSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>


        <div class="option-row">
            <div class="label">코팅</div>
		<select id="coatingSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>


        <div class="option-row">
            <div class="label">인쇄도수</div>
		<select id="inkSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>


        <div class="option-row">
            <div class="label">추가옵션 테스트</div>
		<select id="inkSelect2" style="flex:1"><option>불러오는 중...</option></select>
        </div>



      <div class="option-row">
    <div class="label">사이즈</div>
    <div style="flex:1; display:flex; gap:10px;">
        <select id="sizeType" style="width:100px;">
            <option value="standard">규격사이즈</option>
            <option value="custom">비규격사이즈</option>
        </select>
        <select id="sizeList" style="flex:1;">
            <option value="70,40">70x40 mm</option>
            <option value="90,50">90x50 mm</option>
        </select>
    </div>
</div>

<div class="option-row" style="flex-direction: column; align-items: flex-start; padding-left: 120px;">
    <!-- 재단사이즈 -->
    <div class="size-inputs">
        <span style="color:red; width:100px;">재단사이즈</span> 
        <input type="number" id="widthInput" value="70" style="width: 20%; margin-left: 5px;" disabled> x 
        <input type="number" id="heightInput" value="40" style="width: 20%; margin-left: 5px;" disabled> mm
    </div>
    <!-- 작업사이즈 (재단 + 2mm) -->
    <div class="size-inputs" style="margin-top:5px;">
        <span style="width:100px;">작업사이즈</span> 
        <input type="number" id="workWidthInput" value="72" style="width: 20%; margin-left: 5px;" disabled> x 
        <input type="number" id="workHeightInput" value="42" style="width: 20%; margin-left: 5px;" disabled> mm
    </div>
</div>


        <div class="option-row">
            <div class="label">배경(유/무)선택</div>
		<select id="bgSelect" style="flex:1"><option>불러오는 중...</option></select>
        </div>



        <div class="option-row">
            <div class="label">수량</div>
            <div style="display:flex; gap:5px; align-items:center;">
                <select id="qtySelect">
    <option value="500">500매</option>
    <option value="1000">1000매</option>
    <option value="2000">2000매</option>
    <option value="3000">3000매</option>
    <option value="4000">4000매</option>
    <option value="5000">5000매</option>
</select>


x <select><option>1건</option></select>
            </div>
        </div>


        <div class="option-row">
            <div class="label">당일판</div>
            <div class="btn-group">
                <button>당일판</button>
                <button class="active">일반판</button>
            </div>
        </div>

        <div class="option-row">
            <div class="label">편집의뢰</div>
            <button>편집의뢰</button>
        </div>

<div class="option-row">
    <div class="label">예상 출고일</div>
    <!-- id 추가 -->
    <div id="deliveryDisplay" style="color:red; border:1px dashed red; padding:3px 10px; font-size:13px;">매주 화,목 출고</div>
</div>

        <div class="total-price">
            총 결제액 <br>
            <span id="priceDisplay" style="color:red; font-size:1.2em;">0원</span>
        </div>

        <button class="order-btn">파일 업로드 & 주문하기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzHogA2iaQ...",
authDomain: "ecogr-636c6.firebaseapp.com",
projectId: "ecogr-636c6",
storageBucket: "ecogr-636c6.appspot.com",
messagingSenderId: "95745358447",
appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);







async function loadAllOptions() {
    const optionConfigs = [
        { id: "paperSelect", docId: "sticker_paper" },
        { id: "coatingSelect", docId: "sticker_coating" },
        { id: "inkSelect", docId: "sticker_ink" },
        { id: "bgSelect", docId: "sticker_bg" },
        { id: "inkSelect2", docId: "sticker2_ink" }
    ];

    for (const config of optionConfigs) {
        const docSnap = await getDoc(doc(db, "products", config.docId));
        if (docSnap.exists()) {
            const select = document.getElementById(config.id);
            if (!select) continue;
            select.innerHTML = '';
            
  docSnap.data().options.forEach(opt => {
    const el = document.createElement('option');
    el.value = opt.name;
    el.textContent = opt.name;
    el.dataset.price = opt.price || 0;
    el.dataset.margin = opt.margin || 0;
    // delivery 필드가 숫자인지 확인 후 저장
    el.dataset.delivery = opt.delivery || 0; 
    select.appendChild(el);
});
        }
    }
    // 옵션 로딩 후 가격 계산 실행
const sizeType = document.getElementById('sizeType');
const sizeList = document.getElementById('sizeList');
const wIn = document.getElementById('widthInput');
const hIn = document.getElementById('heightInput');

sizeType.addEventListener('change', () => {
    const isCustom = sizeType.value === 'custom';
    wIn.disabled = !isCustom;
    hIn.disabled = !isCustom;
    sizeList.disabled = isCustom;
    if (!isCustom) {
        const [w, h] = sizeList.value.split(',');
        wIn.value = w; hIn.value = h;
        updatePrice();
    }
});

sizeList.addEventListener('change', () => {
    const [w, h] = sizeList.value.split(',');
    wIn.value = w; hIn.value = h;
    updatePrice();
}); // 괄호를 닫음

    updatePrice();
} // loadAllOptions 함수를 여기서 닫음





















   // 옵션추가 
async function updatePrice() {
    const configSnap = await getDoc(doc(db, "products", "sticker_price2"));
    if (!configSnap.exists()) return;
    
    const { base500, areaRate, marginRate, tiers } = configSnap.data();
    
    const w = parseFloat(document.getElementById('widthInput')?.value) || 0;
    const h = parseFloat(document.getElementById('heightInput')?.value) || 0;
    const qty = document.getElementById('qtySelect').value;

    const area = areaRate * w * h;
    const margin = 1 + (marginRate / 100);
    let calculatedPrice = 0;

    // 1. 수량별 계산 로직
    if (qty === "500") {
        calculatedPrice = Math.round((base500 + area - 100) * margin);
    } else if (qty === "1000") {
        const factor = 1.445 - (0.0000002 * w * h);
        calculatedPrice = Math.round(((base500 + area - 100) * factor) * margin);
    } else if (tiers[qty]) {
        // 2000, 3000, 4000 등 객체에 정의된 수량 자동 처리
        const { rate, discount } = tiers[qty];
        calculatedPrice = Math.round(((base500 + area - 100) * rate * discount) * margin);
    }

    // 2. 옵션별 추가 가격 합산
    let optionPrice = 0;
    let totalOptionMarginFactor = 1; // 옵션 마진 누적 계산용

    document.querySelectorAll('select').forEach(sel => {
        if (sel.id !== 'qtySelect' && sel.selectedIndex >= 0) {
            const selectedOpt = sel.options[sel.selectedIndex];
            const p = parseInt(selectedOpt.dataset.price || 0);
            const m = parseFloat(selectedOpt.dataset.margin || 0);
            
            optionPrice += p;
            // 개별 마진이 있다면(예: 0.1%), 최종 금액에 반영 (예: 1.001 곱하기)
            if (m > 0) {
                totalOptionMarginFactor *= (1 + (m / 100));
            }
        }
    });

    // 계산된 가격에 개별 마진이 적용된 옵션 가격을 합산
   let finalPrice = Math.round(calculatedPrice + (optionPrice * totalOptionMarginFactor));

    // 규격(standard)5퍼
    if (document.getElementById('sizeType').value === 'standard') {
        finalPrice = Math.round(finalPrice * 0.95);
    }

    document.getElementById('priceDisplay').textContent = finalPrice.toLocaleString() + '원';
}
    // 초기화 및 이벤트 연결
    loadAllOptions(); // 옵션 불러오기 함수
    
    // 이벤트 리스너 설정
    const sizeType = document.getElementById('sizeType');
    const sizeList = document.getElementById('sizeList');
    const wIn = document.getElementById('widthInput');
    const hIn = document.getElementById('heightInput');
    const workW = document.getElementById('workWidthInput');
    const workH = document.getElementById('workHeightInput');

    function updateSizeMode() {
        const isCustom = sizeType.value === 'custom';
        wIn.disabled = !isCustom;
        hIn.disabled = !isCustom;
        sizeList.disabled = isCustom;

        let w = parseFloat(wIn.value) || 0;
        let h = parseFloat(hIn.value) || 0;

        if (!isCustom) {
            const [svW, svH] = sizeList.value.split(',');
            w = parseFloat(svW);
            h = parseFloat(svH);
            wIn.value = w;
            hIn.value = h;
        }

        // 작업사이즈 자동 계산 (재단사이즈 + 2mm)
        workW.value = w + 2;
        workH.value = h + 2;
        
        updatePrice();
    }




// 영업일 계산 함수 추가 (이 코드가 반드시 있어야 합니다)
function calculateDeliveryDate(daysToAdd) {
    let date = new Date();
    let added = 0;
    while (added < daysToAdd) {
        date.setDate(date.getDate() + 1);
        if (date.getDay() !== 0 && date.getDay() !== 6) { // 주말 제외
            added++;
        }
    }
    return `${date.getMonth() + 1}월 ${date.getDate()}일`;
}








// 영업일 계산 함수 (주말 제외)
function updateDeliveryDisplay() {
    let totalDeliveryDays = 0;
    
    document.querySelectorAll('select').forEach(sel => {
        if (sel.selectedIndex >= 0) {
            const selectedOpt = sel.options[sel.selectedIndex];
            // 1. dataset.delivery 값을 가져옵니다.
            const rawDelivery = selectedOpt.dataset.delivery;
            
            // 2. Number()를 사용하여 문자열 "3"을 숫자 3으로 확실하게 변환합니다.
            const d = Number(rawDelivery);
            
            // 3. 변환된 값이 숫자인 경우에만 합산합니다.
            if (!isNaN(d)) {
                totalDeliveryDays += d;
            }
        }
    });

    const display = document.getElementById('deliveryDisplay');
    if (totalDeliveryDays > 0) {
        const dateStr = calculateDeliveryDate(totalDeliveryDays);
        display.innerHTML = `<span style="color:blue; font-weight:bold;">${dateStr}</span> 배송 예정`;
    } else {
        display.textContent = "매주 화,목 출고";
    }
}













    sizeType.addEventListener('change', updateSizeMode);
    sizeList.addEventListener('change', updateSizeMode);

    const validateSize = (input, min, max, defaultVal) => {
        const val = parseFloat(input.value);
        if (isNaN(val) || val < min || val > max) {
            alert(`설정할 수 없는 사이즈입니다. \n가로: 100~300mm, 세로: 100~400mm만 입력 가능합니다.`);
            input.value = defaultVal;
        }
        // 작업사이즈 동기화 (재단 사이즈 기준)
        workW.value = parseFloat(wIn.value) + 2;
        workH.value = parseFloat(hIn.value) + 2;
        updatePrice();
    };

    // 'input' 대신 'blur' 이벤트를 사용
    wIn.addEventListener('blur', () => validateSize(wIn, 90, 300, 70));
    hIn.addEventListener('blur', () => validateSize(hIn, 50, 400, 40));

    document.querySelectorAll('select').forEach(sel => sel.addEventListener('change', updatePrice));

    loadAllOptions();
    updateSizeMode(); // 초기값 로딩 시 작업사이즈 계산 실행


// 옵션 변경 시 날짜 갱신 이벤트 추가
document.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', updateDeliveryDisplay);
});


</script>

</body>
</html>
