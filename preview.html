<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DROP IT | 스튜디오 편집기</title>
<style>
:root {
    --primary: #007AFF;
    --primary-gradient: linear-gradient(135deg, #007AFF, #00C6FF);
    --danger: #dc2626;
    --success: #84cc16;
    --bg: #121214;
    --panel-bg: #1e1e22;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    margin: 0; padding: 0; background: var(--bg); color: #fff; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
}
.main-container {
    width: 100%; max-width: 420px; height: 100vh; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
}
.order-box {
    background: rgba(255,255,255,.06); padding: 12px; border-radius: 12px;
    font-size: 13px; color: #ccc; text-align: center; border: 1px solid rgba(255,255,255,.05);
    line-height: 1.6;
}

.viewer-zone {
    width: 100%; background: #000; border-radius: 0px; position: relative;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    aspect-ratio: 1/1; flex: 1; cursor: pointer;
}
.canvas-wrap { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
canvas { display: none; touch-action: none; max-width: 100%; max-height: 100%; }

.upload-box-wrapper {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    justify-content: center; width: calc(100% - 40px); height: calc(100% - 40px);
    border: 2px dashed rgba(0, 122, 255, 0.4); border-radius: 0px;
    background: rgba(255, 255, 255, 0.02); padding: 20px; transition: all 0.3s ease;
}
.upload-icon-circle {
    width: 64px; height: 64px; border-radius: 50%; background: rgba(0, 122, 255, 0.1);
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
    box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
}
.upload-icon {
    font-size: 28px; background: var(--primary-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.upload-box-wrapper b { font-size: 16px; color: #fff; display: block; margin-bottom: 6px; }
.upload-box-wrapper p { margin: 0; font-size: 12px; color: #8a8a93; text-align: center; line-height: 1.5; }

.progress-wrap {
    display: none; position: absolute; bottom: 20px; left: 20px; right: 20px;
    background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(255,255,255,0.1);
    padding: 14px; border-radius: 14px; z-index: 100;
}
.progress-bar { width: 100%; height: 8px; background: #333; overflow: hidden; border-radius: 4px; }
.progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }
#progress-text { display: block; text-align: center; margin-top: 8px; color: var(--primary); font-size: 12px; font-weight: bold; }

.action-column { display: none; gap: 8px; height: 60px; order: 1; margin-bottom: 2px; }
.studio-mode .action-column { display: flex; }
.sidebar-btn { flex: 1; border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; }
.re-pic-label { background: var(--success); display: flex; justify-content: center; align-items: center; }
.cart-btn { background: var(--danger); }
</style>
</head>

<body>

<div class="main-container" id="main-container">
    <div id="order-info-panel" class="order-box">주문 정보를 불러오는 중...</div>

    <div class="action-column">
        <label for="file-input" class="sidebar-btn re-pic-label">다른사진 변경</label>
        <button class="sidebar-btn cart-btn" onclick="addToCart()">장바구니 담기</button>
    </div>

    <div class="viewer-zone" id="viewer-box" onclick="handleViewerClick(event)">
        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>
        
        <div id="empty-msg" class="upload-box-wrapper">
            <div class="upload-icon-circle">
                <span class="upload-icon">⇪</span>
            </div>
            <b>파일 업로드하기</b>
            <p>기기에 있는 이미지 파일(.jpg, .png)<br>선택하거나 여기로 끌어다 놓으세요.</p>
        </div>

        <div class="progress-wrap" id="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span id="progress-text">업로드 준비중...</span>
        </div>
    </div>

    <input type="file" id="file-input" accept=".jpg,.jpeg,.png" style="display:none;">
</div>

<script>
const params = new URLSearchParams(location.search);
const 주문정보 = {
    width: params.get('w') || '200',
    height: params.get('h') || '200',
    qty: params.get('qty') || '1',
    price: params.get('price') || '5000',
    name: params.get('name') || '홍길동',
    item: params.get('item') || '스티커'
};

document.getElementById('order-info-panel').innerHTML = `
    <b>주문 정보</b> | 품명: ${주문정보.item}<br>
    주문자: ${주문정보.name} &nbsp;&nbsp; 사이즈: ${주문정보.width} × ${주문정보.height} &nbsp;&nbsp; 수량: ${주문정보.qty}장<br>
    <b>결제 금액: ${Number(주문정보.price).toLocaleString()}원</b>
`;

const fileInput = document.getElementById('file-input');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let currentImg = null;

document.getElementById('viewer-box').style.aspectRatio = (parseFloat(주문정보.width) / parseFloat(주문정보.height));

function handleViewerClick(e) {
    if(currentImg) return;
    fileInput.click();
}

fileInput.onchange = function() {
    const file = fileInput.files[0];
    if(!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            currentImg = img;
            draw(img);
            document.getElementById('empty-msg').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('main-container').classList.add('studio-mode');
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
};

function draw(img) {
    const viewer = document.getElementById('viewer-box');
    canvas.width = viewer.clientWidth;
    canvas.height = viewer.clientHeight;
    
    // 이제 사진이 찌그러지지 않고 전체 다 보입니다.
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const w = img.width * scale;
    const h = img.height * scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, x, y, w, h);
}

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw280zJ4s7AjMmkPvPg3g3JmQRbB2qk3t_lgbzm_qLZP-TUWFsa6e4MdHo1FpglaulV3w/exec";

async function addToCart() {
    if(!currentImg) { alert("편집할 이미지를 먼저 업로드해주세요."); return; }
    document.getElementById('progress-wrap').style.display = 'block';
    canvas.toBlob(async (blob) => {
        const fileName = `${주문정보.name}_${주문정보.width}x${주문정보.height}_${주문정보.qty}장.jpg`;
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Data = e.target.result.split(',')[1];
            const body = new URLSearchParams({ data: base64Data, filename: fileName, mimetype: 'image/jpeg' });
            let p = 0;
            const iv = setInterval(() => {
                if (p >= 90) { clearInterval(iv); } else { p += 2; document.getElementById('progress-fill').style.width = p + '%'; document.getElementById('progress-text').innerText = `업로드 중... ${p}%`; }
            }, 80);
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body });
                const data = await res.json();
                clearInterval(iv);
                document.getElementById('progress-fill').style.width = '100%';
                document.getElementById('progress-text').innerText = '업로드 완료';
                const cart = JSON.parse(localStorage.getItem("cart")) || [];
                cart.push({ item: 주문정보.item, qty: 주문정보.qty, width: 주문정보.width, height: 주문정보.height, price: 주문정보.price, imageUrl: data.url, customerName: 주문정보.name });
                localStorage.setItem("cart", JSON.stringify(cart));
                location.href = "https://sowonnamoo.github.io/myjs/cart";
            } catch (error) {
                clearInterval(iv);
                alert("업로드 중 오류가 발생했습니다. 다시 시도해 주세요.");
                document.getElementById('progress-wrap').style.display = 'none';
            }
        };
        reader.readAsDataURL(blob);
    }, 'image/jpeg', 0.95);
}
</script>
</body>
</html>
