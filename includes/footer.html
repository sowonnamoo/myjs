const INFO_POPUP_STYLE = `
    *{ box-sizing:border-box; }
    body{
        margin:0;
        padding:20px 22px 24px;
        font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
        color:#222;
        font-size:13.5px;
        line-height:1.7;
        background:#fff;
    }
    h1{ font-size:17px; margin:0 0 14px; padding-bottom:10px; border-bottom:2px solid #333; }
    h2{ font-size:14px; margin:18px 0 8px; color:#111; }
    h2:first-of-type{ margin-top:0; }
    ul, ol{ margin:0 0 4px; padding-left:18px; }
    li{ margin-bottom:6px; }
    .popup-note{ margin-top:14px; font-size:12px; color:#777; }
    .popup-close-btn{
        display:block;
        width:100%;
        margin-top:20px;
        padding:11px;
        background:#333;
        color:#fff;
        border:none;
        border-radius:6px;
        font-size:13.5px;
        cursor:pointer;
    }
    .popup-close-btn:hover{ background:#111; }
`;

function openInfoPopup(key){
    const data = INFO_CONTENT[key];
    if(!data) return;

    const w = 460, h = 620;
    const left = Math.round((window.screen.width - w) / 2);
    const top = Math.round((window.screen.height - h) / 2);

    // 주소창/메뉴바/툴바 없는 작은 새 창으로 오픈합니다.
    // (브라우저 정책에 따라 일부 요소는 표시될 수 있습니다.)
    const popup = window.open(
        '',
        'infoPopup_' + key,
        `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no,location=no,status=no,resizable=yes,scrollbars=yes`
    );

    if(!popup){
        alert('팝업이 차단되었습니다. 브라우저의 팝업 차단 설정을 해제한 뒤 다시 시도해주세요.');
        return;
    }

    popup.document.open();
    popup.document.write(`<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${data.title}</title>
<style>${INFO_POPUP_STYLE}</style>
</head>
<body>
<h1>${data.title}</h1>
${data.html}
<button type="button" class="popup-close-btn" onclick="window.close()">닫기</button>
</body>
</html>`);
    popup.document.close();
    popup.focus();
}
</script>
