<!-- /includes/header.html -->

<style>
* { box-sizing: border-box; }

.header-component {
    width: 1199px;
    margin: 0 auto;
    padding: 0;
    font-family: sans-serif;
}

.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 80px;
    width: 100%;
    padding: 0 10px;
}

.logo img {
    display: block;
    max-width: 240px;
    height: auto;
}

.header-right-wrap {
    display: flex;
    align-items: center;
    gap: 15px;
}


/* 검색 */
.search-container {
    width: 250px;
    position: relative;
}

.search-wrap {
    display: flex;
    align-items: center;
    background: #fff;
    border: 2px solid #ccc;
    border-radius: 40px;
    padding: 0 10px;
    height: 40px;
}

.search-wrap input {
    border: none;
    width: 100%;
    outline: none;
    padding: 0 10px;
}


.search-btn {
    width: 105px;
    height: 20px;
    background: #b0b0b0;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    flex-shrink: 0; 
    margin-left: 5px; 
}


/* 자동완성 */
.search-suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: white;
    border: 1px solid #ccc;
    border-top: none;
    border-radius: 0 0 15px 15px;
    display: none;
    z-index: 1000;
    box-shadow:0 4px 6px rgba(0,0,0,.1);
    padding:5px 0;
}


.suggestion-item {
    padding:8px 20px;
    cursor:pointer;
    font-size:14px;
}

.suggestion-item:hover {
    background:#f0f0f0;
}


/* 버튼 */
.icons {
    display:flex;
    gap:8px;
}

.header-btn {
    height:35px;
    padding:0 16px;
    background:white;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
    white-space:nowrap;
}


/* 메뉴 이미지 */
.menu-image-wrap {
    display:block;
}


/* 모바일 */
@media(max-width:768px){

.header-component {
    width:100%;
    padding:15px;
}

.header-top {
    height:auto;
    flex-direction:column;
    gap:15px;
}

.header-right-wrap {
    width:100%;
    flex-direction:column;
}

.search-container {
    width:100%;
}

.menu-image-wrap,
map {
    display:none !important;
}

}


<style>
.text-menu-wrap {
    width: 1199px; /* 기존 헤더와 동일 폭 */
    margin: 0 auto;
    background: #f8f8f8; /* 메뉴 배경색 (원하는 대로 수정) */
    border-top: 1px solid #eee;
    padding: 10px 0;
}

.text-menu-list {
    display: flex;
    justify-content: center; /* 중앙 정렬 */
    gap: 5px; /* 메뉴 사이 간격 */
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: wrap; /* 줄바꿈 허용 (모바일 대응) */
}

.text-menu-list li a {
    display: block;
    padding: 8px 15px;
    color: #333;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    border-radius: 4px;
    transition: background 0.2s;
}

.text-menu-list li a:hover {
    background: #e0e0e0;
    color: #000;
}

/* 모바일 반응형 스타일 (기존 모바일 CSS에 통합하거나 추가) */
@media(max-width: 768px) {
    .text-menu-wrap {
        width: 100%;
    }
    .text-menu-list {
        gap: 2px;
        justify-content: space-around;
    }
    .text-menu-list li a {
        padding: 6px 10px;
        font-size: 12px;
    }
}
</style>

    

</style>

<script>
(function() {
    // 1. 검색 데이터
    const searchData = [
        { name: "명함", url: "/products/01my" },
        { name: "박명함", url: "/products/01my" },
        { name: "카드명함", url: "/products/01my" },
        { name: "회사명함", url: "/products/01my" },
        { name: "수입지명함", url: "/products/01my" },
        { name: "빠른명함", url: "/products/01my" }
    ];

    const input = document.getElementById('searchInput');
    const suggBox = document.getElementById('suggestions');

    // 2. 검색 실행 함수 (전역으로 노출)
    window.executeSearch = function() {
        const query = input.value.trim();
        if (!query) return;
        const item = searchData.find(d => d.name === query);
        location.href = item ? item.url : "/search?q=" + encodeURIComponent(query);
    };

    // 3. 엔터키 입력 시 검색
    if (input) {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.executeSearch();
        });

        // 4. 자동완성 기능
        input.addEventListener('input', () => {
            const val = input.value;
            suggBox.innerHTML = '';
            if (val.length < 1) { suggBox.style.display = 'none'; return; }
            
            const filtered = searchData.filter(d => d.name.includes(val)).slice(0, 3);
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = item.name;
                    div.onclick = () => location.href = item.url;
                    suggBox.appendChild(div);
                });
                suggBox.style.display = 'block';
            } else {
                suggBox.style.display = 'none';
            }
        });
    }
})();
</script>
