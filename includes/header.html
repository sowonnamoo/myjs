<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 주문 페이지</title>
    <style>
        /* 기본 스타일 */
        body { margin: 0; padding-top: 20px; font-family: 'Pretendard', sans-serif; }
        
        /* 헤더 스타일 (예쁘게 개선) */
        .header { width: 100%; max-width: 1192px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 800; color: #2b7bc3; }
        .search-wrap { flex: 1; max-width: 500px; position: relative; border: 2px solid #2b7bc3; border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; }
        .search-wrap input { border: none; width: 100%; outline: none; font-size: 15px; }
        .icons { display: flex; gap: 15px; font-size: 24px; cursor: pointer; }

        /* 제품 컨테이너 */
        .product-container { display: flex; gap: 40px; width: 1195px; margin: 0 auto; align-items: flex-start; }
        #mainProductImage { width: 600px; height: 600px; object-fit: cover; background: #eee; }
        .options-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .option-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        .label { width: 120px; font-weight: bold; font-size: 14px; }
        select, input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .order-btn { background: #2b7bc3; color: white; padding: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .product-container { flex-direction: column; width: 100%; padding: 10px; }
            #mainProductImage { width: 100%; height: auto; aspect-ratio: 1/1; }
            .header-top { gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- 헤더 영역 -->
    <header class="header">
        <div class="header-top">
            <div class="menu-icon" style="font-size: 24px; cursor:pointer;">☰</div>
            <div class="logo">ECO</div>
            <div class="search-wrap">
                <input type="text" placeholder="상품을 검색해주세요">
                <button class="search-btn" style="border:none; background:none;">🔍</button>
            </div>
            <div class="icons">
                <span>👤</span>
                <span>🛒</span>
            </div>
        </div>
    </header>

    <!-- 제품 상세 영역 -->
    <div class="product-container">
        <img id="mainProductImage" src="https://sowonnamoo1005.cafe24.com/1/26070301.jpg" alt="제품 이미지">
        <div class="options-section">
            <h2 style="margin: 0;">명함</h2>
            <div class="option-row">
                <div class="label">용지</div>
                <select id="paperSelect" style="flex:1"><option>불러오는 중...</option></select>
            </div>
            <!-- 기타 옵션들... -->
            <button class="order-btn">셀프편집 & 주문하기</button>
        </div>
    </div>

    <!-- 헤더/푸터 불러오기 (경로 수정 적용) -->
    <div id="header-container"></div>
    <div id="footer-container"></div>

    <script>
        // 헤더와 푸터 로드 (상대 경로 적용)
        fetch('../includes/header.html')
            .then(r => r.text())
            .then(d => document.getElementById('header-container').innerHTML = d);

        fetch('../includes/footer.html')
            .then(r => r.text())
            .then(d => document.getElementById('footer-container').innerHTML = d);
    </script>
</body>
</html>
