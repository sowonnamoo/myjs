<!-- /includes/header.html -->

<style>
/* 1. 기본 스타일 */
* { box-sizing: border-box; }
.header-component { width: 1199px; margin: 0 auto; padding: 0; font-family: sans-serif; }
.header-top { display: flex; align-items: center; justify-content: space-between; height: 80px; width: 100%; padding: 0 10px; }
.logo img { display: block; max-width: 240px; height: auto; }
.header-right-wrap { display: flex; align-items: center; gap: 15px; }

/* 검색 스타일 */
.search-container { width: 250px; position: relative; }
.search-wrap { display: flex; align-items: center; background: #fff; border: 2px solid #ccc; border-radius: 40px; padding: 0 10px; height: 40px; }
.search-wrap input { border: none; width: 100%; outline: none; padding: 0 10px; }
.search-btn { 
    width: 25px; 
    height: 25px; 
    background: #68b600; 
    color: white;             /* 특수문자 색상 */
    border-radius: 50%; 
    border: none; 
    cursor: pointer; 
    flex: 0 0 25px;           /* 찌그러짐 방지 */
    
    /* 글자 중앙 정렬 */
    display: flex; 
    align-items: center; 
    justify-content: center;
    
    font-size: 12px;          /* 글자 크기 조절 */
    line-height: 1;           /* 줄간격 제거 */
    padding: 0; 
}

.search-suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 15px 15px; display: none; z-index: 1000; box-shadow:0 4px 6px rgba(0,0,0,.1); padding:5px 0; }
.suggestion-item { padding:8px 20px; cursor:pointer; font-size:14px; }
.suggestion-item:hover { background:#f0f0f0; }

/* 버튼 */
.icons { display:flex; gap:8px; }
.header-btn { height: 35px; padding: 0 16px; background: white; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; }

/* 메가메뉴 */
.mega-menu-wrap { width: 1199px; margin: 0 auto; margin-bottom: 40px; background: #fcfcfc; border-top: 2px solid #333; border-bottom: 2px solid #333; position: relative; }
.mega-menu-list { display: flex; justify-content: center; list-style: none; margin: 0; padding: 0; }
.menu-item { position: relative; padding: 15px 20px; }
.menu-item > a { text-decoration: none; color: #333; font-weight: bold; }
.sub-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #ddd; min-width: 150px; padding: 10px 0; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 1000; }
.menu-item:hover .sub-menu { display: block; }
.sub-menu a { display: block; padding: 8px 15px; color: #666; text-decoration: none; font-size: 13px; }
.menu-item > a[onclick] { cursor: default; }
    
/* 모바일 슬라이더 */
.mobile-slider-nav { 
    position: fixed; 
    top: 0; 
    left: -300px; 
    width: 280px; 
    height: 100%; 
    background: #fff; 
    z-index: 9999; 
    transition: left 0.3s ease; 
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
    overflow-y: auto;           /* 정상 위치로 이동 */
    -webkit-overflow-scrolling: touch; 
}
.mobile-slider-nav.active { left: 0; }
.slider-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
.slider-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; }
.slider-overlay.active { display: block; }

@media(max-width: 768px) {
    .header-component { width: 100%; padding: 15px; }
    .header-top { height: auto; flex-direction: column; gap: 15px; }
    .header-right-wrap { width: 100%; flex-direction: column; }
    .search-container { width: 100%; }
    .mega-menu-wrap { display: none; }
    .all-menu-btn { background-color: #ff0000 !important; color: #ffffff !important; border: none !important; font-weight: bold; }
}
</style>

<div class="slider-overlay" id="sliderOverlay" onclick="toggleSlider()"></div>
<div class="mobile-slider-nav" id="mobileSlider">
    <div class="slider-header">
        <strong>전체 메뉴</strong>
        <button onclick="toggleSlider()">닫기</button>
    </div>
    
    <div id="mobileMenuList" style="padding-bottom:20px;">
        <!-- 메뉴는 아래 script의 menuData로부터 자동 생성됩니다 -->
    </div>

</div>

<div class="header-component">
    <header class="header-top">
        <div class="logo"><a href="/"><img src="https://raw.githubusercontent.com/sowonnamoo/myjs/e2570cadaf597629823755d1a67ccc53706f51c7/image/iogo.svg" alt="ECO"></a></div>
        <div class="header-right-wrap">
            <div class="search-container">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="제품♥을 검색해주세요.">
                    <button class="search-btn" onclick="executeSearch()">●</button>
                </div>
                <div id="suggestions" class="search-suggestions"></div>
            </div>
            <div class="icons">
                <button class="header-btn all-menu-btn" onclick="toggleSlider()">전체메뉴</button>
                <button class="header-btn" onclick="location.href='https://sowonnamoo.github.io/myboard/search'">내정보(로그인 없는 쇼핑몰)</button>
                <button class="header-btn" onclick="location.href='/includes/cart'">장바구니</button>
            </div>
        </div>
    </header>

    <nav class="mega-menu-wrap">
        <ul class="mega-menu-list" id="megaMenuList">
            <!-- 메뉴는 아래 script의 menuData로부터 자동 생성됩니다 -->
        </ul>
    </nav>
</div>

<script>
function toggleSlider() {
    document.getElementById("mobileSlider").classList.toggle("active");
    document.getElementById("sliderOverlay").classList.toggle("active");
}

function toggleSubMenu(el) {
    const sub = el.nextElementSibling;
    sub.style.display = (sub.style.display === "none") ? "block" : "none";
}

/* ==========================================================================
   메뉴 데이터는 여기 한 곳(menuData)에서만 관리합니다.
   여기에 카테고리/하위메뉴를 추가·수정하면
   1) PC 메가메뉴, 2) 모바일 좌측 슬라이드 메뉴, 3) 검색 자동완성
   세 곳에 전부 자동으로 반영됩니다. (다른 곳은 손댈 필요 없음)
   ========================================================================== */
const menuData = [
    {
        name: "명함",
        url: "#",
        children: [
            { name: "명함", url: "/products/01my" },
            { name: "박명함", url: "/products/02my" },
            { name: "카드명함", url: "/products/03my" },
            { name: "수입지명함", url: "/products/04my" }
        ]
    },
    {
        name: "스티커",
        url: "#",
        children: [
            { name: "원형스티커", url: "/products/sticker1" },
            { name: "사각형스티커", url: "/products/sticker2" }
        ]
    }
];

// menuData → PC 메가메뉴(.mega-menu-list) 렌더링
function renderMegaMenu() {
    const list = document.getElementById('megaMenuList');
    if (!list) return;
    list.innerHTML = menuData.map(cat => `
        <li class="menu-item">
            <a href="${cat.url}"${cat.url === '#' ? ' onclick="return false;"' : ''}>${cat.name}</a>
            ${cat.children && cat.children.length ? `
            <div class="sub-menu">
                ${cat.children.map(child => `<a href="${child.url}">${child.name}</a>`).join('')}
            </div>` : ''}
        </li>
    `).join('');
}

// menuData → 모바일 좌측 슬라이드 메뉴(#mobileMenuList) 렌더링
function renderMobileMenu() {
    const wrap = document.getElementById('mobileMenuList');
    if (!wrap) return;
    wrap.innerHTML = menuData.map(cat => `
        <div style="padding:10px;">
            <div onclick="toggleSubMenu(this)" style="font-weight:bold; margin-bottom:10px; color:#333; cursor:pointer;">${cat.name} ▾</div>
            <div class="mobile-sub-menu" style="padding-left:10px; display:none;">
                ${(cat.children || []).map(child => `<a href="${child.url}" style="display:block; padding:5px 0; color:#666; text-decoration:none;">${child.name}</a>`).join('')}
            </div>
        </div>
    `).join('');
}

renderMegaMenu();
renderMobileMenu();

(function() {
    // 검색 데이터도 menuData에서 자동으로 만들어집니다.
    // 하위메뉴가 있으면 하위메뉴 항목들을, 없으면(링크가 있는 단일 메뉴면) 그 자체를 검색 대상으로 등록합니다.
    const searchData = menuData.flatMap(cat => {
        if (cat.children && cat.children.length) return cat.children;
        return (cat.url && cat.url !== '#') ? [{ name: cat.name, url: cat.url }] : [];
    });
    const input = document.getElementById('searchInput');
    const suggBox = document.getElementById('suggestions');
    const searchContainer = document.querySelector('.search-container');

    window.executeSearch = function() {
        const query = input.value.trim();
        if (!query) return;
        const item = searchData.find(d => d.name === query);
        location.href = item ? item.url : "/search?q=" + encodeURIComponent(query);
    };

    // 검색창 외부 클릭 시 닫기
    document.addEventListener('click', (e) => {
        if (!searchContainer.contains(e.target)) {
            suggBox.style.display = 'none';
        }
    });

    if (input) {
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.executeSearch(); });
        input.addEventListener('input', () => {
            const val = input.value;
            suggBox.innerHTML = '';
            if (val.length < 1) { suggBox.style.display = 'none'; return; }
            const filtered = searchData.filter(d => d.name.includes(val)).slice(0, 3);
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = item.name;
                    div.onclick = () => location.href = item.url;
                    suggBox.appendChild(div);
                });
                suggBox.style.display = 'block';
            } else { suggBox.style.display = 'none'; }
        });
    }
})();
</script>
