<style>
/* 1. 기본 스타일 */
* { box-sizing: border-box; }
.header-component { width: 1199px; margin: 0 auto; padding: 0; font-family: sans-serif; }
.header-top { display: flex; align-items: center; justify-content: space-between; height: 80px; width: 100%; padding: 0 10px; }
.logo img { display: block; max-width: 240px; height: auto; }
.header-right-wrap { display: flex; align-items: center; gap: 15px; }

/* 검색 스타일 */
.search-container { width: 250px; position: relative; }
.search-wrap { display: flex; align-items: center; background: #fff; border: 2px solid #ccc; border-radius: 40px; padding: 0 10px; height: 40px; }
.search-wrap input { border: none; width: 100%; outline: none; padding: 0 10px; }
.search-btn { 
    width: 25px; 
    height: 25px; 
    background: #68b600; 
    color: white;             /* 특수문자 색상 */
    border-radius: 50%; 
    border: none; 
    cursor: pointer; 
    flex: 0 0 25px;           /* 찌그러짐 방지 */
    
    /* 글자 중앙 정렬 */
    display: flex; 
    align-items: center; 
    justify-content: center;
    
    font-size: 12px;          /* 글자 크기 조절 */
    line-height: 1;           /* 줄간격 제거 */
    padding: 0; 
}

.search-suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 15px 15px; display: none; z-index: 1000; box-shadow:0 4px 6px rgba(0,0,0,.1); padding:5px 0; max-height: 320px; overflow-y: auto; }
.suggestion-item { padding:8px 20px; cursor:pointer; font-size:13px; line-height:1.4; }
.suggestion-item:hover { background:#f0f0f0; }
.suggestion-item .sg-leaf { color:#222; font-weight:bold; }
.suggestion-item .sg-path { color:#999; font-size:11px; }

/* 버튼 */
.icons { display:flex; gap:8px; }
.header-btn { height: 35px; padding: 0 16px; background: white; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; }

/* 메가메뉴 */
.mega-menu-wrap { width: 1199px; margin: 0 auto; margin-bottom: 40px; background: #fcfcfc; border-top: 2px solid #333; border-bottom: 2px solid #333; position: relative; }
.mega-menu-list { display: flex; justify-content: center; list-style: none; margin: 0; padding: 0; }
.menu-item { position: static; padding: 15px 20px; }
.menu-item > a { text-decoration: none; color: #333; font-weight: bold; }
.menu-item > a[onclick] { cursor: default; }

/* 메가패널 (다단계 분류를 컬럼으로 표시) */
.mega-panel {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: 1199px;
    max-height: 70vh;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #ddd;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    z-index: 1000;
    padding: 28px 32px;
}
.menu-item:hover .mega-panel { display: block; }
.mega-panel-inner { display: flex; flex-wrap: wrap; gap: 28px 24px; align-items: flex-start; }
.mega-col { flex: 1 1 140px; min-width: 140px; max-width: 190px; }
.mega-col-title { font-size: 14px; font-weight: bold; color: #222; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #68b600; }
.mega-col-title a { color: #222; text-decoration: none; }
.mega-col-title a:hover { color: #68b600; }
.mega-col-title-leaf { border-bottom: none; padding-bottom: 0; }
.mega-sub-list { list-style: none; margin: 0; padding: 0; }
.mega-sub-list li { margin: 0; }
.mega-sub-list > li > a { display: block; padding: 4px 0; font-size: 13px; color: #666; text-decoration: none; }
.mega-sub-list > li > a:hover { color: #68b600; }
.mega-group-title { display: block; font-size: 12px; font-weight: bold; color: #333; margin: 10px 0 3px; }
.mega-group .mega-sub-list { padding-left: 8px; border-left: 1px solid #eee; margin-top: 2px; }

/* 모바일 슬라이더 */
.mobile-slider-nav { 
    position: fixed; 
    top: 0; 
    left: -300px; 
    width: 280px; 
    height: 100%; 
    background: #fff; 
    z-index: 9999; 
    transition: left 0.3s ease; 
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
    overflow-y: auto;           /* 정상 위치로 이동 */
    -webkit-overflow-scrolling: touch; 
}
.mobile-slider-nav.active { left: 0; }
.slider-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
.slider-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; }
.slider-overlay.active { display: block; }

.mobile-cat { font-weight: bold; margin-bottom: 10px; color: #333; cursor: pointer; }
.mobile-group-title { font-weight: 600; color: #333; cursor: pointer; }
.mobile-leaf-link { display: block; text-decoration: none; }
.mobile-sub-menu { display: none; }

@media(max-width: 768px) {
    .header-component { width: 100%; padding: 15px; }
    .header-top { height: auto; flex-direction: column; gap: 15px; }
    .header-right-wrap { width: 100%; flex-direction: column; }
    .search-container { width: 100%; }
    .mega-menu-wrap { display: none; }
    .all-menu-btn { background-color: #ff0000 !important; color: #ffffff !important; border: none !important; font-weight: bold; }
}
</style>

/* ---------------- PC 메가메뉴 렌더링 (다단계 컬럼형) ---------------- */

// 하위 트리(2차/3차 이상)를 재귀적으로 <ul> 리스트로 렌더링
function renderMegaChildren(items) {
    return `<ul class="mega-sub-list">` + items.map(it => {
        if (it.children && it.children.length) {
            return `<li class="mega-group">
                <span class="mega-group-title">${it.name}</span>
                ${renderMegaChildren(it.children)}
            </li>`;
        }
        return `<li><a href="${it.url}">${it.name}</a></li>`;
    }).join('') + `</ul>`;
}

// menuData → PC 메가메뉴(.mega-menu-list) 렌더링
function renderMegaMenu() {
    const list = document.getElementById('megaMenuList');
    if (!list) return;
    list.innerHTML = menuData.map(cat => {
        const cols = (cat.children || []).map(col => {
            if (col.children && col.children.length) {
                return `<div class="mega-col">
                    <div class="mega-col-title">${col.name}</div>
                    ${renderMegaChildren(col.children)}
                </div>`;
            }
            return `<div class="mega-col">
                <div class="mega-col-title mega-col-title-leaf"><a href="${col.url}">${col.name}</a></div>
            </div>`;
        }).join('');

        return `<li class="menu-item">
            <a href="${cat.url}"${cat.url === '#' ? ' onclick="return false;"' : ''}>${cat.name}</a>
            <div class="mega-panel"><div class="mega-panel-inner">${cols}</div></div>
        </li>`;
    }).join('');
}

/* ---------------- 모바일 좌측 슬라이드 메뉴 렌더링 (다단계 아코디언) ---------------- */

// 하나의 노드를 재귀적으로 렌더링. leaf면 링크, 하위메뉴가 있으면 펼침/접힘 그룹
function renderMobileNode(node, depth) {
    const hasChildren = node.children && node.children.length;
    const indent = 10 + depth * 12;

    if (!hasChildren) {
        return `<a class="mobile-leaf-link" href="${node.url}" style="padding:6px ${indent}px; color:#666;">${node.name}</a>`;
    }

    const titleClass = depth === 0 ? 'mobile-cat' : 'mobile-group-title';
    const titleStyle = depth === 0
        ? `padding:10px; padding-left:${indent}px;`
        : `padding:6px 0; padding-left:${indent}px; font-size:13px;`;

    return `<div>
        <div class="${titleClass}" style="${titleStyle}" onclick="toggleSubMenu(this)">${node.name} ▾</div>
        <div class="mobile-sub-menu">
            ${node.children.map(child => renderMobileNode(child, depth + 1)).join('')}
        </div>
    </div>`;
}

// menuData → 모바일 좌측 슬라이드 메뉴(#mobileMenuList) 렌더링
function renderMobileMenu() {
    const wrap = document.getElementById('mobileMenuList');
    if (!wrap) return;
    wrap.innerHTML = menuData.map(cat => renderMobileNode(cat, 0)).join('');
}

renderMegaMenu();
renderMobileMenu();

(function() {
    // 검색 데이터도 menuData에서 자동으로 만들어집니다.
    // 트리를 재귀적으로 훑어서 실제 링크를 가진 leaf(최하위 상품) 전부를 검색 대상으로 등록합니다.
    // 표시용 이름은 "상위메뉴 › 상품명" 형태의 경로로 만들어 동명 상품을 구분합니다.
    function flattenSearch(items, path) {
        let out = [];
        items.forEach(it => {
            const newPath = path.concat([it.name]);
            if (it.children && it.children.length) {
                out = out.concat(flattenSearch(it.children, newPath));
            } else if (it.url && it.url !== '#') {
                out.push({
                    leaf: it.name,
                    display: newPath.join(' › '),
                    url: it.url
                });
            }
        });
        return out;
    }

    const searchData = menuData.flatMap(cat => flattenSearch(cat.children || [], []));

    const input = document.getElementById('searchInput');
    const suggBox = document.getElementById('suggestions');
    const searchContainer = document.querySelector('.search-container');

    window.executeSearch = function() {
        const query = input.value.trim();
        if (!query) return;
        const item = searchData.find(d => d.leaf === query || d.display === query);
        location.href = item ? item.url : "/search?q=" + encodeURIComponent(query);
    };

    // 검색창 외부 클릭 시 닫기
    document.addEventListener('click', (e) => {
        if (!searchContainer.contains(e.target)) {
            suggBox.style.display = 'none';
        }
    });

    if (input) {
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.executeSearch(); });
        input.addEventListener('input', () => {
            const val = input.value;
            suggBox.innerHTML = '';
            if (val.length < 1) { suggBox.style.display = 'none'; return; }
            const filtered = searchData.filter(d => d.leaf.includes(val) || d.display.includes(val)).slice(0, 8);
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span class="sg-leaf">${item.leaf}</span><br><span class="sg-path">${item.display}</span>`;
                    div.onclick = () => location.href = item.url;
                    suggBox.appendChild(div);
                });
                suggBox.style.display = 'block';
            } else { suggBox.style.display = 'none'; }
        });
    }
})();
</script>
