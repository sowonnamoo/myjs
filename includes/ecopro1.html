<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Project</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #drop-zone { 
            border: 2px dashed #999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: background 0.3s;
            position: relative;
            overflow: hidden;
            background-color: #f9f9f9;
        }
        
        #drop-zone.has-image { border-style: solid; }
        
        #canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: none; 
        }

        #guide-text { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div id="drop-zone">
        <span id="guide-text">이미지를 드래그하거나 클릭하세요</span>
        <img id="canvas" alt="preview">
    </div>
    <input type="file" id="file-input" hidden accept="image/*">

    <script>
        // 전역 변수 선언
        let orderData = {};

        // 페이지 로드 시 파라미터 처리 및 캔버스 크기 설정
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dropZone = document.getElementById('drop-zone');

            for (const [key, value] of urlParams.entries()) {
                orderData[key] = decodeURIComponent(value);
            }

            if (orderData.finishings) {
                orderData.finishingsArray = orderData.finishings.split(',');
            }

            // 파라미터로 넘어온 사이즈 적용 (없을 경우 기본값 300x200)
            const w = orderData.width || orderData.w || 300;
            const h = orderData.height || orderData.h || 200;
            
            dropZone.style.width = `${w}px`;
            dropZone.style.height = `${h}px`;

            console.log("받아온 주문 정보:", orderData);
        });
    </script>
    <script src="script1.js"></script>
</body>
</html>
