<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고해상도 멀티 디자인 에디터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f5f5f5; font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; box-sizing: border-box; }
        #status-bar { margin-bottom: 15px; font-weight: bold; color: #333; background: #fff; padding: 8px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #tab-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .design-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .design-btn { width: 80px; padding: 8px 0; cursor: pointer; border: 1px solid #3498db; background: #fff; color: #3498db; font-weight: bold; font-size: 13px; border-radius: 4px; text-align: center; }
        .design-btn.active { background: #3498db; color: white; }
        .side-switch { display: flex; border: 1px solid #bdc3c7; border-radius: 4px; overflow: hidden; width: 80px; }
        .side-btn { flex: 1; padding: 3px 0; cursor: pointer; font-size: 11px; background: #eee; border: none; font-weight: bold; color: #666; text-align: center; }
        .side-btn.active { background: #e67e22; color: white; }

     #notice-box{
    width:100%;
    max-width:1024px;

    margin-top:15px;

    font-size:11px;
    color:#666;
    line-height:1.6;

    text-align:left;
}

#canvas-wrapper {
    border: 1px solid #bdc3c7;
    background: #fff;
    width: 100%;
    max-width: 1024px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.left-tools,
.right-tools{
    display:flex;
    gap:10px;
}


        
.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-weight: bold;

    font-family: 'Malgun Gothic', sans-serif;
    font-size: 14px;
}
.btn:disabled{
    opacity:.55;
    cursor:not-allowed;
}
    </style>
</head>
<body>

    <div id="status-bar">작업 규격: <span id="display-info"></span></div>
    <div id="tab-container"></div>
    <div id="canvas-wrapper"><canvas id="main-canvas"></canvas></div>

   <div class="controls">




    <!-- 오른쪽 기존 버튼 -->
    <div class="right-tools">

        <label class="btn" style="background:#3498db;" for="file-input">
            업로드/재업로드
        </label>

        <input type="file" id="file-input" accept="image/jpeg,image/png,.jpg,.jpeg,.png,application/pdf,.pdf" style="display:none;">

        <button id="save-btn" class="btn" style="background:#bbb;">
            전체저장
        </button>

    </div>

</div>


<div id="notice-box">
      <strong>※ 작업 시 주의사항</strong>
    ※ 업로드하신 파일의 배경은 회색선까지 꼭 연장해 주세요.<br>
    ※ 중요내용!!(글씨, 로고, 테두리)은 붉은선 안쪽 배치해 주세요. 닿으면 잘릴수 있어요.<br>
    ※ 재단 공정 특성상 가장자리 디자인은 일부 오차가 발생할 수 있습니다.<br>
    ※ 업로드 가능 파일 형식 : JPG, JPEG, PNG, PDF (PDF는 자동으로 고화질 이미지로 변환됩니다) <br>
    ※ 본 이미지는 실출력물과 색상차이가 존재할수 있으며 이는 재작업 사유에 해당되지 않습니다. <br>
    ※ 최종 접수후 반드시 접수완료되신 시안을 확인해주세요.
</div>
    
    



    
<script>
    let orderData = {}, canvas, designData, currentIdx, currentSide, guideRect, guideText;

    // 시안보기 페이지로 넘길 때 사용할 세션 스토리지 키
    // (같은 브라우저 탭 세션 동안만 유지되며, 새 탭/새 세션에서는 사라집니다)
    const PREVIEW_STORAGE_KEY = 'ecogr_preview_designs';
    // 시안보기 페이지 경로 (같은 폴더에 있다고 가정, 실제 배포 경로에 맞게 수정하세요)
    const PREVIEW_PAGE_URL = '/myjs/includes/sian.html';

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let hasDouble = false;

        for (const [key, value] of urlParams.entries()) {
            const decodedValue = decodeURIComponent(value);
            orderData[key] = decodedValue;
            if (decodedValue.includes('양면')) hasDouble = true;
        }

        window.count = parseInt(orderData.count) || 1;
        window.isDouble = hasDouble; 
        const ratioW = parseInt(orderData.width) || 16;
        const ratioH = parseInt(orderData.height) || 9;

        designData = Array.from({length: count}, () => ({ front: null, back: null }));
        currentIdx = 0; currentSide = 'front';

        const containerWidth = document.getElementById('canvas-wrapper').clientWidth;
        canvas = new fabric.Canvas('main-canvas', {
            width: containerWidth,
            height: containerWidth * (ratioH / ratioW),
            backgroundColor: '#ffffff'
        });
        
canvas.on('selection:created', (e) => {});

canvas.on('mouse:down', (e) => {
    if (!e.target) {
        canvas.discardActiveObject();
        canvas.requestRenderAll();
    }
});
        
        const padding = canvas.width * 0.02; 
        guideRect = new fabric.Rect({
            left: padding, top: padding,
            width: canvas.width - (padding * 2), height: canvas.height - (padding * 2),
            fill: 'transparent', stroke: '#ff0000', strokeWidth: 2,
            selectable: false, evented: false, visible: true
        });
        canvas.add(guideRect);

        guideText = new fabric.Text("파일을 업로드하세요.(jpg, jpeg, png)", {
            fontSize: 20, fill: '#e74c3c', textAlign: 'center', originX: 'center', originY: 'center',
            left: canvas.width / 2, top: canvas.height / 2, selectable: false, evented: false
        });
        canvas.add(guideText);

     document.getElementById('display-info').innerText =
    `${isDouble ? "양면" : "단면"} | 사이즈 ${ratioW} × ${ratioH} mm (붉은박스)`;
        updateView();
    });

    function updateView() {
        const tabContainer = document.getElementById('tab-container');
        tabContainer.innerHTML = '';
        for(let i = 0; i < count; i++) {
            const group = document.createElement('div'); group.className = 'design-group';
            const dBtn = document.createElement('div'); dBtn.className = 'design-btn' + (i === currentIdx ? ' active' : ''); 
            dBtn.innerText = `디자인 ${i+1}`; dBtn.onclick = () => { currentIdx = i; updateView(); };
            group.appendChild(dBtn);
            if(isDouble) {
                const switchDiv = document.createElement('div'); switchDiv.className = 'side-switch';
                ['front', 'back'].forEach(s => {
                    const sBtn = document.createElement('button'); sBtn.className = 'side-btn' + (currentIdx === i && currentSide === s ? ' active' : ''); 
                    sBtn.innerText = s === 'front' ? '앞' : '뒤'; sBtn.onclick = () => { currentIdx = i; currentSide = s; updateView(); };
                    switchDiv.appendChild(sBtn);
                });
                group.appendChild(switchDiv);
            }
            tabContainer.appendChild(group);
        }

        const img = designData[currentIdx][currentSide];
        canvas.clear();
        canvas.add(guideRect);
        if(img) { 
            canvas.add(img); canvas.sendToBack(img); 
            guideText.visible = false; 
        } else { 
            canvas.add(guideText); guideText.visible = true;
        }
        canvas.renderAll();
    }

    // pdf.js 워커 경로 설정
    if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // 업로드된 이미지(dataUrl)를 캔버스에 반영하는 공통 처리 (기존 이미지 업로드 로직 그대로)
    function applyUploadedImage(dataUrl) {
        fabric.Image.fromURL(dataUrl, (img) => {

            // 필터 적용용 최대 해상도 제한
            const maxSize = 3000;

            if (img.width > maxSize || img.height > maxSize) {

                const ratio = Math.min(
                    maxSize / img.width,
                    maxSize / img.height
                );

                img.scale(ratio);
                img.setCoords();
            }


            img.set({
                borderColor: '#3498db',
                cornerColor: '#3498db',
                cornerSize: 5,
                transparentCorners: false,
                borderScaleFactor: 1,

                rotatingPointOffset: 30
            });

            img.scaleToWidth(canvas.width);
            img.setCoords();
            designData[currentIdx][currentSide] = img;
            updateView();

            // 업로드 즉시 선택 상태로 전환
            canvas.setActiveObject(img);
            canvas.renderAll();
        });
    }

    // PDF 파일을 pdf.js로 렌더링한 뒤 고화질 JPEG dataURL로 변환
    async function convertPdfToJpegDataUrl(arrayBuffer) {
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdfDoc = await loadingTask.promise;
        const page = await pdfDoc.getPage(1); // 첫 페이지만 사용

        // 고화질 변환을 위해 넉넉한 배율로 렌더링 (인쇄용 해상도 확보)
        const targetLongSidePx = 2400;
        const baseViewport = page.getViewport({ scale: 1 });
        const longSide = Math.max(baseViewport.width, baseViewport.height);
        const scale = Math.min(4, Math.max(2, targetLongSidePx / longSide));
        const viewport = page.getViewport({ scale });

        const pdfCanvas = document.createElement('canvas');
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        const ctx = pdfCanvas.getContext('2d');

        // 투명 배경(png 원본 등) 대비, 인쇄물 기준 흰 배경으로 채움
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, pdfCanvas.width, pdfCanvas.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        return pdfCanvas.toDataURL('image/jpeg', 0.95);
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
        const isAllowedImage = ['image/jpeg', 'image/jpg', 'image/png'].includes(file.type)
            || /\.(jpe?g|png)$/i.test(file.name);

        if (!isPdf && !isAllowedImage) {
            alert('지원하지 않는 파일 형식입니다.\n\nJPG, JPEG, PNG, PDF 파일만 업로드할 수 있습니다.');
            e.target.value = '';
            return;
        }

        if (isPdf) {
            if (!window.pdfjsLib) {
                alert('PDF 변환 기능을 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해주세요.');
                e.target.value = '';
                return;
            }

            const label = document.querySelector('label[for="file-input"]');
            const originalLabelText = label ? label.textContent : '';
            if (label) label.textContent = 'PDF 변환 중...';

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const dataUrl = await convertPdfToJpegDataUrl(event.target.result);
                    applyUploadedImage(dataUrl);
                } catch (err) {
                    console.error(err);
                    alert('PDF 파일을 변환하지 못했습니다. 다른 파일로 다시 시도해주세요.');
                } finally {
                    if (label) label.textContent = originalLabelText;
                    e.target.value = '';
                }
            };
            reader.onerror = () => {
                alert('PDF 파일을 읽지 못했습니다. 다시 시도해주세요.');
                if (label) label.textContent = originalLabelText;
                e.target.value = '';
            };
            reader.readAsArrayBuffer(file);
            return;
        }

        // 기존 이미지(JPG/PNG 등) 업로드 처리
        const reader = new FileReader();
        reader.onload = (event) => {
            applyUploadedImage(event.target.result);
        };
        reader.readAsDataURL(file);
    });



document.getElementById('save-btn').addEventListener('click', async () => {


    // 이미지 업로드 여부 검사
    let emptyDesign = [];

    designData.forEach((item, index) => {

        if (!item.front) {
            emptyDesign.push(`디자인 ${index + 1} 앞면`);
        }

        if (isDouble && !item.back) {
            emptyDesign.push(`디자인 ${index + 1} 뒷면`);
        }

    });


    if (emptyDesign.length > 0) {

        alert(
            "이미지가 등록되지 않은 시안이 있습니다.\n\n" +
            emptyDesign.join("\n") +
            "\n\n모든 디자인을 등록해주세요."
        );

        return;
    }

    const saveBtn = document.getElementById('save-btn');
    const originalBtnText = saveBtn.textContent;
    saveBtn.disabled = true;
    saveBtn.textContent = '이미지 생성 중...';

    // 원래 보고 있던 디자인/사이드를 기억해뒀다가 작업 끝나면 복원
    const originalIdx = currentIdx;
    const originalSide = currentSide;

    try {
        const exportedDesigns = [];

        // 모든 디자인(양면이면 앞/뒤 각각)을 순회하며 캔버스에 잠깐씩 올려 내보냄
        for (let i = 0; i < count; i++) {
            const sides = isDouble ? ['front', 'back'] : ['front'];
            for (const side of sides) {
                currentIdx = i;
                currentSide = side;
                updateView();

                // 가이드(빨간 박스/안내문구)는 저장 이미지에서 제외
                canvas.remove(guideRect);
                canvas.remove(guideText);
                canvas.renderAll();

                // 시안보기 페이지 전달용이라 용량을 고려해 JPEG로 내보냄
                // (붙여넣기용 고해상도 PNG가 필요하면 format을 'png'로 바꾸세요)
                const dataUrl = canvas.toDataURL({
                    format: 'jpeg',
                    quality: 0.92,
                    multiplier: 2
                });

                const label = `디자인 ${i + 1}` + (isDouble ? (side === 'front' ? ' 앞면' : ' 뒷면') : '');
                exportedDesigns.push({ label, dataUrl });
            }
        }

        // 세션 스토리지에 담아서 시안보기 페이지로 전달
        // (같은 브라우저 탭 세션 동안 유지됩니다. 용량이 매우 큰 경우 실패할 수 있어
        //  실제 서비스에서는 캔버스를 서버/R2에 업로드하고 URL만 전달하는 방식을 권장합니다)
        try {
            sessionStorage.setItem(PREVIEW_STORAGE_KEY, JSON.stringify(exportedDesigns));
        } catch (storageErr) {
            console.error(storageErr);
            alert('이미지 용량이 너무 커서 시안보기 페이지로 바로 전달하지 못했습니다.\n디자인 수나 해상도를 줄여서 다시 시도해주세요.');
            return;
        }

        // 시안보기 페이지로 이동
        window.location.href = PREVIEW_PAGE_URL;

    } finally {
        // 페이지 이동이 실패한 경우를 대비해 원래 화면으로 복원
        currentIdx = originalIdx;
        currentSide = originalSide;
        updateView();
        saveBtn.disabled = false;
        saveBtn.textContent = originalBtnText;
    }
});
    

    

    window.onload = function() {
        if(!window.location.hash) {
            window.location = window.location + '#loaded';
            window.location.reload();
        }
    }

canvas.on('mouse:down', (e) => {
    if (!e.target) {
        canvas.discardActiveObject();
        canvas.renderAll();
    }
});
*/

// 캔버스 외부 영역(body) 클릭 시 선택 해제
document.addEventListener('mousedown', (e) => {

    const wrapper = document.querySelector('.canvas-container');

    if (
        wrapper &&
        !wrapper.contains(e.target) &&
        !e.target.closest('.left-tools') &&
        !e.target.closest('.right-tools')
    ) {

        if (canvas && canvas.getActiveObject()) {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
        }

    }

});



    

const guideBtn = document.getElementById('guide-btn');

if (guideBtn) {

    guideBtn.addEventListener('mouseenter', () => {
        guideRect.visible = true;
        canvas.renderAll();
    });

    guideBtn.addEventListener('mouseleave', () => {
        guideRect.visible = false;
        canvas.renderAll();
    });

}
</script>
</body>
</html>
