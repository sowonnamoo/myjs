<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고해상도 멀티 디자인 에디터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f5f5f5; font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; box-sizing: border-box; }
        #status-bar { margin-bottom: 15px; font-weight: bold; color: #333; background: #fff; padding: 8px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #tab-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .design-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .design-btn { width: 80px; padding: 8px 0; cursor: pointer; border: 1px solid #3498db; background: #fff; color: #3498db; font-weight: bold; font-size: 13px; border-radius: 4px; text-align: center; }
        .design-btn.active { background: #3498db; color: white; }
        .side-switch { display: flex; border: 1px solid #bdc3c7; border-radius: 4px; overflow: hidden; width: 80px; }
        .side-btn { flex: 1; padding: 3px 0; cursor: pointer; font-size: 11px; background: #eee; border: none; font-weight: bold; color: #666; text-align: center; }
        .side-btn.active { background: #e67e22; color: white; }
#canvas-wrapper { 
    border: 1px solid #bdc3c7; 
    background: #fff; 
    width: 100%; 
    max-width: 1024px; 
    overflow: hidden; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
}        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-weight: bold;

    font-family: 'Malgun Gothic', sans-serif;
    font-size: 14px;
}    </style>
</head>
<body>

    <div id="status-bar">작업 규격: <span id="display-info"></span></div>
    <div id="tab-container"></div>
    <div id="canvas-wrapper"><canvas id="main-canvas"></canvas></div>

    <div class="controls">
        <label class="btn" style="background:#3498db;" for="file-input">업로드/재업로드</label>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <button id="save-btn" class="btn" style="background:#bbb;">전체저장</button>
    </div>

<script>
    let orderData = {}, canvas, designData, currentIdx, currentSide, guideRect, guideText;

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let hasDouble = false;

        for (const [key, value] of urlParams.entries()) {
            const decodedValue = decodeURIComponent(value);
            orderData[key] = decodedValue;
            if (decodedValue.includes('양면')) hasDouble = true;
        }

        window.count = parseInt(orderData.count) || 1;
        window.isDouble = hasDouble; 
        const ratioW = parseInt(orderData.width) || 16;
        const ratioH = parseInt(orderData.height) || 9;

        designData = Array.from({length: count}, () => ({ front: null, back: null }));
        currentIdx = 0; currentSide = 'front';

        const containerWidth = document.getElementById('canvas-wrapper').clientWidth;
        canvas = new fabric.Canvas('main-canvas', {
            width: containerWidth,
            height: containerWidth * (ratioH / ratioW),
            backgroundColor: '#ffffff'
        });
        
canvas.on('selection:created', (e) => {});

canvas.on('mouse:down', (e) => {
    if (!e.target) {
        canvas.discardActiveObject();
        canvas.requestRenderAll();
    }
});
        
        const padding = canvas.width * 0.02; 
        guideRect = new fabric.Rect({
            left: padding, top: padding,
            width: canvas.width - (padding * 2), height: canvas.height - (padding * 2),
            fill: 'transparent', stroke: '#ff0000', strokeWidth: 2,
            selectable: false, evented: false, visible: true
        });
        canvas.add(guideRect);

        guideText = new fabric.Text("파일을 업로드하세요.(jpg, jpeg, png)   \n 회색선까지 배경을 꽉 채워주세요. \n  붉은선 부근에 글씨나 테두리디자인 배치시 실출력시 잘릴 수 있습니다.", {
            fontSize: 20, fill: '#e74c3c', textAlign: 'center', originX: 'center', originY: 'center',
            left: canvas.width / 2, top: canvas.height / 2, selectable: false, evented: false
        });
        canvas.add(guideText);

        document.getElementById('display-info').innerText = `${isDouble ? "양면" : "단면"} 모드`;
        updateView();
    });

    function updateView() {
        const tabContainer = document.getElementById('tab-container');
        tabContainer.innerHTML = '';
        for(let i = 0; i < count; i++) {
            const group = document.createElement('div'); group.className = 'design-group';
            const dBtn = document.createElement('div'); dBtn.className = 'design-btn' + (i === currentIdx ? ' active' : ''); 
            dBtn.innerText = `디자인 ${i+1}`; dBtn.onclick = () => { currentIdx = i; updateView(); };
            group.appendChild(dBtn);
            if(isDouble) {
                const switchDiv = document.createElement('div'); switchDiv.className = 'side-switch';
                ['front', 'back'].forEach(s => {
                    const sBtn = document.createElement('button'); sBtn.className = 'side-btn' + (currentIdx === i && currentSide === s ? ' active' : ''); 
                    sBtn.innerText = s === 'front' ? '앞' : '뒤'; sBtn.onclick = () => { currentIdx = i; currentSide = s; updateView(); };
                    switchDiv.appendChild(sBtn);
                });
                group.appendChild(switchDiv);
            }
            tabContainer.appendChild(group);
        }

        const img = designData[currentIdx][currentSide];
        canvas.clear();
        canvas.add(guideRect);
        if(img) { 
            canvas.add(img); canvas.sendToBack(img); 
            guideText.visible = false; 
        } else { 
            canvas.add(guideText); guideText.visible = true;
        }
        canvas.renderAll();
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        fabric.Image.fromURL(event.target.result, (img) => {
            // 조절 핸들 및 박스 스타일 설정 (굵게)
            img.set({
                borderColor: '#3498db',
                cornerColor: '#3498db',
                cornerSize: 5, // 핸들 크기
                transparentCorners: false,
                borderScaleFactor: 1 // 박스 테두리 굵기
            });
            img.scaleToWidth(canvas.width);
            designData[currentIdx][currentSide] = img;
            updateView();
            
            // 업로드 즉시 선택 상태로 전환
            canvas.setActiveObject(img);
            canvas.renderAll();
        });
    };
    reader.readAsDataURL(file);
});



document.getElementById('save-btn').addEventListener('click', () => {

    const guideVisible = guideRect.visible;
    const textVisible = guideText.visible;

    // 저장 시 숨김
   canvas.remove(guideRect);
canvas.remove(guideText);

canvas.renderAll();

const dataURL = canvas.toDataURL({
    format: 'png',
    multiplier: 3
});

canvas.add(guideRect);

if (textVisible) {
    canvas.add(guideText);
}

canvas.renderAll();
    
    // 원상복구
    guideRect.visible = guideVisible;
    guideText.visible = textVisible;
    canvas.renderAll();

    const link = document.createElement('a');
    link.download = `design_${currentIdx}_${currentSide}.png`;
    link.href = dataURL;
    link.click();
});
    

    

    window.onload = function() {
        if(!window.location.hash) {
            window.location = window.location + '#loaded';
            window.location.reload();
        }
    }


/*
canvas.on('selection:created', (e) => {});

canvas.on('mouse:down', (e) => {
    if (!e.target) {
        canvas.discardActiveObject();
        canvas.renderAll();
    }
});
*/

// 캔버스 외부 영역(body) 클릭 시 선택 해제
document.addEventListener('mousedown', (e) => {

    const wrapper = document.querySelector('.canvas-container');

    if (wrapper && !wrapper.contains(e.target)) {

        if (canvas && canvas.getActiveObject()) {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
        }

    }

});




    

const guideBtn = document.getElementById('guide-btn');

if (guideBtn) {

    guideBtn.addEventListener('mouseenter', () => {
        guideRect.visible = true;
        canvas.renderAll();
    });

    guideBtn.addEventListener('mouseleave', () => {
        guideRect.visible = false;
        canvas.renderAll();
    });

}
</script>
</body>
</html>
