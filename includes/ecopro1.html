<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고해상도 멀티 디자인 에디터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f5f5f5; font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; box-sizing: border-box; }
        #status-bar { margin-bottom: 15px; font-weight: bold; color: #333; }
        #tab-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .design-btn { width: 80px; padding: 8px 0; cursor: pointer; border: 1px solid #3498db; background: #fff; color: #3498db; font-weight: bold; border-radius: 4px; text-align: center; }
        .design-btn.active { background: #3498db; color: white; }
        #canvas-wrapper { border: 3px dashed #3498db; background: #fff; width: 100%; max-width: 1024px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-bar">작업 규격: <span id="display-info"></span></div>
    <div id="tab-container"></div>
    <div id="canvas-wrapper"><canvas id="main-canvas"></canvas></div>

    <div class="controls">
        <label class="btn" style="background:#3498db;" for="file-input">이미지 불러오기</label>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <button id="save-btn" class="btn" style="background:#2ecc71;">저장</button>
    </div>

<script>
    let orderData = {}, canvas, designData, currentIdx, currentSide, guideRect, guideText;

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let hasDoubleKeyword = false;

        for (const [key, value] of urlParams.entries()) {
            const decodedValue = decodeURIComponent(value);
            orderData[key] = decodedValue;
            if (decodedValue.includes('양면')) hasDoubleKeyword = true;
        }

        window.count = parseInt(orderData.count) || 1;
        window.isDouble = hasDoubleKeyword; 
        
        // 가로/세로 비율 (기본값 설정)
        const ratioW = parseInt(orderData.width) || 16;
        const ratioH = parseInt(orderData.height) || 9;

        designData = Array.from({length: count}, () => ({ front: null, back: null }));
        currentIdx = 0; currentSide = 'front';

        // [수정] 캔버스 초기 크기를 2배로 확장
        // max-width 1024px 내에서 부모 너비를 가져옴
        const containerWidth = document.getElementById('canvas-wrapper').clientWidth;
        
        // 캔버스 생성 시 기존 대비 2배의 해상도 효과를 위해 가로폭을 크게 잡음
        // 비율 계산은 유지
        canvas = new fabric.Canvas('main-canvas', {
            width: containerWidth,
            height: containerWidth * (ratioH / ratioW),
            backgroundColor: '#ffffff'
        });

        // 안내선 및 텍스트 
        const padding = canvas.width * 0.02; 
        guideRect = new fabric.Rect({
            left: padding, top: padding,
            width: canvas.width - (padding * 2), height: canvas.height - (padding * 2),
            fill: 'transparent', stroke: '#ff0000', strokeWidth: 2,
            selectable: false, evented: false
        });
        canvas.add(guideRect);

        document.getElementById('display-info').innerText = `${isDouble ? "양면" : "단면"} 모드`;
        updateView();
    });

    function updateView() {
        const tabContainer = document.getElementById('tab-container');
        tabContainer.innerHTML = '';
        // 탭 렌더링 생략(간소화)
        
        const img = designData[currentIdx][currentSide];
        canvas.clear();
        canvas.add(guideRect);
        if(img) { 
            canvas.add(img); canvas.sendToBack(img); 
        }
        canvas.renderAll();
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                // 이미지를 불러올 때 캔버스 전체에 꽉 차게 조절
                img.scaleToWidth(canvas.width);
                designData[currentIdx][currentSide] = img;
                updateView();
            });
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('save-btn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `design.png`;
        // 저장 시 multiplier를 높여 고해상도 이미지 생성
        link.href = canvas.toDataURL({ format: 'png', multiplier: 2 });
        link.click();
    });
</script>
</body>
</html>
