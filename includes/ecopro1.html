<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고해상도 멀티 디자인 에디터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 10px; padding-bottom: 80px; background: #f5f5f5; font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; box-sizing: border-box; }
        #status-bar { margin-bottom: 10px; font-weight: bold; color: #333; }
        #tab-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .design-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .design-btn { width: 70px; padding: 5px; cursor: pointer; border: 1px solid #3498db; background: #fff; color: #3498db; font-weight: bold; font-size: 12px; border-radius: 4px; text-align: center; }
        .design-btn.active { background: #3498db; color: white; }
        .side-switch { display: flex; border: 1px solid #bdc3c7; border-radius: 4px; overflow: hidden; width: 70px; }
        .side-btn { flex: 1; padding: 2px 0; cursor: pointer; font-size: 10px; background: #eee; border: none; font-weight: bold; color: #666; text-align: center; }
        .side-btn.active { background: #e67e22; color: white; }
        #canvas-wrapper { border: 3px dashed #3498db; background: #fff; width: 100%; max-width: 500px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <div id="status-bar">작업 규격: <span id="display-info"></span></div>
    <div id="tab-container"></div>
    <div id="canvas-wrapper"><canvas id="main-canvas"></canvas></div>

    <div class="controls">
        <label class="btn" style="background:#3498db;" for="file-input">이미지 업로드</label>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <button id="guide-btn" class="btn" style="background:#f1c40f; color: #333;">재단선</button>
        <button id="save-btn" class="btn" style="background:#2ecc71;">저장</button>
    </div>

<script>
    let orderData = {}, canvas, designData, currentIdx, currentSide, guideRect, guideText;

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let hasDoubleKeyword = false;

        for (const [key, value] of urlParams.entries()) {
            const decodedValue = decodeURIComponent(value);
            orderData[key] = decodedValue;
            if (decodedValue.includes('양면')) hasDoubleKeyword = true;
        }

        window.count = parseInt(orderData.count) || 1;
        window.isDouble = hasDoubleKeyword; 
        const ratioW = parseInt(orderData.width) || 16;
        const ratioH = parseInt(orderData.height) || 9;

        designData = Array.from({length: count}, () => ({ front: null, back: null }));
        currentIdx = 0; currentSide = 'front';

        // 캔버스 사이즈 계산 (가로폭을 부모 요소에 맞춤)
        const containerWidth = document.getElementById('canvas-wrapper').clientWidth;
        canvas = new fabric.Canvas('main-canvas', {
            width: containerWidth,
            height: containerWidth * (ratioH / ratioW),
            backgroundColor: '#ffffff'
        });

        // 가이드 및 초기 설정
        const padding = canvas.width * 0.05; 
        guideRect = new fabric.Rect({
            left: padding, top: padding,
            width: canvas.width - (padding * 2), height: canvas.height - (padding * 2),
            fill: 'transparent', stroke: '#ff0000', strokeWidth: 2,
            selectable: false, evented: false
        });
        canvas.add(guideRect);

        guideText = new fabric.Text("이미지를 업로드하세요.", {
            fontSize: 14, fill: '#e74c3c', textAlign: 'center',
            left: canvas.width / 2, top: canvas.height / 2, originX: 'center',
            selectable: false, evented: false
        });
        canvas.add(guideText);

        document.getElementById('display-info').innerText = `${isDouble ? "양면" : "단면"} 모드`;
        updateView();
    });

    function updateView() {
        renderTabs();
        const img = designData[currentIdx][currentSide];
        canvas.clear();
        canvas.add(guideRect);
        if(img) { 
            canvas.add(img); canvas.sendToBack(img); 
            guideText.visible = false; guideRect.visible = false; 
        } else { 
            canvas.add(guideText);
        }
        canvas.renderAll();
    }

    function renderTabs() {
        const tabContainer = document.getElementById('tab-container');
        tabContainer.innerHTML = '';
        for(let i = 0; i < count; i++) {
            const group = document.createElement('div'); group.className = 'design-group';
            const dBtn = document.createElement('div'); dBtn.className = 'design-btn' + (i === currentIdx ? ' active' : ''); 
            dBtn.innerText = `D${i+1}`; dBtn.onclick = () => { currentIdx = i; updateView(); };
            group.appendChild(dBtn);
            if(isDouble) {
                const switchDiv = document.createElement('div'); switchDiv.className = 'side-switch';
                ['front', 'back'].forEach(s => {
                    const sBtn = document.createElement('button'); sBtn.className = 'side-btn' + (currentIdx === i && currentSide === s ? ' active' : ''); 
                    sBtn.innerText = s === 'front' ? '앞' : '뒤'; sBtn.onclick = () => { currentIdx = i; currentSide = s; updateView(); };
                    switchDiv.appendChild(sBtn);
                });
                group.appendChild(switchDiv);
            }
            tabContainer.appendChild(group);
        }
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(canvas.width);
                designData[currentIdx][currentSide] = img;
                updateView();
            });
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('save-btn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `design_${currentIdx}_${currentSide}.png`;
        link.href = canvas.toDataURL({ format: 'png', multiplier: 3 });
        link.click();
    });

    document.getElementById('guide-btn').addEventListener('mousedown', () => { guideRect.visible = true; canvas.renderAll(); });
    document.getElementById('guide-btn').addEventListener('mouseup', () => { guideRect.visible = false; canvas.renderAll(); });
</script>
</body>
</html>
