<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>주문작성</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --paper:#F1F4F6;
            --surface:#FFFFFF;
            --ink:#142230;
            --ink-soft:#5B6B78;
            --ink-faint:#94A3AD;
            --line:#E1E6EA;
            --teal:#2F8F86;
            --teal-dark:#256F68;
            --blue:#2657A6;
            --blue-dark:#1D4685;
            --red:#D64545;
            --red-soft:#FBEAE9;
            --radius-lg:20px;
            --radius-md:14px;
            --radius-sm:10px;
            --shadow-card:0 1px 2px rgba(20,34,48,.04), 0 10px 28px rgba(20,34,48,.07);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            background:var(--paper);
            color:var(--ink);
            font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
            -webkit-font-smoothing:antialiased;
            -webkit-tap-highlight-color:transparent;
        }

        button, input{ font-family:inherit; }

        button:focus-visible,
        input:focus-visible{
            outline:2px solid var(--blue);
            outline-offset:2px;
        }

        .page{
            max-width:1080px;
            margin:0 auto;
            padding:36px 20px 80px;
        }

        /* ---------- Header ---------- */
        .page-header{ margin-bottom:26px; }
        .eyebrow{
            display:inline-block;
            font-family:'JetBrains Mono',ui-monospace,monospace;
            font-size:11px;
            font-weight:600;
            letter-spacing:.16em;
            color:var(--teal-dark);
            text-transform:uppercase;
            margin:0 0 10px;
        }
        .page-header h1{
            margin:0 0 8px;
            font-size:28px;
            font-weight:800;
            letter-spacing:-.02em;
        }
        .page-header .subtitle{
            margin:0;
            color:var(--ink-soft);
            font-size:13.5px;
            line-height:1.5;
        }

        /* ---------- Layout ---------- */
        .layout{
            display:flex;
            flex-direction:column;
            gap:18px;
        }
        .main-col{ display:flex; flex-direction:column; gap:18px; }

        @media (min-width:960px){
            .layout{
                display:grid;
                grid-template-columns:1fr 360px;
                align-items:start;
                gap:26px;
            }
            .summary-col{ position:sticky; top:26px; }
        }

        .panel{
            background:var(--surface);
            border:1px solid var(--line);
            border-radius:var(--radius-lg);
            padding:22px;
            box-shadow:var(--shadow-card);
        }
        .panel-title{
            font-size:15px;
            font-weight:700;
            margin:0 0 14px;
        }

        /* ---------- Cart items ---------- */
        .empty-state{
            text-align:center;
            padding:38px 10px;
        }
        .empty-title{ font-weight:700; font-size:15px; margin:0 0 6px; }
        .empty-sub{ font-size:13px; color:var(--ink-soft); margin:0; }

        .cart-item{
            display:flex;
            gap:14px;
            padding:16px 0;
            border-bottom:1px solid var(--line);
        }
        .cart-item:first-child{ padding-top:2px; }
        .cart-item:last-child{ border-bottom:none; padding-bottom:2px; }

        .item-no{
            flex-shrink:0;
            width:32px;
            padding-top:2px;
            font-family:'JetBrains Mono',monospace;
            font-size:11px;
            font-weight:600;
            color:var(--ink-faint);
        }
        .item-body{ flex:1; min-width:0; }
        .item-top{
            display:flex;
            justify-content:space-between;
            align-items:baseline;
            gap:10px;
        }
        .item-name{
            font-weight:700;
            font-size:15px;
            overflow-wrap:anywhere;
        }
        .item-qty{
            font-size:12px;
            color:var(--ink-soft);
            white-space:nowrap;
            flex-shrink:0;
        }
        .item-detail{
            margin-top:6px;
            font-size:12.5px;
            color:var(--ink-soft);
            line-height:1.65;
        }
        .item-price{
            margin-top:10px;
            font-family:'JetBrains Mono',monospace;
            font-weight:700;
            font-size:15px;
        }

        .item-actions{
            display:flex;
            flex-direction:column;
            gap:8px;
            flex-shrink:0;
        }
        .item-btn{
            border:none;
            border-radius:8px;
            padding:8px 13px;
            font-size:12px;
            font-weight:700;
            cursor:pointer;
            white-space:nowrap;
            transition:opacity .15s, background .15s;
        }
        .view-btn{ background:var(--ink); color:#fff; }
        .view-btn:hover{ background:#26333F; }
        .view-btn.disabled{ background:#D7DCE1; color:#fff; cursor:not-allowed; }
        .delete-btn{ background:var(--red-soft); color:var(--red); }
        .delete-btn:hover{ background:#F6D6D5; }

        /* ---------- Form ---------- */
        .field{ margin-bottom:14px; }
        .field:last-child{ margin-bottom:0; }
        .field label{
            display:block;
            font-size:12.5px;
            font-weight:600;
            color:var(--ink-soft);
            margin-bottom:6px;
        }
        .field input{
            width:100%;
            padding:12px 14px;
            border:1px solid var(--line);
            border-radius:var(--radius-sm);
            font-size:14.5px;
            color:var(--ink);
            background:var(--paper);
            transition:border-color .15s, box-shadow .15s, background .15s;
        }
        .field input::placeholder{ color:var(--ink-faint); }
        .field input:focus{
            outline:none;
            border-color:var(--blue);
            background:#fff;
            box-shadow:0 0 0 3px rgba(38,87,166,.12);
        }
        .field-hint{
            margin:6px 0 0;
            font-size:11.5px;
            color:var(--ink-soft);
            line-height:1.5;
        }

        .address-row{
            display:flex;
            gap:8px;
        }
        .address-row input{
            flex:1;
            min-width:0;
            cursor:pointer;
            background:var(--surface);
        }
        .address-row input::placeholder{ color:var(--ink-faint); }
        .address-search-btn{
            flex-shrink:0;
            padding:0 16px;
            border:1.5px solid var(--line);
            border-radius:var(--radius-sm);
            background:var(--surface);
            color:var(--ink);
            font-size:13px;
            font-weight:700;
            cursor:pointer;
            white-space:nowrap;
            transition:border-color .15s, background .15s;
        }
        .address-search-btn:hover{
            border-color:var(--blue);
            background:var(--paper);
        }

        /* ---------- Receipt / summary ---------- */
        .receipt{
            position:relative;
            overflow:hidden;
            padding-top:22px;
        }
        .receipt-head h2{
            margin:2px 0 0;
            font-size:18px;
            font-weight:800;
        }
        .receipt-divider{
            position:relative;
            height:0;
            margin:18px 0;
            border:none;
            border-top:1px dashed var(--line);
        }
        .receipt-divider::before,
        .receipt-divider::after{
            content:"";
            position:absolute;
            top:50%;
            width:20px;
            height:20px;
            border-radius:50%;
            background:var(--paper);
            transform:translateY(-50%);
        }
        .receipt-divider::before{ left:-32px; }
        .receipt-divider::after{ right:-32px; }

        .total-price{
            font-family:'JetBrains Mono',monospace;
            font-size:18px;
            font-weight:700;
            letter-spacing:-.01em;
            margin:0 0 18px;
            padding:14px 16px;
            background:var(--paper);
            border-radius:var(--radius-sm);
            text-align:right;
        }

        .pay-actions{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .pay-btn{
            width:100%;
            padding:15px;
            background:var(--blue);
            color:#fff;
            border:none;
            border-radius:var(--radius-sm);
            font-size:15.5px;
            font-weight:700;
            cursor:pointer;
            transition:background .15s, transform .05s;
        }
        .pay-btn:hover{ background:var(--blue-dark); }
        .pay-btn:active{ transform:scale(.99); }
        .pay-btn:disabled{ background:#B7C3D6; cursor:not-allowed; }

        .bank-btn{
            width:100%;
            padding:15px;
            background:var(--surface);
            color:var(--ink);
            border:1.5px solid var(--line);
            border-radius:var(--radius-sm);
            font-size:15.5px;
            font-weight:700;
            cursor:pointer;
            transition:border-color .15s, background .15s;
        }
        .bank-btn:hover{ border-color:var(--ink); background:var(--paper); }
        .bank-btn:disabled{ opacity:.6; cursor:not-allowed; }

        .receipt-footnote{
            margin:16px 0 0;
            font-size:11px;
            color:var(--ink-soft);
            line-height:1.5;
            text-align:center;
        }

        @media (prefers-reduced-motion:reduce){
            *{ transition:none !important; animation:none !important; }
        }

        @media (max-width:480px){
            .page{ padding:26px 14px 60px; }
            .panel{ padding:18px; }
            .page-header h1{ font-size:24px; }
        }

    <header class="page-header">

                <div id="cart-list"></div>

<script>
// 각 결제 수단별 독립적인 Worker 주소
const WORKER_CARD = "https://proud-math-2d41.ecogr.workers.dev/"; 
const WORKER_PAYPAL = "";

// ---- Cloudflare Worker를 통한 실제 R2 업로드 (시안에서 넘어온 원본 이미지들을 여기서 업로드) ----
const R2_WORKER_URL = "https://r2.ecogr.workers.dev/";
const R2_MAX_FILE_SIZE = 500 * 1024 * 1024; // 500MB
const R2_ALLOWED_EXTENSIONS = ['jpg', 'jpeg', 'png', 'gif', 'webp'];

function getExtFromFilename(filename, fallback){
    const ext = (filename.split('.').pop() || '').toLowerCase();
    return ext || fallback;
}

// data URL(또는 일반 URL) 문자열을 Blob으로 변환
async function urlToBlob(url){
    const res = await fetch(url);
    if(!res.ok) throw new Error(`이미지를 불러오지 못했습니다 (status ${res.status})`);
    return await res.blob();
}

// filename의 파일을 PUT으로 Worker(R2)에 올리고, 업로드된 파일의 URL을 돌려받는다.
// Worker 응답이 JSON({url:"..."}) 이든, URL 문자열 그대로든 둘 다 처리한다.
async function uploadFileToR2(blob, filename){
    const ext = getExtFromFilename(filename, 'jpg');
    if(!R2_ALLOWED_EXTENSIONS.includes(ext)){
        throw new Error(`허용되지 않는 파일 형식입니다: .${ext}`);
    }
    if(blob.size > R2_MAX_FILE_SIZE){
        throw new Error(`파일 크기가 너무 큽니다. (최대 500MB, 현재 ${(blob.size / 1024 / 1024).toFixed(1)}MB)`);
    }

    // 예시 페이지(정상 동작 중)와 동일하게 파일명을 쿼리스트링(?name=)으로 전달합니다.
    const res = await fetch(`${R2_WORKER_URL}?name=${encodeURIComponent(filename)}`, {
        method: 'PUT',
        body: blob
    });

    if(!res.ok){
        throw new Error(`R2 업로드 실패 (status ${res.status})`);
    }

    let fileUrl = '';
    try {
        const data = await res.clone().json();
        fileUrl = data.url || data.fileUrl || '';
    } catch(e){ /* JSON이 아니면 아래에서 텍스트로 재시도 */ }

    if(!fileUrl){
        fileUrl = (await res.text()).trim();
    }

    if(!fileUrl){
        throw new Error('R2 응답에서 파일 URL을 찾을 수 없습니다.');
    }
    return fileUrl;
}

// 장바구니에 담긴 항목 중 아직 R2에 업로드되지 않은 원본 이미지들(item.originalImages)을
// 모두 업로드하고, 결과 URL을 item.originalImageUrls 에 채워 넣은 뒤 localStorage에 반영한다.
// 카드결제 시작 직전에 호출한다.
async function uploadRemainingOriginals(onProgress){
    let total = 0, done = 0;
    cart.forEach(item => { if(Array.isArray(item.originalImages)) total += item.originalImages.length; });

    for(const item of cart){
        if(!Array.isArray(item.originalImages) || item.originalImages.length === 0) continue;

        const uploadedUrls = [];
        for(const orig of item.originalImages){
            const blob = await urlToBlob(orig.sourceUrl);
            const url = await uploadFileToR2(blob, orig.filename);
            uploadedUrls.push({ filename: orig.filename, url });
            done++;
            if(onProgress) onProgress(done, total);
        }

        item.originalImageUrls = uploadedUrls;
        delete item.originalImages; // 업로드가 끝난 원본 데이터(용량이 큰 data URL)는 더 이상 들고 있지 않는다.
    }

    localStorage.setItem("cart", JSON.stringify(cart));
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// ---- 다음(카카오) 우편번호 서비스로 주소 검색 ----
document.getElementById('addressSearchBtn').addEventListener('click', function () {
    new daum.Postcode({
        oncomplete: function (data) {
            let fullAddress = data.address;
            let extraAddress = '';

            if (data.addressType === 'R') {
                if (data.bname !== '') extraAddress += data.bname;
                if (data.buildingName !== '') {
                    extraAddress += (extraAddress !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                if (extraAddress !== '') fullAddress += ' (' + extraAddress + ')';
            }

            document.getElementById('address').value = fullAddress;
            document.getElementById('detailAddress').focus();
        }
    }).open();
});

// ---- 주문자 정보 공통 유효성 검사 (이름 / 핸드폰 11자리 / 주소 / 상세주소) ----
function validateOrderForm(){
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const detailAddress = document.getElementById("detailAddress").value.trim();

    if(!name){
        alert("성함을 입력해주세요.");
        return false;
    }

    const phoneDigits = phone.replace(/[^0-9]/g, '');
    if(!phone || phoneDigits.length !== 11){
        alert("작업자 핸드폰 번호를 11자리 숫자로 정확히 입력해주세요.\n(예: 01012345678)\n번호가 잘못되면 결제창이 호출되지 않습니다.");
        return false;
    }

    if(!address){
        alert("주소 검색 버튼을 눌러 주소를 입력해주세요.");
        return false;
    }

    if(!detailAddress){
        alert("상세주소를 입력해주세요.");
        return false;
    }

    return true;
}

function render(){
    const list = document.getElementById("cart-list");
    total = 0;

    if(cart.length === 0){
        list.innerHTML = `<div class="empty-state">
            <p class="empty-title">담긴 상품이 없어요</p>
            <p class="empty-sub">시안 페이지에서 주문할 상품을 먼저 담아주세요.</p>
        </div>`;
    } else {
        list.innerHTML = "";
        cart.forEach((item,index)=>{
            // price가 "12,345원" 같은 문자열로 들어와도 안전하게 숫자로 변환
            const priceNumber = Number(String(item.price).replace(/[^0-9.-]/g, '')) || 0;
            total += priceNumber;

            // 01my.html → 에코프로1 → 시안보기를 거쳐 넘어온 상세 주문정보(용지/편집/후가공/무게)가
            // 있으면 함께 표시하고, 없으면(기존 방식으로 담긴 항목) 기본 정보만 표시한다.
            const detailLines = [
                (item.width && item.height) ? `${item.width} × ${item.height}mm` : '',
                item.paper ? `용지: ${item.paper}` : '',
                item.ink ? `편집: ${item.ink}` : '',
                item.finishings ? `후가공: ${item.finishings}` : '',
                item.weight ? `무게: 약 ${item.weight}kg` : ''
            ].filter(Boolean).join('<br/>');

            list.innerHTML += `
            <div class="cart-item">
                <div class="item-no">No.${String(index + 1).padStart(2, '0')}</div>
                <div class="item-body">
                    <div class="item-top">
                        <div class="item-name">${item.item}</div>
                        <div class="item-qty">${item.qty}개${item.count && item.count != 1 ? ` × ${item.count}건` : ''}</div>
                    </div>
                    ${detailLines ? `<div class="item-detail">${detailLines}</div>` : ''}
                    <div class="item-price">${priceNumber.toLocaleString()}원</div>
                </div>
                <div class="item-actions">
                    ${ item.compositeImage && /^https?:\/\//.test(item.compositeImage)
                        ? `<button onclick="viewComposite(${index})" class="item-btn view-btn">시안보기</button>`
                        : `<button disabled class="item-btn view-btn disabled">시안보기</button>` }
                    <button onclick="deleteItem(${index})" class="item-btn delete-btn">삭제</button>
                </div>
            </div>`;
        });
    }

    document.getElementById("total-price").innerText = "총 결제금액 : " + total.toLocaleString() + "원";
}

window.deleteItem = function(index){
    cart.splice(index,1);
    localStorage.setItem("cart",JSON.stringify(cart));
    render();
};

window.viewComposite = function(index){
    const url = cart[index] && cart[index].compositeImage;
    if(url) window.open(url, '_blank');
};

async function saveOrderToFirestore(orderData) {
    try {
        await addDoc(collection(window.db, "orders"), {
            ...orderData,
            status: (orderData.payment === "무통장입금") ? "입금대기" : "결제완료"
        });
    } catch (e) {
        console.error("Firestore 저장 실패:", e);
    }
}

function saveOrder(type, paymentId){
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim() + " " + document.getElementById("detailAddress").value.trim();
    const orderData = { orderId: paymentId, name, phone, address, total, items: cart, payment: type, createdAt: new Date().toISOString() };
    localStorage.setItem("latestOrder", JSON.stringify(orderData));
    return orderData;
}

// [1] 카드 결제 전용 (KCP)
window.goCard = async function() {
    if(!validateOrderForm()) return;

    const btn = document.querySelector('.pay-btn');
    const originalText = btn ? btn.textContent : '';
    if(btn) btn.disabled = true;

    try {
        // 1. 아직 R2에 올라가지 않은 원본 이미지들을 먼저 업로드한다.
        const totalToUpload = cart.reduce((sum, item) => sum + (Array.isArray(item.originalImages) ? item.originalImages.length : 0), 0);
        if(totalToUpload > 0){
            if(btn) btn.textContent = `원본 이미지 업로드 중... (0/${totalToUpload})`;
            await uploadRemainingOriginals((done, total) => {
                if(btn) btn.textContent = `원본 이미지 업로드 중... (${done}/${total})`;
            });
        }

        // 2. 카드결제 채널 정보를 받아와 결제창을 띄운다.
        if(btn) btn.textContent = '결제창 준비 중...';
        const res = await fetch(WORKER_CARD);
        const data = await res.json();
        await processPayment("카드결제", "CARD", "KRW", data.CHANNEL_KEY_CARD, data.STORE_ID);
    } catch (e) {
        console.error(e);
        alert("카드결제 준비 중 오류가 발생했습니다.\n" + (e.message || "서버 연결을 확인하세요."));
    } finally {
        if(btn){ btn.disabled = false; btn.textContent = originalText; }
    }
};



// [3] 핵심 결제 처리 엔진 (공통)
async function processPayment(paymentType, payMethod, currency, channelKey, storeId) {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim() + " " + document.getElementById("detailAddress").value.trim();

    if(!validateOrderForm()){ return; }

    try {
        const paymentId = "PAY_" + Date.now();
        const orderData = saveOrder(paymentType, paymentId);

        const response = await PortOne.requestPayment({
            storeId: storeId,
            channelKey: channelKey,
            paymentId: paymentId,
            orderName: "주문상품",
            totalAmount: Number(total),
            currency: currency,
            payMethod: payMethod,
            customer: { name: name, phoneNumber: String(phone) }
        });

        if(response.code != null){ alert("결제 실패: " + response.message); return; }

        await saveOrderToFirestore(orderData);
        localStorage.removeItem("cart");
        location.href = "success.html";
    } catch(error) {
        console.error(error);
        alert("결제창 호출 실패. 서버 연결을 확인하세요.");
    }
}
