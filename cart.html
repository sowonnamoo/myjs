9<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문작성</title>
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
    .wrap { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; }
    button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
    <h1>주문 결제</h1>
    <div id="item-info">상품: 스티커</div>
    <div id="price-info">금액: 1000원</div> <br>
    <button onclick="requestPay()">카드 결제하기</button>
</div>

<script>
 const STORE_ID = "store-d7a076d7-2e69-4b3e-88d2-7d08759d5d75";
const CHANNEL_KEY = "channel-key-7d98f49a-1876-4ea1-87b6-fe635dd904e0";

    async function requestPay() {
        const paymentId = "PAY_" + new Date().getTime();
        
        try {
            // PortOne v2 결제창 호출
            const response = await PortOne.requestPayment({
                storeId: STORE_ID,
                channelKey: CHANNEL_KEY,
                paymentId: paymentId,
                orderName: "스티커 주문",
                totalAmount: 1000, // 반드시 숫자 형태여야 함
                currency: "KRW",
                payMethod: "CARD"
            });

            // 결제창이 닫힌 후 응답 확인
            if (response.code != null) {
                // 결제 실패 시
                alert("결제 실패: " + response.message);
            } else {
                // 결제 성공 시 success.html로 이동
                window.location.href = "success.html";
            }
        } catch (e) {
            alert("결제 오류 발생: " + e.message);
        }
    }
</script>
</body>
</html>
