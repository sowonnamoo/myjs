1<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문작성</title>

    <style>
        body { margin:0; background:#f5f5f7; font-family:'Apple SD Gothic Neo'; }
        .wrap { max-width:600px; margin:0 auto; padding:20px; }
        .cart-item { background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; }
        .form-box { background:#fff; padding:20px; border-radius:15px; margin-top:20px; }
        input { width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
        .bottom { background:#fff; padding:20px; border-radius:15px; margin-top:20px; }
        .pay-btn { width:100%; padding:15px; background:#007AFF; color:#fff; border:none; border-radius:10px; cursor:pointer; }
        .bank-btn { width:100%; padding:15px; background:#111; color:#fff; border:none; border-radius:10px; cursor:pointer; margin-top:8px; }
    </style>

    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>

<body>

<div class="wrap">
    <h1>🛒 주문작성</h1>
    <div id="cart-list"></div>

    <div class="form-box">
        <h3>주문자 정보</h3>
        <input id="name" placeholder="성함">
        <input id="phone" placeholder="전화번호">
        <input id="address" placeholder="주소">
        <input id="detailAddress" placeholder="상세주소">
    </div>

    <div class="bottom">
        <div id="total-price">총 결제금액 : 0원</div>
        <button class="pay-btn" onclick="goCard()">카드결제</button>
        <button class="bank-btn" onclick="goBankTransfer()">무통장 입금</button>
    </div>
</div>

<script>
const STORE_ID = "store-d7a076d7-2e69-4b3e-88d2-7d08759d5d75";
const CHANNEL_KEY = "channel-key-7d98f49a-1876-4ea1-87b6-fe635dd904e0";

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// 장바구니 항목 삭제 및 재렌더링
window.deleteItem = function(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
};

function render(){
    let list = document.getElementById("cart-list");
    list.innerHTML = "";
    total = 0;

    cart.forEach((item, index)=>{
        total += Number(item.price);

        list.innerHTML += `
        <div class="cart-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b>${item.item}</b> (${item.qty}개)<br>
                    ${item.width}×${item.height}<br>
                    ${Number(item.price).toLocaleString()}원
                </div>
                <button onclick="deleteItem(${index})" style="background:#ff3b30; color:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">삭제</button>
            </div>
        </div>`;
    });

    document.getElementById("total-price").innerText = "총 결제금액 : " + total.toLocaleString() + "원";
}

window.goCard = async function () {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value + " " + document.getElementById("detailAddress").value;

    if (!name || !phone || !address.trim()) return alert("모든 정보를 입력해주세요.");

    const paymentId = "PAY_" + Date.now();

    const orderData = {
        orderId: paymentId,
        name, phone, address, total, items: cart,
        payment: "카드결제",
        createdAt: new Date().toISOString()
    };
    localStorage.setItem("latestOrder", JSON.stringify(orderData));

    try {
        const response = await PortOne.requestPayment({
            storeId: STORE_ID,
            channelKey: CHANNEL_KEY,
            paymentId: paymentId,
            orderName: "주문상품",
            totalAmount: Number(total),
            currency: "KRW",
            payMethod: "CARD",
            customer: { name, phoneNumber: phone }
        });

        if (response.code != null) {
            alert("결제 실패: " + response.message);
        } else {
            localStorage.removeItem("cart");
            location.href = "success.html";
        }
    } catch (e) {
        alert("결제 처리 중 오류가 발생했습니다.");
        console.error(e);
    }
};

window.goBankTransfer = function(){
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value + " " + document.getElementById("detailAddress").value;
    if(!name || !phone || !address.trim()) return alert("모든 정보를 입력해주세요.");

    localStorage.setItem("latestOrder", JSON.stringify({
        orderId: "ORD_" + Date.now(),
        name, phone, address, total, items: cart,
        payment: "무통장입금",
        createdAt: new Date().toISOString()
    }));
    
    localStorage.removeItem("cart");
    location.href = "success2.html";
}

render();
</script>

</body>
</html>
