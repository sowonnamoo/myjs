7<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 결제</title>
<!-- PortOne v2 SDK -->
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
    .wrap { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; }
    button { width: 100%; padding: 15px; background: #d9534f; color: white; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
    <h1>주문 결제 (이니시스)</h1>
    <div id="item-info">상품: 스티커</div>
    <div id="price-info">금액: 1000원</div> <br>
    <button onclick="requestPay()">카드 결제하기</button>
</div>

<script>
    // 포트원 관리자 콘솔에서 이니시스용으로 설정한 키를 입력하세요
    const STORE_ID = "store-d"; 
    const INICIS_CHANNEL_KEY = "채널키-여기에-입력"; 

    async function requestPay() {
        const paymentId = "PAY_" + new Date().getTime();
        
        try {
            // PortOne v2를 통한 이니시스 결제 호출
            const response = await PortOne.requestPayment({
                storeId: store-d7a076d7-2e69-4b3e-88d2-7d08759d5d75,
                channelKey: channel-key-3af15aef-d8b5-4778-a372-d5be6a6176f2, // 이니시스 연동 채널키
                paymentId: paymentId,
                orderName: "스티커 주문",
                totalAmount: 1000,
                currency: "KRW",
                payMethod: "CARD"
            });

            if (response.code != null) {
                alert("결제 실패: " + response.message);
            } else {
                window.location.href = "success.html";
            }
        } catch (e) {
            alert("결제 오류 발생: " + e.message);
        }
    }
</script>
</body>
</html>
