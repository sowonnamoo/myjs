<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문작성</title>

<style>
body { margin:0; background:#f5f5f7; font-family:'Apple SD Gothic Neo'; }
.wrap { max-width:600px; margin:0 auto; padding:20px; }
.cart-item { background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; }
.form-box { background:#fff; padding:20px; border-radius:15px; margin-top:20px; }
input { width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; }
.bottom { background:#fff; padding:20px; border-radius:15px; margin-top:20px; }
.pay-btn { width:100%; padding:15px; background:#007AFF; color:#fff; border:none; border-radius:10px; }
.bank-btn { width:100%; padding:15px; background:#111; color:#fff; border:none; border-radius:10px; margin-top:8px; }
</style>

<!-- ✔ 포트원 V2 -->
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>

</head>

<body>

<div class="wrap">

<h1>🛒 주문작성</h1>

<div id="cart-list"></div>

<div class="form-box">
<h3>주문자 정보</h3>
<input id="name" placeholder="성함">
<input id="phone" placeholder="전화번호">
<input id="address" placeholder="주소">
<input id="detailAddress" placeholder="상세주소">
</div>

<div class="bottom">
<div id="total-price">총 결제금액 : 0원</div>

<button class="pay-btn" onclick="goCard()">카드결제</button>
<button class="bank-btn" onclick="goBankTransfer()">무통장 입금</button>
</div>

</div>

<script>
const STORE_ID = "store-d7a076d7-2e69-4b3e-88d2-7d08759d5d75";
const CHANNEL_KEY = "channel-key-447d35ac-04eb-4b1d-92d0-71da4bb32b69";

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

function render(){
let list = document.getElementById("cart-list");
list.innerHTML = "";
total = 0;

cart.forEach((item, i)=>{
total += Number(item.price);

list.innerHTML += `
<div class="cart-item">
<b>${item.item}</b> (${item.qty}개)<br>
${item.width}×${item.height}<br>
${Number(item.price).toLocaleString()}원
</div>`;
});

document.getElementById("total-price").innerText =
"총 결제금액 : " + total.toLocaleString() + "원";
}

window.goCard = async function(){

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const address = document.getElementById("address").value + " " +
document.getElementById("detailAddress").value;

if(!name || !phone || !address.trim()){
alert("정보 입력");
return;
}

const paymentId = "ORD_" + Date.now();

localStorage.setItem("latestOrder", JSON.stringify({
orderId: paymentId,
name, phone, address,
total,
items: cart,
payment: "카드결제",
createdAt: new Date().toISOString()
}));

try{

await PortOne.requestPayment({
    storeId: STORE_ID,
    channelKey: CHANNEL_KEY,
    paymentId: paymentId,
    orderName: "주문상품",
    totalAmount: total,
    currency: "KRW",
    payMethod: "CARD",
    redirectUrl: "https://sowonnamoo.github.io/myjs/success"
});

}catch(e){
alert("결제 실패");
console.log(e);
}

}

window.goBankTransfer = function(){

const orderId = "ORD_" + Date.now();

localStorage.setItem("latestOrder", JSON.stringify({
orderId,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
total,
items: cart,
payment: "무통장입금",
payMethod: "bank",
createdAt: new Date().toISOString()
}));

location.href = "success2.html";
}

render();
</script>

</body>
</html>
