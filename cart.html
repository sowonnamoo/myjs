<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문작성</title>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .wrap { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        
        .cart-item { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .info { flex: 1; line-height: 1.6; font-size: 14px; }
        .del-btn { background: #ff3b30; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-left: 10px; }
        
        .form-box { background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .bottom { margin-top: 20px; background: #fff; padding: 20px; border-radius: 15px; }
        .total { font-size: 20px; font-weight: bold; color: #e31e23; margin-bottom: 15px; }
        .pay-btn { width: 100%; padding: 15px; background: #007AFF; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .bank-btn { width: 100%; padding: 15px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrap">
    <h1>🛒 주문작성</h1>
    <div id="cart-list"></div>

    <div class="form-box">
        <h2>주문자 정보</h2>
        <input id="name" placeholder="성함">
        <input id="phone" placeholder="전화번호">
        <input id="address" placeholder="주소">
        <input id="detailAddress" placeholder="상세주소">
    </div>

    <div class="bottom">
        <div class="total" id="total-price">총 결제금액 : 0원</div>
        <button class="pay-btn" onclick="goCard()">카드결제</button>
        <button class="bank-btn" onclick="goBankTransfer()">무통장 입금</button>
    </div>
</div>

<script src="https://js.tosspayments.com/v1"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzHogA2iaQ...",
        authDomain: "ecogr-636c6.firebaseapp.com",
        projectId: "ecogr-636c6",
        storageBucket: "ecogr-636c6.firebasestorage.app",
        messagingSenderId: "95745358447",
        appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const TOSS_CLIENT_KEY = "test_ck_O6BYq7GWPVvXKgZXBNl8NE5vbo1d";

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    // 삭제 기능 추가
    window.deleteItem = function(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        render();
    };

    function render(){
        const list = document.getElementById("cart-list");
        list.innerHTML = "";
        total = 0;

        cart.forEach((item, index) => {
            total += Number(item.price);
            list.innerHTML += `
            <div class="cart-item">
                <div class="info">
                    <b>${item.item}</b> (${item.qty}개)<br>
                    규격: ${item.width} × ${item.height} | 가격: ${Number(item.price).toLocaleString()}원<br>
                    <a href="${item.imageUrl}" target="_blank" style="color:#007AFF;">파일 확인</a>
                </div>
                <button class="del-btn" onclick="deleteItem(${index})">삭제</button>
            </div>`;
        });
        document.getElementById("total-price").innerText = "총 결제금액 : " + total.toLocaleString() + "원";
    }

    // 카드 결제 함수 생략 (기존과 동일)
    window.goCard = function () {
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        if(!name || !phone) return alert("정보를 입력해주세요.");
        const tossPayments = TossPayments(TOSS_CLIENT_KEY);
        tossPayments.requestPayment("카드", { amount: total, orderId: "ORD_" + Date.now(), orderName: "주문 상품", customerName: name, successUrl: window.location.origin + "/success.html", failUrl: window.location.origin + "/fail.html" });
    };

    window.goBankTransfer = async function(){
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const address = document.getElementById("address").value;
        if(!name || !phone || !address) return alert("필수 정보를 입력해주세요.");
        
        const orderData = { orderId: "ORD_" + Date.now(), name, phone, address: address + " " + document.getElementById("detailAddress").value, total, items: cart, createdAt: new Date().toISOString() };
        await addDoc(collection(db, "orders"), orderData);
        localStorage.removeItem("cart");
        location.href = "order-complete.html";
    };

    render();
</script>
</body>
</html>
