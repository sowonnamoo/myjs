1<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문작성</title>
    <script src="https://pay.kcp.co.kr/plugin/payplus_web.js"></script>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .wrap { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .cart-item { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .info { flex: 1; line-height: 1.6; font-size: 14px; }
        .del-btn { background: #ff3b30; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-left: 10px; }
        .form-box { background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .bottom { margin-top: 20px; background: #fff; padding: 20px; border-radius: 15px; }
        .total { font-size: 20px; font-weight: bold; color: #e31e23; margin-bottom: 15px; }
        .pay-btn { width: 100%; padding: 15px; background: #007AFF; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .bank-btn { width: 100%; padding: 15px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrap">
    <h1>🛒 주문작성</h1>
    <div id="cart-list"></div>

    <div class="form-box">
        <h2>주문자 정보</h2>
        <input id="name" placeholder="성함">
        <input id="phone" placeholder="전화번호">
        <input id="address" placeholder="주소">
        <input id="detailAddress" placeholder="상세주소">
    </div>

    <div class="bottom">
        <div class="total" id="total-price">총 결제금액 : 0원</div>
        <button class="pay-btn" onclick="goCard()">카드결제</button>
        <button class="bank-btn" onclick="goBankTransfer()">무통장 입금</button>
    </div>
</div>

<form name="order_info" method="post">
    <input type="hidden" name="ordr_idxx" id="ordr_idxx">
    <input type="hidden" name="good_name" id="good_name" value="주문 상품">
    <input type="hidden" name="good_mny" id="good_mny">
    <input type="hidden" name="buyr_name" id="buyr_name">
    <input type="hidden" name="buyr_tel1" id="buyr_tel1">
    <input type="hidden" name="site_cd" value="channel-key-7d98f49a-1876-4ea1-87b6-fe635dd904e0">
</form>

<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    window.deleteItem = function(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        render();
    };

    function render(){
        const list = document.getElementById("cart-list");
        list.innerHTML = "";
        total = 0;
        cart.forEach((item, index) => {
            total += Number(item.price);
            list.innerHTML += `
            <div class="cart-item">
                <div class="info">
                    <b>${item.item}</b> (${item.qty}개)<br>
                    규격: ${item.width} × ${item.height} | 가격: ${Number(item.price).toLocaleString()}원<br>
                    <a href="${item.imageUrl}" target="_blank" style="color:#007AFF;">파일 확인</a>
                </div>
                <button class="del-btn" onclick="deleteItem(${index})">삭제</button>
            </div>`;
        });
        document.getElementById("total-price").innerText = "총 결제금액 : " + total.toLocaleString() + "원";
    }

    // 카드 결제: KCP 결제창 호출
    window.goCard = function () {
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const address = document.getElementById("address").value + " " + document.getElementById("detailAddress").value;
        
        if(!name || !phone || !address.trim()) return alert("모든 정보를 입력해주세요.");

        const orderId = "ORD_" + Date.now();
        
        // 주문 데이터 저장
        const orderData = {
            orderId, name, phone, address, total, items: cart,
            payment: "카드결제",
            createdAt: new Date().toISOString()
        };
        localStorage.setItem("latestOrder", JSON.stringify(orderData));

        // KCP 연동을 위한 폼 데이터 설정
        document.getElementById("ordr_idxx").value = orderId;
        document.getElementById("good_mny").value = total;
        document.getElementById("buyr_name").value = name;
        document.getElementById("buyr_tel1").value = phone;

        // KCP 결제창 호출
        jsf__pay(document.order_info);
    };

    // 무통장 입금
    window.goBankTransfer = async function(){
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const address = document.getElementById("address").value + " " + document.getElementById("detailAddress").value;
        if(!name || !phone || !address.trim()) return alert("모든 정보를 입력해주세요.");
        
        const orderData = { 
            orderId: "ORD_" + Date.now(), 
            name, phone, address, total, items: cart, 
            payment: "무통장입금",
            status: "입금대기",
            createdAt: new Date().toISOString() 
        };
        
        localStorage.setItem("latestOrder", JSON.stringify(orderData));
        localStorage.removeItem("cart");
        location.href = "https://sowonnamoo.github.io/myjs/success2";
    };

    render();
</script>
</body>
</html>
