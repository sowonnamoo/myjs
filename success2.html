<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입금 안내</title>
    <!-- [기존 스타일 유지] -->
    <style>
        body { margin: 0; background: #f5f5f7; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; }
        .wrap { max-width: 500px; margin: 0 auto; }
        .card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 22px; color: #111; margin-bottom: 20px; text-align: center; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 20px 0; }
        .total-price { font-size: 20px; color: #e31e23; font-weight: bold; }
        .copy-btn { margin-left: 10px; padding: 5px 10px; font-size: 12px; background: #eee; border: none; border-radius: 6px; cursor: pointer; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 13px; cursor: pointer; color: #333; }
        .btn-main { width: 100%; padding: 16px; background: #007AFF; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        @media print { body > *:not(#print-area) { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body>

<div class="wrap">
    <div class="card">
        <h1>입금 확인 부탁드립니다</h1>
        <p style="text-align:center; font-size:14px; color:#666;">주문이 정상적으로 접수되었습니다.<br>아래 계좌로 입금해 주시면 확인 후 제작됩니다.</p>
        <div class="info-box">
            <p>입금 은행: <b>국민은행</b></p>
            <p>계좌 번호: <b id="account-num">123456789012</b> <button class="copy-btn" onclick="copyAccount()">복사</button></p>
            <p>예금주: <b>(주)OOO</b></p>
            <p>입금 금액: <span class="total-price" id="total-amount">0원</span></p>
        </div>
        <div id="order-details"></div>
    </div>
    <!-- [기존 버튼들 유지] -->
    <button class="btn-main" onclick="location.href='https://sowonnamoo.github.io/myjs/'">확인</button>
</div>

<!-- [기존 인쇄 영역 유지] -->
<div id="print-area" style="display:none;">...</div>

<!-- [수정된 스크립트] -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzHogA2iaQ...",
        authDomain: "ecogr-636c6.firebaseapp.com",
        projectId: "ecogr-636c6",
        storageBucket: "ecogr-636c6.firebasestorage.app",
        messagingSenderId: "95745358447",
        appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const orderData = JSON.parse(localStorage.getItem("latestOrder"));

    if (!orderData) {
        alert("주문 정보를 찾을 수 없습니다.");
        location.href = "https://sowonnamoo.github.io/myjs/";
    } else {
        // 파이어베이스 저장 로직
        const savedFlag = localStorage.getItem("saved_" + orderData.orderId);
        if(!savedFlag) {
            try {
                await addDoc(collection(db, "orders"), {
                    ...orderData,
                    payment: "무통장입금",
                    status: "입금대기"
                });
                localStorage.setItem("saved_" + orderData.orderId, "1");
            } catch(err) { console.error(err); }
        }
        localStorage.removeItem("cart");

        // 화면 출력
        document.getElementById("total-amount").innerText = orderData.total.toLocaleString() + "원";
        document.getElementById("order-details").innerHTML = `
            <div style="font-size:14px; color:#333; border-top:1px solid #eee; padding-top:15px;">
                <p><b>주문번호:</b> ${orderData.orderId}</p>
                ${orderData.items.map(item => `
                    <div style="margin-bottom:10px;">
                        <b>${item.item}</b> (${item.qty}개) / ${item.width}×${item.height}<br>
                        <a href="${item.imageUrl}" target="_blank" style="color:#007AFF; text-decoration:none;">📄 업로드 파일 보기</a>
                    </div>
                `).join('')}
            </div>
        `;
    }

    window.copyAccount = () => navigator.clipboard.writeText("123456789012").then(() => alert("계좌번호가 복사되었습니다!"));
    // [기존 printReceipt 함수 등 하단에 유지]
</script>
</body>
</html>
