<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>무통장입금 완료</title>

<style>
body{
    margin:0;
    background:#f5f5f7;
    font-family:'Apple SD Gothic Neo',sans-serif;
}

.wrap{
    max-width:600px;
    margin:0 auto;
    padding:20px;
}

.box{
    background:#fff;
    border-radius:16px;
    padding:25px;
    margin-top:30px;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.bank{
    background:#f2f2f2;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    line-height:1.8;
}

.btn{
    width:100%;
    height:52px;
    border:none;
    background:#111;
    color:#fff;
    border-radius:12px;
    margin-top:20px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<div class="wrap">

    <div class="box">

        <div style="font-size:70px;">🏦</div>

        <div class="title">무통장 입금 주문완료</div>

        <div id="info"></div>

        <div class="bank">
            입금은행 : 국민은행<br/>
            계좌번호 : 123456-78-123456<br/>
            예금주 : 홍길동
        </div>

        <button class="btn" onclick="goHome()">
            홈으로 이동
        </button>

    </div>

</div>

<script>

const order = JSON.parse(localStorage.getItem("latestOrder"));

if(order){

    document.getElementById("info").innerHTML = `
        주문번호 : ${order.orderId}<br/><br/>
        주문자 : ${order.name}<br/><br/>
        결제금액 : ${Number(order.total).toLocaleString()}원
    `;

}else{

    document.getElementById("info").innerHTML =
        "주문 정보가 없습니다.";
}

function goHome(){

    location.href = "index.html";
}

</script>

</body>
</html>
