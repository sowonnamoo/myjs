<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>결제완료</title>

    <style>
        body{
            margin:0;
            background:#f5f5f7;
            font-family:'Apple SD Gothic Neo',sans-serif;
        }

        .wrap{
            max-width:600px;
            margin:0 auto;
            padding:20px;
        }

        .box{
            background:#fff;
            border-radius:16px;
            padding:25px;
            margin-top:30px;
        }

        .title{
            font-size:28px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .ok{
            font-size:70px;
        }

        .item{
            padding:12px 0;
            border-bottom:1px solid #eee;
        }

        .home-btn{
            width:100%;
            height:52px;
            border:none;
            background:#007AFF;
            color:#fff;
            border-radius:12px;
            margin-top:20px;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="box">
        <div class="ok">✅</div>
        <div class="title">결제가 완료되었습니다.</div>
        <div id="order-info"></div>
        <button class="home-btn" onclick="goHome()">
            홈으로 이동
        </button>
    </div>
</div>

<script>
    // 로컬 스토리지에서 마지막 주문 정보 가져오기 [cite: 73]
    const order = JSON.parse(localStorage.getItem("latestOrder"));

    if(!order){
        document.getElementById("order-info").innerHTML =
            "<p>주문 정보가 없습니다.</p>";
    } else {
        let html = "";

        // 주문 상세 내역 구성 [cite: 75, 76, 77]
        html += `
            <div class="item">
                <b>주문번호</b><br/>
                ${order.orderId}
            </div>
            <div class="item">
                <b>주문자</b><br/>
                ${order.name}
            </div>
            <div class="item">
                <b>전화번호</b><br/>
                ${order.phone}
            </div>
            <div class="item">
                <b>배송주소</b><br/>
                ${order.address}
            </div>
            <div class="item">
                <b>결제방식</b><br/>
                ${order.payment}
            </div>
            <div class="item">
                <b>결제금액</b><br/>
                ${Number(order.total).toLocaleString()}원
            </div>
        `;

        html += `<div style="margin-top:20px;">`;

        // 주문 상품 리스트 구성 [cite: 78, 79]
        order.items.forEach(item => {
            html += `
                <div class="item">
                    ${item.item} / ${item.qty}개<br/>
                    ${item.width} × ${item.height}<br/>
                    ${Number(item.price).toLocaleString()}원
                </div>
            `;
        });

        html += `</div>`;

        document.getElementById("order-info").innerHTML = html;
    }

    function goHome(){
        location.href = "index.html";
    }
</script>

</body>
</html>
