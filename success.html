<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
</head>
<body style="text-align:center; padding:50px;">
    <h1>🎉 결제가 완료되었습니다!</h1>
    <p>주문 정보를 확인 중입니다...</p>
    <script>
        const order = JSON.parse(localStorage.getItem("latestOrder"));
        if(order) {
            document.body.innerHTML += `<p>주문번호: ${order.orderId}</p><p>결제금액: ${order.total.toLocaleString()}원</p>`;
        }
    </script>
</body>
</html>
