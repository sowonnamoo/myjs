<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f5f5f7; }
        .box { background: white; border: 1px solid #ddd; padding: 30px; border-radius: 15px; max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎉 결제가 완료되었습니다!</h1>
        <p id="order-info"></p>
        <button onclick="location.href='index.html'" style="padding:10px 20px; cursor:pointer;">메인으로 이동</button>
    </div>

    <script>
        const orderData = JSON.parse(localStorage.getItem("latestOrder"));
        if (orderData) {
            document.getElementById("order-info").innerHTML = `
                주문번호: ${orderData.orderId}<br>
                결제금액: ${orderData.total.toLocaleString()}원<br>
                받는사람: ${orderData.name}
            `;
            // 결제 완료 후 장바구니 비우기
            localStorage.removeItem("cart");
        } else {
            document.getElementById("order-info").innerText = "주문 정보를 찾을 수 없습니다.";
        }
    </script>
</body>
</html>
