<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title>결제완료</title>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: sans-serif; }
        .wrap { max-width: 600px; margin: 0 auto; padding: 20px; }
        .box { background: #fff; border-radius: 16px; padding: 25px; margin-top: 30px; }
        .item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .btn { width: 100%; height: 52px; border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; color: #fff; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="box">
        <div id="order-info">결제 정보를 불러오는 중...</div>
        <button class="btn" style="background:#007AFF;" onclick="location.href='index.html'">홈으로 이동</button>
        <button class="btn" style="background:#ff3b30;" onclick="cancelOrder()">결제 취소</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = { /* 본인의 설정값 그대로 사용 */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    const order = JSON.parse(localStorage.getItem("latestOrder"));

    // 화면에 정보 출력 (기존 로직)
    document.getElementById("order-info").innerHTML = `<div>주문번호: ${order.orderId}</div><p>결제가 완료되었습니다.</p>`;

    window.cancelOrder = async () => {
        if(!confirm("정말 취소하시겠습니까?")) return;
        const q = query(collection(db, "orders"), where("orderId", "==", order.orderId));
        const snap = await getDocs(q);
        snap.forEach(async (doc) => {
            await updateDoc(doc.ref, { status: "결제취소" });
        });
        alert("취소되었습니다.");
        location.href = "cancel-complete.html";
    };
</script>
</body>
</html>
