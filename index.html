<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그래픽스아이엠 - 큰글씨 실시간 견적기</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Noto Sans KR', sans-serif;
    }
    body {
        background: #f5f5f5;
        color: #222;
        display: flex;
        justify-content: center;
    }
    .mobile-container {
        width: 100%;
        max-width: 500px;
        background: #fcfcfc;
        min-height: 100vh;
        padding-bottom: 40px;
    }
    .shop-header {
        background-color: #2b5797;
        color: #fff;
        display: flex;
        align-items: center;
        padding: 12px 15px;
    }
    .menu-btn {
        background: #60a917;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        text-align: center;
        line-height: 1.2;
    }
    .logo-area {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: -1px;
        margin-left: 15px;
    }
    
    .product-title {
        text-align: center;
        font-size: 32px;
        font-weight: 900;
        color: #e31e23;
        margin: 15px 0 10px 0;
    }
    
    .order-card {
        background: #ffffff;
        border: 3px solid #000000;
        border-radius: 12px;
        margin: 0 10px;
        padding: 15px;
    }
    
    .form-group {
        margin-bottom: 12px;
    }
    .form-group label {
        display: block;
        font-size: 20px;
        font-weight: bold;
        color: #000;
        margin-bottom: 6px;
    }
    .form-group label .sub-info {
        color: #666;
        font-size: 15px;
        margin-left: 6px;
        font-weight: bold;
    }
    .form-control {
        width: 100%;
        padding: 12px 12px;
        border: 2px solid #888;
        border-radius: 6px;
        font-size: 20px;
        font-weight: bold;
        color: #000;
        outline: none;
        background: #fff;
    }
    
    .result-box {
        background: #fff0f1;
        border-radius: 6px;
        padding: 12px;
        margin-top: 15px;
        border: 1px solid #ffccd0;
    }
    .result-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .result-left {
        font-size: 17px;
        color: #333;
        line-height: 1.5;
    }
    .result-right {
        text-align: right;
    }
    .total-price-text {
        font-size: 36px;
        font-weight: 900;
        color: #e31e23;
        display: block;
        line-height: 1.2;
    }
    .vat-text {
        font-size: 15px;
        color: #555;
        font-weight: bold;
    }
    
    .print-btn-wrapper {
        text-align: right;
        margin-top: 6px;
    }
    .print-estimate-btn {
        display: inline-flex;
        align-items: center;
        background: #e8e8e8;
        color: #222;
        border: 2px solid #999;
        padding: 6px 12px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
    }
    .print-estimate-btn svg {
        margin-right: 5px;
        width: 16px;
        height: 16px;
        fill: currentColor;
    }

    .submit-btn {
        width: 100%;
        background: #1e5fa9;
        color: #fff;
        border: none;
        padding: 14px;
        font-size: 28px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 12px;
        box-shadow: 0 3px 5px rgba(0,0,0,0.2);
    }
    
    .info-btn-wrap {
        text-align: center;
        margin: 25px 0;
    }
    .info-link-btn {
        display: inline-block;
        background: #73b324;
        color: #fff;
        padding: 12px 40px;
        border-radius: 6px;
        font-size: 22px;
        font-weight: bold;
        text-decoration: none;
        cursor: pointer;
        border: none;
    }

    .detail-image-container {
        display: none;
        margin: 0 10px;
        padding: 10px 0;
        border-top: 2px dashed #ccc;
        text-align: center;
    }
    .detail-image-container img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="mobile-container">
    
    <header class="shop-header">
        <div class="menu-btn">메뉴<br>목록</div>
        <div class="logo-area"><span>G&R</span> 그래픽스아이엠</div>
    </header>

    <h1 class="product-title">제품명</h1>

    <div class="order-card">
        
        <div class="form-group">
            <label>모음 재질선택</label>
            <select class="form-control" id="material" onchange="totalCal()">
                <option value="무코팅스티커">무코팅스티커 (2박3일 소요)</option>
                <option value="코팅스티커">코팅스티커 (1박2일 소요)</option>
            </select>
        </div>

        <div class="form-group">
            <label>가로(mm) <span class="sub-info">(30 ~ 510)</span></label>
            <input type="number" id="w" class="form-control" value="50" min="30" max="510" oninput="totalCal()" onchange="checkLimit('w', 30, 510, '가로 사이지는 30mm ~ 510mm만 가능합니다.')">
        </div>

        <div class="form-group">
            <label>세로(mm) <span class="sub-info">(30 ~ 760)</span></label>
            <input type="number" id="h" class="form-control" value="50" min="30" max="760" oninput="totalCal()" onchange="checkLimit('h', 30, 760, '세로 사이즈는 30mm ~ 760mm만 가능합니다.')">
        </div>

        <div class="form-group">
            <label>주문 수량 <span class="sub-info">(1 ~ 30000장)</span></label>
            <input type="number" id="q" class="form-control" value="1000" min="1" max="30000" oninput="totalCal()" onchange="checkLimit('q', 1, 30000, '수량은 1장 ~ 30000장만 가능합니다.')">
        </div>

        <div class="form-group">
            <label>후지칼선 선택</label>
            <select class="form-control" id="line_dir">
                <option value="세로방향">세로방향</option>
                <option value="가로방향">가로방향</option>
            </select>
        </div>

        <div class="result-box" id="res_area">
            <div class="result-flex">
                <div class="result-left">
                    <div id="price_info"></div>
                </div>
                <div class="result-right">
                    <span class="vat-text">부가세포함</span>
                    <span class="total-price-text" id="total_price">0원</span>
                </div>
            </div>
        </div>

        <div class="print-btn-wrapper">
            <button type="button" class="print-estimate-btn" onclick="openEstimatePrint()">
                <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                견적서 인쇄하기
            </button>
        </div>

        <button type="button" class="submit-btn" id="buy_btn">주문하기</button>

    </div>

    <div class="info-btn-wrap">
        <button type="button" class="info-link-btn" id="toggle_info_btn" onclick="toggleProductDetail()">⬇️ 상품 상세보기 펼치기</button>
    </div>

    <div class="detail-image-container" id="detail_view_area">
        <img src="이미지.jpg" alt="상품 상세 정보 1">
    </div>

</div>

<script>
const PRICE_TABLE = {
    500: { baseMultiplier: 1.324, minimum: 3740, multiple: 1 },
    1000: { baseMultiplier: 1.857, minimum: 5390, multiple: 1 }
};

for(let qty = 2000; qty <= 30000; qty += 1000){
    PRICE_TABLE[qty] = { baseMultiplier: 1.857, minimum: 5390, multiple: 1 + (((qty / 1000) - 1) * 0.99) };
}

function getPriceSection(qty){
    if(qty <= 500) return 500;
    return Math.ceil(qty / 1000) * 1000;
}

let current_ship_date = "";
let current_total_price = 0;

function calculateShippingDate(daysToShip) {
    let current = new Date();
    let addedDays = 0;
    const HOLIDAYS = ["01-01", "03-01", "05-05", "06-06", "08-15", "10-03", "10-09", "12-25"];

    while (addedDays < daysToShip) {
        current.setDate(current.getDate() + 1);
        let dayOfWeek = current.getDay(); 
        let month = String(current.getMonth() + 1).padStart(2, '0');
        let date = String(current.getDate()).padStart(2, '0');
        let dateStr = `${month}-${date}`;

        if (dayOfWeek === 0 || dayOfWeek === 6 || HOLIDAYS.includes(dateStr)) continue;
        addedDays++;
    }
    return `${current.getMonth() + 1}월 ${current.getDate()}일`;
}

function checkLimit(id, min, max, msg) {
    const element = document.getElementById(id);
    let val = Number(element.value);
    if (val < min || val > max) {
        alert(msg);
        if (val > max) element.value = max;
        if (val < min) element.value = min;
        totalCal();
    }
}

window.onload = function() { totalCal(); };

function totalCal(){
    const 재질 = document.getElementById('material').value;
    const 가로 = Number(document.getElementById('w').value);
    const 세로 = Number(document.getElementById('h').value);
    const 입력수량 = Number(document.getElementById('q').value);

    if(가로 < 30 || 가로 > 510 || 세로 < 30 || 세로 > 760 || 입력수량 < 1 || 입력수량 > 30000){
        document.getElementById('total_price').innerHTML = "- 원";
        document.getElementById('price_info').innerHTML = "<span style='color:#ff5e62; font-size:16px; font-weight:bold;'>숫자 확인 중..</span>";
        return;
    }

    const 적용수량 = getPriceSection(입력수량);
    const setting = PRICE_TABLE[적용수량];
    const 면적 = 가로 * 세로;

    let 최종가 = 면적 * setting.baseMultiplier * setting.multiple;
    if(최종가 < setting.minimum) 최종가 = setting.minimum;
    최종가 = Math.round(최종가 / 10) * 10;
    
    current_total_price = 최종가;

    let 소요영업일 = (재질 === "무코팅스티커") ? 3 : 2;
    current_ship_date = calculateShippingDate(소요영업일);

    document.getElementById('total_price').innerHTML = 최종가.toLocaleString() + '원';
    
    document.getElementById('price_info').innerHTML = `
        <strong style="color:#2b5797; font-size: 20px; display:inline-block; margin-bottom:4px;">${current_ship_date} 발송 예정</strong><br>
        <span style="color:#222; font-size:16px; font-weight:bold;">${가로}×${세로}mm / ${입력수량.toLocaleString()}장</span>
    `;

    const buyBtn = document.getElementById('buy_btn');
    buyBtn.onclick = function(){
        location.href = `upload.html?w=${가로}&h=${세로}&qty=${입력수량}&price=${최종가}&ship=${current_ship_date}`;
    };
}

function toggleProductDetail() {
    const area = document.getElementById('detail_view_area');
    const btn = document.getElementById('toggle_info_btn');

    if (area.style.display === 'block') {
        area.style.display = 'none';
        btn.innerHTML = '⬇️ 상품 상세보기 펼치기';
    } else {
        area.style.display = 'block';
        btn.innerHTML = '⬆️ 상품 정보 다시 접기';
        area.scrollIntoView({ behavior: 'smooth' });
    }
}

/* ==========================================================
💡 [전면 개조] 스마트폰 화면 폭에 100% 맞춰지는 모바일 전용 견적 창
========================================================== */
function openEstimatePrint() {
    const 재질 = document.getElementById('material').value;
    const 가로 = document.getElementById('w').value;
    const 세로 = document.getElementById('h').value;
    const 수량 = Number(document.getElementById('q').value).toLocaleString();
    const 총액 = current_total_price.toLocaleString();
    
    const 공급가액 = Math.round(current_total_price / 1.1).toLocaleString();
    const 부가세 = (current_total_price - Math.round(current_total_price / 1.1)).toLocaleString();

    const 오늘 = new Date();
    const 날짜텍스트 = `${오늘.getFullYear()}년 ${String(오늘.getMonth()+1).padStart(2,'0')}월 ${String(오늘.getDate()).padStart(2,'0')}일`;

    // 팝업창 크기 자체도 모바일 비율에 적합하도록 변경
    const printWindow = window.open('', '_blank', 'width=450,height=750,scrollbars=yes');
    
    const printHtml = `
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>모바일 견적 명세서</title>
        <style>
            body { font-family: 'Malgun Gothic', sans-serif; color: #111; padding: 10px; line-height: 1.4; background:#fff; }
            .print-wrap { width: 100%; max-width: 100%; margin: 0 auto; }
            
            .header { border-bottom: 3px solid #1e5fa9; padding-bottom: 8px; margin-bottom: 15px; }
            .title { font-size: 28px; font-weight: bold; color: #1e5fa9; text-align: center; margin-bottom: 5px; }
            .meta-info { text-align: center; font-size: 13px; color: #444; font-weight: bold; line-height: 1.5; }
            
            /* 💡 좌우 분리 구조를 모바일용 상하 흐름 구조로 교체 */
            .box { border: 2px solid #666; padding: 10px; margin-bottom: 10px; background: #fafafa; border-radius: 6px; }
            .box h2 { font-size: 16px; margin-bottom: 8px; border-bottom: 1px solid #aaa; padding-bottom: 3px; color: #000; }
            .row { font-size: 14px; margin-bottom: 4px; font-weight: bold; }
            .lbl { display: inline-block; width: 75px; color: #555; }
            
            .amount-box { background: #f4f7fc; border: 2px solid #1e5fa9; padding: 12px; font-size: 16px; font-weight: bold; margin-bottom: 15px; text-align: center; border-radius: 6px; }
            .amount-box .price { color: #e31e23; font-size: 22px; font-weight: 900; display: block; margin-top: 4px; }
            
            /* 💡 표가 화면 밖으로 탈출하지 않도록 가로비율 압축 조정 */
            .grid-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
            .grid-table th { background: #1e5fa9; color: #fff; border: 1px solid #1a5394; padding: 8px 4px; font-size: 14px; }
            .grid-table td { border: 1px solid #555; padding: 10px 4px; font-size: 13px; font-weight: bold; }
            .text-center { text-align: center; }
            .text-right { text-align: right; }
            
            .notice { background: #f9f9f9; border: 1px solid #ccc; padding: 10px; border-radius: 4px; }
            .notice-t { font-weight: bold; font-size: 14px; color: #000; margin-bottom: 4px; }
            .notice-c { font-size: 13px; color: #333; padding-left: 15px; margin: 0; font-weight: bold; line-height: 1.5; }
            
            .btn-area { text-align: center; margin-top: 20px; margin-bottom: 20px; }
            .p-btn { background: #222; color: #fff; border: none; padding: 12px 0; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 6px; }
            
            /* 실제 종이로 찍거나 PDF 변환할 때 버튼 숨김 처리 */
            @media print { .btn-area { display: none; } body { padding: 0; } }
        </style>
    </head>
    <body>
        <div class="print-wrap">
            <div class="header">
                <div class="title">견 적 서</div>
                <div class="meta-info">
                    발행일: ${날짜텍스트}<br>
                    견적번호: GNR-${오늘.getFullYear()}${String(오늘.getMonth()+1).padStart(2,'0')}-01
                </div>
            </div>
            
            <div class="box">
                <h2>공급 받는 자 (고객용)</h2>
                <div class="row"><span class="lbl">고객명</span><span>온라인 즉시 견적 고객 귀하</span></div>
                <div class="row"><span class="lbl">참조</span><span>인터넷 자동 계산 시스템</span></div>
            </div>
            
            <div class="box" style="border-top: 4px solid #1e5fa9;">
                <h2>공급 자 (사업자)</h2>
                <div class="row"><span class="lbl">등록번호</span><span>123-45-67890</span></div>
                <div class="row"><span class="lbl">상호/대표</span><span>그래픽스아이엠 / 홍길동</span></div>
                <div class="row"><span class="lbl">연락처</span><span>02-1234-5678</span></div>
            </div>
            
            <div class="amount-box">
                총 합계금액 (부가세 포함)
                <span class="price">₩ ${총액} 원</span>
            </div>
            
            <table class="grid-table">
                <thead>
                    <tr>
                        <th style="width:35%;">품명</th>
                        <th style="width:25%;">규격</th>
                        <th style="width:20%;">수량</th>
                        <th style="width:20%;">금액</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-size:12px; word-break:break-all;">${재질}</td>
                        <td class="text-center" style="font-size:12px;">${가로}×${세로}</td>
                        <td class="text-right" style="font-size:12px;">${수량}장</td>
                        <td class="text-right" style="font-size:12px;">${총액}원</td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right" style="background:#fafafa; color:#333; padding:6px;">공급가액</td>
                        <td class="text-right" style="background:#fafafa; padding:6px;">${공급가액}원</td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right" style="background:#fafafa; color:#333; padding:6px;">부가세</td>
                        <td class="text-right" style="background:#fafafa; padding:6px;">${부가세}원</td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right" style="background:#f4f7fc; color:#1e5fa9; padding:6px;">총 합계</td>
                        <td class="text-right" style="background:#f4f7fc; color:#e31e23; padding:6px;">${총액}원</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="notice">
                <div class="notice-t">【 안내 및 유의사항 】</div>
                <ul class="notice-c">
                    <li>본 명세표는 실시간 가견적서입니다.</li>
                    <li><strong>예상 발송일:</strong> 주말 제외 <span style="color:#2b5797;">${current_ship_date}</span>에 공장 출고 예정입니다.</li>
                </ul>
            </div>
            
            <div class="btn-area">
                <button type="button" class="p-btn" onclick="window.print()">인쇄하기 / PDF 파일 저장</button>
            </div>
        </div>
    </body>
    </html>`;
    
    printWindow.document.write(printHtml);
    printWindow.document.close();
}
</script>

</body>
</html>
