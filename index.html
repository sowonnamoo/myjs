<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그래픽스아이엠 - 큰글씨 실시간 견적기</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f5; color: #222; display: flex; justify-content: center; }
    .mobile-container { width: 100%; max-width: 500px; background: #fcfcfc; min-height: 100vh; padding-bottom: 40px; }
    .shop-header { background-color: #2b5797; color: #fff; display: flex; align-items: center; padding: 12px 15px; }
    .menu-btn { background: #60a917; color: white; padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; text-align: center; line-height: 1.2; }
    .logo-area { font-size: 22px; font-weight: bold; letter-spacing: -1px; margin-left: 15px; }
    .product-title { text-align: center; font-size: 32px; font-weight: 900; color: #e31e23; margin: 15px 0 10px 0; }
    .order-card { background: #ffffff; border: 3px solid #000000; border-radius: 12px; margin: 0 10px; padding: 15px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 20px; font-weight: bold; color: #000; margin-bottom: 6px; }
    .form-group label .sub-info { color: #666; font-size: 15px; margin-left: 6px; font-weight: bold; }
    .form-control { width: 100%; padding: 12px 12px; border: 2px solid #888; border-radius: 6px; font-size: 20px; font-weight: bold; color: #000; outline: none; background: #fff; }
    .result-box { background: #fff0f1; border-radius: 6px; padding: 12px; margin-top: 15px; border: 1px solid #ffccd0; }
    .result-flex { display: flex; justify-content: space-between; align-items: center; }
    .result-left { font-size: 17px; color: #333; line-height: 1.5; }
    .result-right { text-align: right; }
    .total-price-text { font-size: 36px; font-weight: 900; color: #e31e23; display: block; line-height: 1.2; }
    .vat-text { font-size: 15px; color: #555; font-weight: bold; }
    .print-btn-wrapper { text-align: right; margin-top: 6px; }
    .print-estimate-btn { display: inline-flex; align-items: center; background: #e8e8e8; color: #222; border: 2px solid #999; padding: 6px 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    .submit-btn { width: 100%; background: #1e5fa9; color: #fff; border: none; padding: 14px; font-size: 28px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 12px; box-shadow: 0 3px 5px rgba(0,0,0,0.2); }
    .info-btn-wrap { text-align: center; margin: 25px 0; }
    .info-link-btn { display: inline-block; background: #73b324; color: #fff; padding: 12px 40px; border-radius: 6px; font-size: 22px; font-weight: bold; text-decoration: none; cursor: pointer; border: none; }
    .detail-image-container { display: none; margin: 0 10px; padding: 10px 0; border-top: 2px dashed #ccc; text-align: center; }
</style>
</head>
<body>

<div class="mobile-container">
    <header class="shop-header">
        <div class="menu-btn">메뉴<br>목록</div>
        <div class="logo-area"><span>G&R</span> 그래픽스아이엠</div>
    </header>

    <h1 class="product-title">제품명</h1>

    <div class="order-card">
        <div class="form-group">
            <label>모음 재질선택</label>
            <select class="form-control" id="material" onchange="totalCal()">
                <option value="무코팅스티커">무코팅스티커 (2박3일 소요)</option>
                <option value="코팅스티커">코팅스티커 (1박2일 소요)</option>
            </select>
        </div>
        <div class="form-group">
            <label>가로(mm) <span class="sub-info">(30 ~ 510)</span></label>
            <input type="number" id="w" class="form-control" value="50" oninput="totalCal()">
        </div>
        <div class="form-group">
            <label>세로(mm) <span class="sub-info">(30 ~ 760)</span></label>
            <input type="number" id="h" class="form-control" value="50" oninput="totalCal()">
        </div>
        <div class="form-group">
            <label>주문 수량 <span class="sub-info">(1 ~ 30000장)</span></label>
            <input type="number" id="q" class="form-control" value="1000" oninput="totalCal()">
        </div>
        <div class="result-box" id="res_area">
            <div class="result-flex">
                <div class="result-left"><div id="price_info"></div></div>
                <div class="result-right">
                    <span class="vat-text">부가세포함</span>
                    <span class="total-price-text" id="total_price">0원</span>
                </div>
            </div>
        </div>
        <button type="button" class="submit-btn" id="buy_btn">주문하기</button>
    </div>
</div>

<script>
const PRICE_TABLE = {
    500: { baseMultiplier: 1.324, minimum: 3740, multiple: 1 },
    1000: { baseMultiplier: 1.857, minimum: 5390, multiple: 1 }
};
for(let qty = 2000; qty <= 30000; qty += 1000){
    PRICE_TABLE[qty] = { baseMultiplier: 1.857, minimum: 5390, multiple: 1 + (((qty / 1000) - 1) * 0.99) };
}

function totalCal(){
    const 재질 = document.getElementById('material').value;
    const 가로 = Number(document.getElementById('w').value);
    const 세로 = Number(document.getElementById('h').value);
    const 입력수량 = Number(document.getElementById('q').value);
    
    const 적용수량 = (입력수량 <= 500) ? 500 : Math.ceil(입력수량 / 1000) * 1000;
    const setting = PRICE_TABLE[적용수량] || PRICE_TABLE[1000];
    const 면적 = 가로 * 세로;
    let 최종가 = Math.round((면적 * setting.baseMultiplier * setting.multiple) / 10) * 10;
    if(최종가 < setting.minimum) 최종가 = setting.minimum;

    document.getElementById('total_price').innerHTML = 최종가.toLocaleString() + '원';
    document.getElementById('price_info').innerHTML = `<strong>발송 예정일 계산됨</strong><br>${가로}×${세로}mm / ${입력수량.toLocaleString()}장`;

    const buyBtn = document.getElementById('buy_btn');
    buyBtn.onclick = function(){
        const params = new URLSearchParams({
            material: 재질,
            w: 가로,
            h: 세로,
            qty: 입력수량,
            price: 최종가,
            ship: "예정일" // 필요한 경우 날짜 계산 로직 추가
        });
        location.href = `https://sowonnamoo.github.io/myjs/preview?${params.toString()}`;
    };
}
window.onload = totalCal;
</script>
</body>
</html>
