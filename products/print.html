<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>견적서 출력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: none; }
            .a4-page { width: 210mm; min-height: 297mm; margin: 0; border: none !important; box-shadow: none !important; }
        }
        .a4-page {
            width: 210mm; min-height: 297mm; padding: 18mm 20mm;
            background: white; margin: 20px auto; border: 1px solid #e5e7eb;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex; flex-direction: column;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="a4-page" id="printable">
        <div class="flex-grow">

            <!-- 헤더 -->
            <div class="flex items-start justify-between border-b-4 border-gray-800 pb-6 mb-8">
                <div>
                    <h1 class="text-4xl font-bold tracking-widest text-gray-900">견 적 서</h1>
                    <p class="text-xs text-gray-400 mt-1 tracking-widest">QUOTATION</p>
                </div>
                <div class="text-right text-sm text-gray-600 leading-relaxed">
                    <p>견적번호 <span id="print-quote-no" class="font-medium text-gray-800 ml-1"></span></p>
                    <p>발행일자 <span id="print-date" class="font-medium text-gray-800 ml-1"></span></p>
                </div>
            </div>

            <!-- 주문 옵션 요약 -->
            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 mb-2 border-l-4 border-gray-800 pl-2">주문 내역</h2>
                <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-sm bg-gray-50 rounded-md p-5">
                    <div><span class="text-gray-500">상품명</span><span id="print-product-name" class="font-semibold text-gray-900 ml-2"></span></div>
                    <div><span class="text-gray-500">규격</span><span id="print-size" class="font-semibold text-gray-900 ml-2"></span></div>
                    <div class="col-span-2"><span class="text-gray-500">선택 옵션</span><span id="print-options" class="text-gray-800 ml-2"></span></div>
                    <div class="col-span-2"><span class="text-gray-500">후가공</span><span id="print-finishings" class="text-gray-800 ml-2"></span></div>
                    <div><span class="text-gray-500">수량</span><span id="print-qty" class="font-semibold text-gray-900 ml-2"></span></div>
                    <div><span class="text-gray-500">예상 무게</span><span id="print-weight" class="font-semibold text-gray-900 ml-2"></span></div>
                </div>
            </div>

            <!-- 금액 표 -->
            <h2 class="text-sm font-bold text-gray-700 mb-2 border-l-4 border-gray-800 pl-2">금액 내역</h2>
            <table class="w-full border-collapse border border-gray-800 mb-8 table-fixed text-sm">
                <thead class="bg-gray-100">
                    <tr class="h-12">
                        <th class="border border-gray-800 p-2">품목</th>
                        <th class="border border-gray-800 p-2">규격</th>
                        <th class="border border-gray-800 p-2">수량(건수)</th>
                        <th class="border border-gray-800 p-2">공급가</th>
                        <th class="border border-gray-800 p-2">부가세</th>
                        <th class="border border-gray-800 p-2">합계</th>
                    </tr>
                </thead>
                <tbody id="print-tbody"></tbody>
                <tfoot>
                    <tr class="h-14 bg-gray-50 font-bold">
                        <td colspan="5" class="border border-gray-800 p-2 text-right pr-4">최종 합계 (VAT 포함)</td>
                        <td class="border border-gray-800 p-2 text-center text-lg" id="print-final-total"></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="text-center text-xs text-gray-400 border-t pt-4">
            본 견적서는 웹사이트에서 선택하신 옵션 기준으로 자동 생성되었으며, 실제 결제 금액과 다를 수 있습니다.
        </div>
    </div>

    <script>
        function esc(s) {
            return String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
        }

        const params = new URLSearchParams(window.location.search);
        const product = params.get('product') || "제품명 미상";
        const options = params.get('options') || "";
        const finishings = params.get('finishings') || "";
        const size = params.get('size') || "-";
        const qty = params.get('qty') || "0";
        const count = params.get('count') || "1";
        const weight = params.get('weight') || "-";

        const finalPrice = parseInt(params.get('price'), 10) || 0;
        const supply = Math.round(finalPrice / 1.1);
        const tax = finalPrice - supply;

        document.getElementById('print-product-name').textContent = product;
        document.getElementById('print-size').textContent = size;
        document.getElementById('print-options').textContent = options || "-";
        document.getElementById('print-finishings').textContent = finishings || "선택안함";
        document.getElementById('print-qty').textContent = `${qty}매 x ${count}건`;
        document.getElementById('print-weight').textContent = weight || "-";

        document.getElementById('print-tbody').innerHTML = `
            <tr class="h-12 text-center">
                <td class="border border-gray-800 p-2">${esc(product)}</td>
                <td class="border border-gray-800 p-2">${esc(size)}</td>
                <td class="border border-gray-800 p-2">${esc(qty)}매 x ${esc(count)}건</td>
                <td class="border border-gray-800 p-2">${supply.toLocaleString()}</td>
                <td class="border border-gray-800 p-2">${tax.toLocaleString()}</td>
                <td class="border border-gray-800 p-2 font-bold">${finalPrice.toLocaleString()}원</td>
            </tr>`;

        document.getElementById('print-final-total').textContent = `${finalPrice.toLocaleString()}원`;

        const now = new Date();
        document.getElementById('print-date').textContent = now.toLocaleDateString('ko-KR');
        const quoteNo = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
        document.getElementById('print-quote-no').textContent = quoteNo;

        window.onload = () => { setTimeout(window.print, 500); };
    </script>
</body>
</html>
