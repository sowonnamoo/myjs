<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 옵션 관리자</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        /* control-box 클래스에 스타일을 통합하여 동일한 레이아웃을 갖게 합니다 */
        .control-box { border: 1px solid #ccc; padding: 20px; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 8px; width: 100%; box-sizing: border-box; }
        button { padding: 10px; background: #2b7bc3; color: white; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>01명함</h2>
    
    <!-- 새 옵션 저장 영역 -->
    <div class="control-box">
        <select id="targetCategory">
            <option value="myeong_paper">용지</option>
            <option value="myeong_ink">편집</option>
            <option value="myeong_bg">후가공</option>
        </select>
        <input type="text" id="nameInput" placeholder="옵션 이름 (예: 유포지)">
        <input type="text" id="priceInput" placeholder="가격 또는 URL (예: 9000 또는 http://...)">
        <input type="number" id="costMarginInput" placeholder="원가마진율 (%) (예: 50)">
        <input type="number" id="marginInput" placeholder="개별 마진율 (%) (예: 0.1)">
        <input type="number" id="deliveryInput" placeholder="배송일 숫자만 입력 (예: 3)">
        <input type="number" id="weightInput" placeholder="종이 무게 (g/㎡) (예: 90)">
        <input type="text" id="imageUrlInput" placeholder="이미지 URL 주소 (옵션)">
        <button id="saveBtn">새 옵션 추가 저장</button>
    </div>

    <!-- 공식 환경설정 영역 (control-box 클래스 추가) -->
    <div class="control-box">
        <h3>공식 환경설정</h3>
        <input type="number" id="base500" placeholder="기본가">
        <input type="number" id="areaRate" placeholder="면적요율">
        <input type="number" id="marginRate" placeholder="마진율 (%)">
        <button id="saveBaseConfigBtn">공식 설정 저장</button>
    </div>

    <script type="module">
        // ... (이전과 동일한 JavaScript 로직)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
            authDomain: "ecogr-636c6.firebaseapp.com",
            projectId: "ecogr-636c6",
            storageBucket: "ecogr-636c6.firebasestorage.app",
            messagingSenderId: "95745358447",
            appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. 새 옵션 저장
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const category = document.getElementById('targetCategory').value;
            const name = document.getElementById('nameInput').value;
            const costMargin = parseFloat(document.getElementById('costMarginInput').value) || 0;
            const priceInputVal = document.getElementById('priceInput').value;
            const isUrl = priceInputVal.toLowerCase().startsWith('http');
            const rawMargin = document.getElementById('marginInput').value;
            const margin = rawMargin !== "" ? parseFloat(rawMargin) : 0;
            const delivery = document.getElementById('deliveryInput').value; 
            
            if (!name) { alert("이름을 입력하세요."); return; }

            try {
                const productRef = doc(db, "products", category);
                const weight = document.getElementById('weightInput').value;
                const optionData = { 
                    name, 
                    price: isUrl ? 0 : (parseInt(priceInputVal) || 0),
                    weight: weight || 90,
                    url: isUrl ? priceInputVal : "", 
                    imageUrl: document.getElementById('imageUrlInput').value,
                    margin: margin, 
                    costMargin: costMargin,
                    createdAt: new Date() 
                };
                
                if (delivery.trim() !== "") {
                    optionData.delivery = delivery;
                }

                await setDoc(productRef, { options: arrayUnion(optionData) }, { merge: true });
                alert(name + " 저장 완료!");
                
                document.getElementById('nameInput').value = '';
                document.getElementById('priceInput').value = '';
                document.getElementById('marginInput').value = '';
                document.getElementById('deliveryInput').value = '';
            } catch (e) { alert("저장 실패: " + e.message); }
        });

        // 2. 공식 환경설정 저장
        document.getElementById('saveBaseConfigBtn').addEventListener('click', async () => {
            const base500 = parseInt(document.getElementById('base500').value);
            const areaRate = parseFloat(document.getElementById('areaRate').value);
            const marginRate = parseFloat(document.getElementById('marginRate').value);
            
            if (isNaN(base500) || isNaN(areaRate) || isNaN(marginRate)) { 
                alert("모든 값을 입력하세요."); 
                return; 
            }
            
            try {
                await setDoc(doc(db, "products", "myeong_price2"), { 
                    base500, 
                    areaRate, 
                    marginRate 
                }, { merge: true });
                
                alert("공식 환경설정이 myeong_price2에 저장되었습니다!");
            } catch (e) { 
                alert("저장 실패: " + e.message); 
            }
        });
    </script>
</body>
</html>
