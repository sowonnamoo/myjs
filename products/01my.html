<script>
function setTab(el) {
    // 1. 탭 버튼 색상 변경 (클릭한 탭만 회색으로 활성화 표시)
    const tabs = el.parentElement.children;
    for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.background = "white";
        tabs[i].style.color = "#333";
    }
    el.style.background = "#999";
    el.style.color = "white";

    // 2. '제품정보/제품상세보기'는 회색 박스만 그쪽으로 옮기고, 화면은 맨 위(제품 이미지/옵션 영역)로 이동
    if (el.textContent.includes("제품정보")) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }

    // 3. 나머지 탭은 기존처럼 하단으로 이동
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });
}

// ---- 상세페이지 펼치기/접기 ----
// #detailExpandInner 안에 실제로 글이나 사진이 작성되어 있을 때만 버튼을 보여줍니다.
// (아직 내용을 못 넣은 상품은 빈 버튼이 덩그러니 떠 있지 않도록 버튼 자체를 숨김)
document.addEventListener('DOMContentLoaded', function () {
    const btnWrap = document.getElementById('detailExpandBtnWrap');
    const btn = document.getElementById('detailExpandBtn');
    const content = document.getElementById('detailExpandContent');
    const inner = document.getElementById('detailExpandInner');
    const arrow = document.getElementById('detailExpandArrow');
    if (!btn || !content || !inner || !btnWrap) return;

    const hasText = inner.textContent.trim().length > 0;
    const hasImage = Array.from(inner.querySelectorAll('img')).some(img => (img.getAttribute('src') || '').trim().length > 0);

    if (!hasText && !hasImage) {
        // 작성된 내용이 없으면 버튼과 내용 영역 자체를 렌더링하지 않음
        btnWrap.style.display = 'none';
        content.style.display = 'none';
        return;
    }

    btn.addEventListener('click', function () {
        const isOpen = content.style.display === 'block';
        if (isOpen) {
            content.style.display = 'none';
            arrow.textContent = '▼';
            btn.firstChild.textContent = '상품 상세정보 펼쳐보기 ';
        } else {
            content.style.display = 'block';
            arrow.textContent = '▲';
            btn.firstChild.textContent = '상품 상세정보 접기 ';
        }
    });
});

// ---- 모바일 커스텀 셀렉트 피커 (긴 옵션 목록에서 완료 버튼이 안 보이던 문제 해결) ----
// 네이티브 select의 "이전/다음" 툴바 대신, 하단에서 올라오는 목록 + 완료 버튼으로 대체한다.
// 실제 선택 처리는 원래의 <select>에 그대로 반영하고 'change' 이벤트를 그대로 발생시키므로
// 기존 가격계산/url이동 등의 로직은 전혀 손대지 않아도 그대로 동작한다.
function isMobileViewport() {
    return window.matchMedia('(max-width: 768px)').matches;
}

function openCustomSelectModal(selectEl) {
    if (selectEl.disabled || !selectEl.options.length) return;

    // 실제 select는 "완료"를 눌렀을 때만 바꾼다. 그 전까지는 화면에서만
    // 미리보기로 표시되는 "임시 선택값(pendingIndex)"으로 다루고,
    // 완료를 누르지 않고 닫으면(바깥 탭/닫기 버튼) 이 임시값은 그냥 버려진다.
    // -> 예전에는 목록에서 항목을 탭하는 즉시 실제 select 값을 바꿔버려서,
    //    완료를 안 누르고 닫아도 내부적으로는 값이 바뀐 채로 남아있었고,
    //    그 상태에서 가격만 갱신 안 된 것처럼 보이는 불일치가 있었음.
    let pendingIndex = selectEl.selectedIndex;

    const overlay = document.createElement('div');
    overlay.className = 'custom-select-overlay';

    const card = document.createElement('div');
    card.className = 'custom-select-card';

    const titleBar = document.createElement('div');
    titleBar.className = 'custom-select-title';
    const titleText = document.createElement('span');
    const labelEl = selectEl.closest('.option-row')?.querySelector('.label');
    titleText.textContent = labelEl ? labelEl.textContent.trim() : '옵션 선택';
    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'custom-select-close';
    closeBtn.textContent = '✕';
    closeBtn.setAttribute('aria-label', '닫기');
    titleBar.appendChild(titleText);
    titleBar.appendChild(closeBtn);

    const list = document.createElement('div');
    list.className = 'custom-select-list';

    Array.from(selectEl.options).forEach((opt, idx) => {
        const item = document.createElement('div');
        item.className = 'custom-select-item' + (idx === pendingIndex ? ' selected' : '');
        item.textContent = opt.textContent;
        item.addEventListener('click', () => {
            list.querySelectorAll('.custom-select-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            pendingIndex = idx; // 아직 실제 select에는 반영하지 않음 (미리보기만)
        });
        list.appendChild(item);
    });

    function closeModal() {
        overlay.remove();
        document.body.style.overflow = '';
    }

    const doneBtn = document.createElement('button');
    doneBtn.type = 'button';
    doneBtn.className = 'custom-select-done-btn';
    doneBtn.textContent = '완료';
    doneBtn.addEventListener('click', () => {
        selectEl.selectedIndex = pendingIndex; // 완료를 눌렀을 때만 실제로 반영
        closeModal();
        selectEl.dispatchEvent(new Event('change', { bubbles: true }));
    });

    const footer = document.createElement('div');
    footer.className = 'custom-select-footer';
    footer.appendChild(doneBtn);

    card.appendChild(titleBar);
    card.appendChild(list);
    card.appendChild(footer);
    overlay.appendChild(card);

    // 바깥(어두운 배경) 탭 또는 닫기(X) 버튼 -> 선택 반영 없이 취소
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
    });
    closeBtn.addEventListener('click', closeModal);

    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden'; // 시트가 떠 있는 동안 뒤 배경 스크롤 방지

    const selectedEl = list.querySelector('.custom-select-item.selected');
    if (selectedEl) selectedEl.scrollIntoView({ block: 'center' });
}

// select를 감싸서, 모바일에서는 탭 시 네이티브 피커 대신 커스텀 모달을 띄운다.
// (PC에서는 오버레이가 pointer-events:none 이라 기존 select 동작 그대로 유지됨)
window.enableMobileCustomPicker = function(selectEl) {
    if (!selectEl || selectEl.dataset.customPickerEnabled) return;
    selectEl.dataset.customPickerEnabled = '1';

    const wrap = document.createElement('div');
    wrap.className = 'select-wrap';
    selectEl.parentNode.insertBefore(wrap, selectEl);
    wrap.appendChild(selectEl);

    const overlayBtn = document.createElement('div');
    overlayBtn.className = 'select-tap-overlay';
    wrap.appendChild(overlayBtn);

    overlayBtn.addEventListener('click', () => {
        if (!isMobileViewport()) return;
        openCustomSelectModal(selectEl);
    });
};
</script>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
        authDomain: "ecogr-636c6.firebaseapp.com",
        projectId: "ecogr-636c6",
        storageBucket: "ecogr-636c6.firebasestorage.app",
        messagingSenderId: "95745358447",
        appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ---- 이 상품(01my)의 Firestore 문서. 페이지 진입 시 딱 1번만 불러와 여기에 보관합니다. ----
    const PRODUCT_ID = "01my";
    let productData = { productId: PRODUCT_ID, options: [] };

    // ---- 가격/화면 계산 관련 참고사항 (중요) ----
    // 어드민 스키마(그룹 안에 여러 품목, 품목마다 price/margin/surcharge/weight/delivery)까지는
    // 엑셀·문서 구조로 명확했지만, "규격 마진율(margin)"과 "비규격 추가마진율(surcharge)"을
    // 실제로 어떻게 합산하는지, 비규격(options01) 가격을 표준가와 어떻게 섞는지는
    // 원본 엑셀 메모가 서로 다른 말을 하고 있어 100% 확정된 공식이 아닙니다.
    // 아래는 최대한 합리적으로 구성한 기본 공식입니다. 실제 매장 가격과 비교해보시고
    // 다르면 알려주세요 — calculatePrice() 함수만 고치면 됩니다.
    //   1) 그룹별로 선택한 품목의 price × (1 + margin%/100) 을 더합니다.
    //   2) '비규격사이즈'를 선택한 경우에는 surcharge를 추가로 곱합니다: × (1 + surcharge)
    //   3) 매수(options00)에 설정된 배수(multiplier)를 곱합니다.
    //   4) 후가공(다중 선택 그룹)도 동일하게 더하고, 서브옵션(색상 등) 추가금액을 더합니다.
    //   5) 비규격사이즈를 선택하면 options01(베이스가격 × 배수 × 면적비율)을 추가로 더합니다.
    //   6) 건수(count)를 곱해 최종금액을 100원 단위로 반올림합니다.

    function findGroupById(id) {
        return productData.options.find(o => o.id === id);
    }
    function isFinishingGroup(g) {
        return (g.title || "").includes("후가공");
    }
    // finishing-select의 서브옵션(색상 등) select를 찾는다. 모바일에서는 둘 다
    // .select-wrap으로 감싸져 있을 수 있으므로 부모가 아니라 같은 .option-row
    // 안에서 찾아야 정확하다.
    function getFinishingSubSelect(sel) {
        const row = sel.closest('.option-row') || sel.parentElement;
        return row ? row.querySelector('.finishing-sub-select') : null;
    }
    function valueGroups() {
        return productData.options.filter(o => Array.isArray(o.values));
    }
    function normalGroups() {
        return valueGroups().filter(g => !isFinishingGroup(g));
    }
    function finishingGroup() {
        return valueGroups().find(isFinishingGroup) || null;
    }
    function qtyConfig() {
        return findGroupById("options00");
    }
    function customConfig() {
        return findGroupById("options01");
    }
    function standardSizeConfig() {
        return findGroupById("options02");
    }
    // ---- 상세페이지 하단 글/사진은 이제 HTML(#detailExpandInner)에 직접 작성되어 있어
    // 별도의 렌더링 함수가 필요 없습니다. ----
    // 입력한 가로/세로가 등록된 규격 사이즈 목록(options02)과 일치하는지 확인 (가로/세로 뒤바뀐 경우도 인정)
    function isMatchingStandardSize(w, h) {
        const g = standardSizeConfig();
        if (!g || !Array.isArray(g.sizes)) return false;
        return g.sizes.some(s => {
            const sw = parseFloat(s.width), sh = parseFloat(s.height);
            return (sw === w && sh === h) || (sw === h && sh === w);
        });
    }

    // ---- 옵션 <option> 하나 생성 (품목 데이터를 dataset에 그대로 실어둠) ----
    function buildOptionEl(v) {
        const el = document.createElement("option");
        el.value = v.name;
        el.textContent = v.name;
        el.dataset.price = v.price ?? 0;
        el.dataset.margin = v.margin ?? 0;
        el.dataset.surcharge = v.surcharge ?? 0;
        el.dataset.weight = v.weight ?? 0;
        el.dataset.delivery = v.delivery ?? 0;
        el.dataset.url = v.url ?? "";
        el.dataset.imageUrl = v.imageUrl ?? "";
        el.dataset.nextPageUrl = v.nextPageUrl ?? "";
        el.dataset.priorityNextPageUrl = v.priorityNextPageUrl ?? "";
        if (Array.isArray(v.subOptions) && v.subOptions.length) {
            el.dataset.subOptions = JSON.stringify(v.subOptions);
        }
        return el;
    }

    // ---- ① 일반 옵션 그룹(용지 등) 렌더링 ----
    function renderOptionGroups() {
        const container = document.getElementById("dynamicOptionsContainer");
        container.innerHTML = "";
        normalGroups().forEach(g => {
            const row = document.createElement("div");
            row.className = "option-row";
            row.innerHTML = `<div class="label">${g.title || g.id}</div><select class="group-select" style="flex:1" data-group-id="${g.id}"></select>`;
            const select = row.querySelector("select");
            (g.values || []).forEach(v => select.appendChild(buildOptionEl(v)));
            container.appendChild(row);
        });

        // 새로 만들어진 select들에 이벤트 연결
        container.querySelectorAll("select").forEach(sel => {
            window.enableMobileCustomPicker(sel);
            sel.addEventListener("change", (e) => {
                const selectedOpt = e.target.options[e.target.selectedIndex];
                if (selectedOpt && selectedOpt.dataset.imageUrl) {
                    updateMainImage(selectedOpt.dataset.imageUrl);
                }
                if (selectedOpt && selectedOpt.dataset.url && selectedOpt.dataset.url.startsWith("http")) {
                    openOnce(selectedOpt.dataset.url);
                }
                updatePrice();
            });
        });
    }

    // ---- ② 후가공(다중 선택) 렌더링 ----
    function loadFinishingOptions(selectElement) {
        selectElement.innerHTML = '<option value="" data-price="0">선택안함</option>';
        const g = finishingGroup();
        if (!g) return;
        (g.values || []).forEach(v => selectElement.appendChild(buildOptionEl(v)));
    }

    function buildSubOptionSelect(finishingSelect) {
        // finishingSelect는 모바일에서 enableMobileCustomPicker에 의해 .select-wrap
        // (select + 탭 오버레이)으로 감싸져 있을 수 있다. 서브옵션(색상 등) select를
        // "afterend"로 넣을 기준점은 finishingSelect 자신이 아니라 이 바깥 wrap이어야 한다.
        // 그렇지 않으면 새 서브옵션 select가 메인 select의 오버레이 영역 안쪽에 갇혀서,
        // 탭을 해도 전부 메인 후가공 select 쪽 모달이 열리고 서브옵션 자체는 선택이
        // 안 되는 문제가 생긴다 (금박 색상 선택 등 추가옵션이 모바일에서 안 먹히는 버그).
        const anchor = finishingSelect.closest('.select-wrap') || finishingSelect;
        const row = anchor.parentElement; // .option-row

        // 이미 있으면 (모바일 피커용 래퍼까지 포함해서) 완전히 제거 후 다시 생성.
        // row 전체에서 찾아야 위 문제로 엉뚱한 곳에 들어간 예전 서브옵션도 확실히 제거된다.
        const old = row ? row.querySelector(".finishing-sub-select") : null;
        if (old) {
            const oldWrap = old.closest('.select-wrap');
            if (oldWrap && oldWrap !== anchor) {
                oldWrap.remove();
            } else {
                old.remove();
            }
        }

        const opt = finishingSelect.options[finishingSelect.selectedIndex];
        if (!opt || !opt.dataset.subOptions) return;

        const subOptions = JSON.parse(opt.dataset.subOptions);
        const subSelect = document.createElement("select");
        subSelect.className = "finishing-sub-select finishing-btn";
        subSelect.style.marginLeft = "5px";
        subSelect.style.flex = "0 0 130px";
        subSelect.style.width = "130px";
        subOptions.forEach(so => {
            const el = document.createElement("option");
            el.value = so.color;
            el.textContent = so.priceExtra ? `${so.color} (+${so.priceExtra.toLocaleString()}원)` : so.color;
            el.dataset.priceExtra = so.priceExtra || 0;
            subSelect.appendChild(el);
        });
        subSelect.addEventListener("change", updatePrice);
        anchor.insertAdjacentElement("afterend", subSelect); // wrap 바로 뒤, row의 직계 자식으로 삽입
        window.enableMobileCustomPicker(subSelect);
        // enableMobileCustomPicker가 subSelect를 flex:1짜리 .select-wrap div로 감싸는데,
        // 그대로 두면 메인 후가공 select(flex:1)와 폭을 나눠 가지면서 계속 좁아집니다.
        // 래퍼 폭을 subSelect가 원래 갖던 고정폭(130px)으로 고정합니다.
        const subWrap = subSelect.parentElement;
        if (subWrap && subWrap.classList.contains("select-wrap")) {
            subWrap.classList.add("finishing-sub-wrap");
            subWrap.style.marginLeft = "5px";
            subSelect.style.marginLeft = "0";
        }
    }

    function setupFinishingListener(selectElement) {
        selectElement.addEventListener("change", (e) => {
            const selectedOpt = e.target.options[e.target.selectedIndex];
            buildSubOptionSelect(selectElement);

            const hasUrl = selectedOpt && selectedOpt.dataset.url && selectedOpt.dataset.url.startsWith("http");
            if (hasUrl) {
                openOnce(selectedOpt.dataset.url);
            }
            updatePrice();
            updateDeliveryDisplay();
        });
    }

    document.getElementById("addFinishingBtn").addEventListener("click", () => {
        const container = document.getElementById("finishingContainer");
        const newRow = document.createElement("div");
        newRow.className = "option-row";
        newRow.innerHTML = `
            <div class="label">후가공 추가</div>
            <select class="finishing-select" style="flex:1 1 90px; min-width:90px;"><option value="">선택안함</option></select>
            <button type="button" class="finishing-btn" onclick="this.parentElement.remove(); window.updatePrice();">삭제</button>
        `;
        container.appendChild(newRow);

        const newSelect = newRow.querySelector(".finishing-select");
        loadFinishingOptions(newSelect);
        setupFinishingListener(newSelect);
        window.enableMobileCustomPicker(newSelect);
    });

    function openOnce(url) {
        if (window.isOpening) return;
        window.isOpening = true;
        window.open(url, "_blank");
        setTimeout(() => { window.isOpening = false; }, 500);
    }

    // ---- ③ 매수/배수 (options00) ----
    function loadQtySelect() {
        const qtySelect = document.getElementById("qtySelect");
        qtySelect.innerHTML = "";
        const q = qtyConfig();
        if (q && Array.isArray(q.quantities) && q.quantities.length) {
            q.quantities.forEach((qty, i) => {
                const el = document.createElement("option");
                el.value = qty;
                el.textContent = `${qty}매`;
                el.dataset.multi = q.multipliers && q.multipliers[i] !== undefined ? q.multipliers[i] : 1;
                qtySelect.appendChild(el);
            });
        } else {
            const el = document.createElement("option");
            el.value = 500;
            el.textContent = "500매";
            el.dataset.multi = 1;
            qtySelect.appendChild(el);
        }
    }

    // ---- ④ 비규격 설정 (options01) : 사이즈 입력 범위에 반영 ----
    function applyCustomConfigToInputs() {
        const c = customConfig();
        const wIn = document.getElementById("widthInput");
        const hIn = document.getElementById("heightInput");
        if (c) {
            wIn.min = c.widthMin;
            wIn.max = c.widthMax;
            hIn.min = c.heightMin;
            hIn.max = c.heightMax;
        }
    }

    // ---- ⑤ 규격 사이즈 목록 (options02) : sizeList select 채우기 ----
    function loadSizeList() {
        const sizeList = document.getElementById("sizeList");
        sizeList.innerHTML = "";
        const g = standardSizeConfig();
        if (g && Array.isArray(g.sizes) && g.sizes.length > 0) {
            g.sizes.forEach(s => {
                const el = document.createElement("option");
                el.value = `${s.width},${s.height}`;
                el.textContent = `${s.width}x${s.height} mm`;
                sizeList.appendChild(el);
            });
        } else {
            const el = document.createElement("option");
            el.value = "";
            el.textContent = "등록된 규격사이즈 없음";
            sizeList.appendChild(el);
        }
    }

    function updateMainImage(imageUrl) {
        if (!imageUrl || imageUrl.trim() === "") return;
        const mainImg = document.getElementById("mainProductImage");
        const bottomImg = document.getElementById("bottomProductImage");
        if (mainImg) mainImg.src = imageUrl;
        if (bottomImg) bottomImg.style.backgroundImage = `url("${imageUrl}")`;
    }

    // ---- ⑤ 가격/무게/납기 계산 ----
    function updatePrice() {
        const qtySelect = document.getElementById("qtySelect");
        const qtyOpt = qtySelect.options[qtySelect.selectedIndex];
        const qtyFactor = qtyOpt ? (parseFloat(qtyOpt.dataset.multi) || 1) : 1;
        const count = parseInt(document.getElementById("setCountInput").value) || 1;

        const sizeType = document.getElementById("sizeType").value;
        const isCustom = sizeType === "custom";
        const w = parseFloat(document.getElementById("widthInput").value) || 0;
        const h = parseFloat(document.getElementById("heightInput").value) || 0;

        // 비규격을 선택했더라도 입력한 사이즈가 등록된 규격 사이즈(options02)와 똑같으면
        // 규격사이즈와 동일한 가격으로 계산합니다.
        const matchesStandard = isCustom && isMatchingStandardSize(w, h);
        const useStandardPricing = !isCustom || matchesStandard;

        let sum = 0;
        let totalWeight = 0;
        let totalDeliveryDays = 0;
        const summary = [];

        // 일반 옵션 그룹
        // - 규격사이즈(또는 규격과 같은 사이즈의 비규격): 선택한 품목의 price(원가) × (1+margin) × 매수배수 를 더합니다.
        // - 진짜 비규격사이즈: 품목 가격은 쓰지 않고, 아래 "options01 기준 추가 비용"만으로 계산합니다.
        //   (무게·배송일은 규격/비규격 상관없이 선택한 옵션 값을 그대로 반영합니다)
        document.querySelectorAll("#dynamicOptionsContainer select").forEach(sel => {
            const opt = sel.options[sel.selectedIndex];
            if (!opt) return;
            const price = parseFloat(opt.dataset.price) || 0;
            const margin = parseFloat(opt.dataset.margin) || 0;
            const weight = parseFloat(opt.dataset.weight) || 0;
            const delivery = parseFloat(opt.dataset.delivery) || 0;

            if (useStandardPricing) {
                sum += price * (1 + margin / 100) * qtyFactor;
            }

            totalWeight += weight;
            if (!isNaN(delivery)) totalDeliveryDays += delivery;
            if (opt.value) summary.push(opt.textContent);
        });

        // 후가공(다중 선택) - 규격/비규격 상관없이 항상 더합니다.
        document.querySelectorAll(".finishing-select").forEach(sel => {
            const opt = sel.options[sel.selectedIndex];
            if (!opt || !opt.value) return;
            const price = parseFloat(opt.dataset.price) || 0;
            const margin = parseFloat(opt.dataset.margin) || 0;
            const delivery = parseFloat(opt.dataset.delivery) || 0;

            let itemPrice = price * (1 + margin / 100) * qtyFactor;

            const subSelect = getFinishingSubSelect(sel);
            let label = opt.value;
            if (subSelect && subSelect.value) {
                const subOpt = subSelect.options[subSelect.selectedIndex];
                itemPrice += (parseFloat(subOpt.dataset.priceExtra) || 0) * qtyFactor;
                label = `${opt.value}(${subOpt.value})`;
            }

            sum += itemPrice;
            if (!isNaN(delivery)) totalDeliveryDays += delivery;
            summary.push(label);
        });

        // 비규격사이즈 가격 (options01 기준) - 등록된 규격 사이즈와 일치하지 않을 때만 적용
        // - 가로/세로가 최소값(widthMin × heightMin)일 때는 basePrice 그대로.
        // - 그보다 커지면, 면적이 커진 비율만큼 multiplier를 곱해 할증합니다.
        //   예) basePrice 4000, multiplier 1.5, 최소사이즈 50×50 선택 → 4000원.
        //       면적이 2배가 되면 → 4000 × (1 + 1×1.5) = 10000원.
        // - 규격사이즈와 동일하게 매수(options00) 배수도 곱해줍니다.
        // - 그룹에서 선택한 품목마다 다른 surcharge(비규격 추가마진율)를 반영해서,
        //   같은 사이즈라도 "명함"과 "명함 양면"처럼 품목이 다르면 가격도 달라지게 합니다.
        const c = customConfig();
        if (isCustom && !matchesStandard && c) {
            const clampedW = Math.min(Math.max(w, c.widthMin), c.widthMax);
            const clampedH = Math.min(Math.max(h, c.heightMin), c.heightMax);
            const refArea = (c.widthMin || 1) * (c.heightMin || 1);
            const areaRatio = refArea > 0 ? (clampedW * clampedH) / refArea : 1;
            const growth = Math.max(0, areaRatio - 1) * (c.multiplier || 1);
            let customBase = (c.basePrice || 0) * (1 + growth) * qtyFactor;

            let surchargeSum = 0;
            document.querySelectorAll("#dynamicOptionsContainer select").forEach(sel => {
                const opt = sel.options[sel.selectedIndex];
                if (opt) surchargeSum += parseFloat(opt.dataset.surcharge) || 0;
            });
            customBase *= (1 + surchargeSum / 100);

            sum += customBase;
        }

        // 후가공 중복 선택 방지
        const finishingValues = [];
        let hasDuplicateFinishing = false;
        document.querySelectorAll(".finishing-select").forEach(sel => {
            if (!sel.value) return;
            if (finishingValues.includes(sel.value)) hasDuplicateFinishing = true;
            finishingValues.push(sel.value);
        });

        const summaryEl = document.getElementById("selectedOptionsSummary");
        if (hasDuplicateFinishing) {
            summaryEl.innerHTML = '<span style="color:red; font-size:16px; font-weight:700;">동일한 후가공을 중복 선택할 수 없습니다.</span>';
            document.getElementById("priceDisplay").textContent = "0원";
            return;
        }

        // 무게 표시 (면적 × 평량 × 매수 × 건수)
        const weightDisplay = document.getElementById("weightDisplay");
        if (totalWeight > 0) {
            const totalWeightKg = ((w * h) / 1000000) * (totalWeight / 1000) * (parseInt(qtySelect.value) || 0) * count;
            weightDisplay.textContent = totalWeightKg < 1 ? Math.round(totalWeightKg * 1000) + "g" : totalWeightKg.toFixed(2) + "kg";
        } else {
            weightDisplay.textContent = "0kg";
        }

        summary.push(`가로 ${w}mm × 세로 ${h}mm`);
        summary.push(`${qtySelect.value || 0}매`);
        summary.push(`${count}건`);
        summaryEl.textContent = summary.filter(Boolean).join(" + ");

        // 100원 단위로 반올림하면 소수점 끝자리가 50 이상일 때 위로 올라가서
        // 실제 계산값보다 최대 100원 더 비싸게 보일 수 있어 내림으로 처리합니다.
        const finalPrice = Math.floor((sum * count) / 100) * 100;
        document.getElementById("priceDisplay").textContent = finalPrice.toLocaleString() + "원";

        updateDeliveryDisplayFromDays(totalDeliveryDays);
    }
    window.updatePrice = updatePrice;

    function updateDeliveryDisplayFromDays(totalDeliveryDays) {
        const display = document.getElementById("deliveryDisplay");
        if (totalDeliveryDays > 0) {
            const dateStr = calculateDeliveryDate(totalDeliveryDays);
            display.innerHTML = `<span style="color:blue; font-weight:bold;">${dateStr}</span> 발송 예정`;
        } else {
            display.textContent = "1박2일";
        }
    }
    // 사이즈/후가공 변경 등 가격과 무관하게 납기만 다시 계산하고 싶을 때 쓰던 이름을 유지
    function updateDeliveryDisplay() { updatePrice(); }

    // ---- 사이즈(규격/비규격) 처리 ----
    const sizeType = document.getElementById("sizeType");
    const sizeList = document.getElementById("sizeList");
    const wIn = document.getElementById("widthInput");
    const hIn = document.getElementById("heightInput");
    const workW = document.getElementById("workWidthInput");
    const workH = document.getElementById("workHeightInput");

    function updateSizeMode() {
        const isCustom = sizeType.value === "custom";
        wIn.disabled = !isCustom;
        hIn.disabled = !isCustom;
        sizeList.disabled = isCustom;

        let w = parseFloat(wIn.value) || 0;
        let h = parseFloat(hIn.value) || 0;

        if (!isCustom) {
            const [svW, svH] = (sizeList.value || "0,0").split(",");
            w = parseFloat(svW) || 0;
            h = parseFloat(svH) || 0;
            wIn.value = w;
            hIn.value = h;
        }

        workW.value = w + 2;
        workH.value = h + 2;
        updatePrice();
    }

    function validateSize(input, min, max, defaultVal) {
        const val = parseFloat(input.value);
        if (isNaN(val) || val < min || val > max) {
            alert(`설정할 수 없는 사이즈입니다. \n가로: ${wIn.min}mm, 세로: ${hIn.min}mm부터 입력 가능합니다.`);
            input.value = defaultVal;
        }
        workW.value = parseFloat(wIn.value) + 2;
        workH.value = parseFloat(hIn.value) + 2;
        updatePrice();
    }

    sizeType.addEventListener("change", updateSizeMode);
    sizeList.addEventListener("change", updateSizeMode);
    wIn.addEventListener("blur", () => {
        const c = customConfig();
        const min = c ? c.widthMin : 60, max = c ? c.widthMax : 500;
        setTimeout(() => validateSize(wIn, min, max, min), 100);
    });
    hIn.addEventListener("blur", () => {
        const c = customConfig();
        const min = c ? c.heightMin : 50, max = c ? c.heightMax : 500;
        setTimeout(() => validateSize(hIn, min, max, min), 100);
    });
    document.getElementById("setCountInput").addEventListener("input", updatePrice);

    // ---- 초기 로드: Firestore에서 01my 문서를 딱 1번만 불러옵니다 (SEO/상세내용도 이 문서 안에 함께 있음) ----
    async function loadProductAndInit() {
        const snap = await getDoc(doc(db, "products", PRODUCT_ID));
        productData = snap.exists() ? snap.data() : { productId: PRODUCT_ID, options: [] };
        if (!Array.isArray(productData.options)) productData.options = [];

        renderOptionGroups();

        // 첫 옵션(그룹)의 첫 제품 이미지를 기본값(맨 밑 배경)으로 바로 반영
        const firstSelect = document.querySelector("#dynamicOptionsContainer select");
        if (firstSelect && firstSelect.options.length > 0) {
            const firstOpt = firstSelect.options[0];
            if (firstOpt.dataset.imageUrl) updateMainImage(firstOpt.dataset.imageUrl);
        }

        loadQtySelect();
        applyCustomConfigToInputs();
        loadSizeList();
        loadFinishingOptions(document.querySelector(".finishing-select"));
        setupFinishingListener(document.querySelector(".finishing-select"));

        updateSizeMode();
        updatePrice();

        window.enableMobileCustomPicker(document.getElementById("qtySelect"));
        window.enableMobileCustomPicker(document.getElementById("sizeList"));
        window.enableMobileCustomPicker(document.querySelector(".finishing-select"));
    }

    loadProductAndInit();

    // ---- 주문하기: 다음 페이지로 선택 옵션 전달 ----
    window.handleOrder = function () {
        // 동일한 후가공을 중복 선택한 상태면 다음 페이지로 이동하지 않고 경고만 띄웁니다.
        const finishingValuesCheck = [];
        let hasDuplicateFinishingCheck = false;
        document.querySelectorAll(".finishing-select").forEach(sel => {
            if (!sel.value) return;
            if (finishingValuesCheck.includes(sel.value)) hasDuplicateFinishingCheck = true;
            finishingValuesCheck.push(sel.value);
        });
        if (hasDuplicateFinishingCheck) {
            alert("동일한 후가공을 중복 선택할 수 없습니다. 다시 확인해주세요.");
            return;
        }

        const count = document.getElementById("setCountInput").value;
        const width = document.getElementById("widthInput").value;
        const height = document.getElementById("heightInput").value;
        const price = document.getElementById("priceDisplay").textContent;
        const qty = document.getElementById("qtySelect").value;

        // 무게 추출 (kg 단위 통일)
        const weightText = document.getElementById("weightDisplay").textContent;
        let weightValue = 0;
        if (weightText.includes("kg")) {
            weightValue = parseFloat(weightText);
        } else if (weightText.includes("g")) {
            weightValue = parseFloat(weightText) / 1000;
        }

        // 그룹별 선택값 (그룹 id를 키로 사용 - 관리자 스키마와 이름을 맞춤)
        const groupSelections = {};
        let combinedGroupText = "";
        let nextPageUrl = ""; // 선택된 옵션 중 "다음페이지 이동 URL"이 입력된 것이 있으면 여기에 담김
        let priorityNextPageUrl = ""; // 선택된 옵션 중 "최우선 다음페이지 이동 URL"이 입력된 것이 있으면 여기에 담김
        document.querySelectorAll("#dynamicOptionsContainer select").forEach(sel => {
            const opt = sel.options[sel.selectedIndex];
            const groupId = sel.dataset.groupId;
            if (opt && groupId) {
                groupSelections[groupId] = opt.value;
                combinedGroupText += (combinedGroupText ? " " : "") + opt.value;
            }
            if (!nextPageUrl && opt && opt.dataset.nextPageUrl && opt.dataset.nextPageUrl.startsWith("http")) {
                nextPageUrl = opt.dataset.nextPageUrl;
            }
            if (!priorityNextPageUrl && opt && opt.dataset.priorityNextPageUrl && opt.dataset.priorityNextPageUrl.startsWith("http")) {
                priorityNextPageUrl = opt.dataset.priorityNextPageUrl;
            }
        });

        // 후가공 목록 추출 (색상 등 서브옵션이 선택되어 있으면 "이름(서브옵션)" 형태로 함께 담음)
        const finishings = [];
        document.querySelectorAll(".finishing-select").forEach(sel => {
            if (sel.value) {
                const subSelect = getFinishingSubSelect(sel);
                const subValue = subSelect ? subSelect.value : "";
                finishings.push(subValue ? `${sel.value}(${subValue})` : sel.value);
            }
            const fOpt = sel.options[sel.selectedIndex];
            if (!nextPageUrl && fOpt && fOpt.dataset.nextPageUrl && fOpt.dataset.nextPageUrl.startsWith("http")) {
                nextPageUrl = fOpt.dataset.nextPageUrl;
            }
            if (!priorityNextPageUrl && fOpt && fOpt.dataset.priorityNextPageUrl && fOpt.dataset.priorityNextPageUrl.startsWith("http")) {
                priorityNextPageUrl = fOpt.dataset.priorityNextPageUrl;
            }
        });

        // 주의: URLSearchParams가 값들을 알아서 인코딩해줍니다. 여기서 encodeURIComponent를
        // 미리 씌우면 이중 인코딩이 되어버리므로 절대 추가하지 마세요.
        // 이 구조 덕분에 다음페이지 쪽에서는 특별한 디코딩 없이 그냥
        //   const params = new URLSearchParams(location.search);
        //   const options = JSON.parse(params.get('options'));
        //   const price = params.get('price');
        //   const finishings = params.get('finishings'); // "후가공1,후가공2" 형태의 일반 문자열
        // 처럼 표준적인 방법으로만 꺼내 쓰면 됩니다. (다음페이지가 바뀌어도 이 부분은 그대로 유지)
        const params = new URLSearchParams({
            productId: "01my",
            options: JSON.stringify(groupSelections),
            qty: qty,
            count: count,
            width: width,
            height: height,
            price: price,
            weight: weightValue,
            finishings: finishings.join(",")
        }).toString();

        // 선택된 옵션에 "다음페이지 이동 URL"이 입력되어 있을 때만, 선택한 모든 옵션 쿼리를 붙여
        // 새 창이 아닌 현재 창(self)에서 그 URL로 이동합니다. 입력되지 않았으면 아무 동작도 하지 않습니다.
        // 여러 선택된 옵션의 URL이 서로 달라 충돌하는 경우, "최우선 다음페이지 이동 URL"이 있는 쪽을 우선합니다.
        const finalNextUrl = priorityNextPageUrl || nextPageUrl;
        if (finalNextUrl) {
            window.location.href = `${finalNextUrl}?${params}`;
        }
    };
</script>

<script>
    fetch('../includes/header.html')
        .then(r => r.text())
        .then(d => {
            const container = document.getElementById('header-container');
            container.innerHTML = d;

            // 추가: 불러온 HTML 내의 모든 <script> 태그를 찾아서 재실행

<div id="footer-container"></div>

<script>
    fetch('../includes/footer.html')
        .then(r => r.text())
        .then(d => {
            const container = document.getElementById('footer-container');
            container.innerHTML = d;

            // 푸터 내부에 포함된 스크립트가 있다면 재실행
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
            });
        });
</script>
