/* 모바일 최적화 미디어 쿼리 */
@media (max-width: 768px) {
    /* 1. 상단 제품 정보 및 옵션 전체 컨테이너 정렬 */
    .product-container {
        flex-direction: column !important;
        width: 100% !important;
        padding: 0 10px !important; /* 좌우 10px 여백 추가 */
        box-sizing: border-box !important; /* 패딩이 너비에 포함되도록 설정 */
    }
    
    #mainProductImage {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1 / 1;
    }

    /* 2. 하단 상세 영역 정렬 */
    div[style*="width: 1195px"] {
        width: 100% !important;
        padding: 0 10px !important; /* 좌우 10px 여백 추가 */
        box-sizing: border-box !important;
    }

    /* 3. 하단 상세 이미지 정렬 */
    #bottomProductImage {
        width: 100% !important;
        height: auto !important; 
        aspect-ratio: 1 / 1;
    }
    
    /* 4. 탭 버튼 영역 좌우 정렬 보정 */
    div[style*="border:1px solid #ccc; text-align:center;"] {
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* 5. 후가공선택 줄: 모바일에서도 무조건 한 줄 유지 */
    #finishingContainer .option-row {
        flex-wrap: nowrap !important;
    }
    #finishingContainer .label {
        flex-shrink: 0;
    }
    #finishingContainer .finishing-select {
        min-width: 0;
        flex: 1 1 0;
    }
    .finishing-btn {
        padding: 5.4px 8px;
        font-size: 11px;
    }
}

/* ---- 모바일 커스텀 셀렉트 피커 (네이티브 select 툴바 대체) ---- */
.select-wrap {
    position: relative;
    flex: 1;
    display: flex;
}
.select-wrap select {
    flex: 1;
    width: 100%;
}
.select-tap-overlay {
    position: absolute;
    inset: 0;
    background: transparent;
    pointer-events: none;
}
@media (max-width: 768px) {
    .select-tap-overlay {
        pointer-events: auto;
        cursor: pointer;
    }
}
.custom-select-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    display: flex;
    align-items: flex-end;
}
.custom-select-sheet {
    width: 100%;
    max-height: 70vh;
    background: #fff;
    border-radius: 14px 14px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.custom-select-title {
    padding: 14px 16px 8px;
    font-size: 14px;
    font-weight: bold;
    color: #666;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
}
.custom-select-list {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 0;
}
.custom-select-item {
    padding: 14px 18px;
    font-size: 15px;
    color: #333;
    border-bottom: 1px solid #f2f2f2;
}
.custom-select-item.selected {

    color: #007AFF;

}
.custom-select-done-btn {

    background: #007AFF;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

<script>
function setTab(el) {
    // 1. 클릭한 탭이 '제품정보'를 포함하고 있다면 바로 종료 (아무것도 안 함)
    if (el.textContent.includes("제품정보")) {
        return;
    }

    // 2. 탭 버튼 색상 변경
    const tabs = el.parentElement.children;
    for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.background = "white";
        tabs[i].style.color = "#333";
    }
    el.style.background = "#999";
    el.style.color = "white";

    // 3. 아래로 이동 (나머지 탭들만 작동)
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });
}

// ---- 모바일 커스텀 셀렉트 피커 (긴 옵션 목록에서 완료 버튼이 안 보이던 문제 해결) ----
// 네이티브 select의 "이전/다음" 툴바 대신, 하단에서 올라오는 목록 + 완료 버튼으로 대체한다.
// 실제 선택 처리는 원래의 <select>에 그대로 반영하고 'change' 이벤트를 그대로 발생시키므로
// 기존 가격계산/url이동 등의 로직은 전혀 손대지 않아도 그대로 동작한다.
function isMobileViewport() {
    return window.matchMedia('(max-width: 768px)').matches;
}

function openCustomSelectModal(selectEl) {
    if (selectEl.disabled || !selectEl.options.length) return;

    const overlay = document.createElement('div');
    overlay.className = 'custom-select-overlay';

    const sheet = document.createElement('div');
    sheet.className = 'custom-select-sheet';

    const list = document.createElement('div');
    list.className = 'custom-select-list';

    Array.from(selectEl.options).forEach((opt, idx) => {
        const item = document.createElement('div');
        item.className = 'custom-select-item' + (idx === selectEl.selectedIndex ? ' selected' : '');
        item.textContent = opt.textContent;
        item.addEventListener('click', () => {
            list.querySelectorAll('.custom-select-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            selectEl.selectedIndex = idx;
        });
        list.appendChild(item);
    });

    const doneBtn = document.createElement('button');
    doneBtn.type = 'button';
    doneBtn.className = 'custom-select-done-btn';
    doneBtn.textContent = '완료';
    doneBtn.addEventListener('click', () => {
        overlay.remove();
        selectEl.dispatchEvent(new Event('change', { bubbles: true }));
    });

    sheet.appendChild(doneBtn);
    sheet.appendChild(list);
    overlay.appendChild(sheet);

    // 바깥(어두운 배경) 탭하면 선택 반영 없이 닫기
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });

    document.body.appendChild(overlay);

    const selectedEl = list.querySelector('.custom-select-item.selected');
    if (selectedEl) selectedEl.scrollIntoView({ block: 'center' });
}

// select를 감싸서, 모바일에서는 탭 시 네이티브 피커 대신 커스텀 모달을 띄운다.
// (PC에서는 오버레이가 pointer-events:none 이라 기존 select 동작 그대로 유지됨)
window.enableMobileCustomPicker = function(selectEl) {
    if (!selectEl || selectEl.dataset.customPickerEnabled) return;
    selectEl.dataset.customPickerEnabled = '1';

    const wrap = document.createElement('div');
    wrap.className = 'select-wrap';
    selectEl.parentNode.insertBefore(wrap, selectEl);
    wrap.appendChild(selectEl);

    const overlayBtn = document.createElement('div');
    overlayBtn.className = 'select-tap-overlay';
    wrap.appendChild(overlayBtn);

    overlayBtn.addEventListener('click', () => {
        if (!isMobileViewport()) return;
        openCustomSelectModal(selectEl);
    });
};
</script>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzHogA2iaQ...",
        authDomain: "ecogr-636c6.firebaseapp.com",
        projectId: "ecogr-636c6",
        storageBucket: "ecogr-636c6.appspot.com",
        messagingSenderId: "95745358447",
        appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let priceConfigCache = null;
    let finishingOptionsCache = null;

    async function loadAllOptions() {
        const optionConfigs = [
            { id: "paperSelect", docId: "myeong_paper" },
            { id: "inkSelect", docId: "myeong_ink" },
        ];

        for (const config of optionConfigs) {
            const docSnap = await getDoc(doc(db, "products", config.docId));
            if (docSnap.exists()) {
                const select = document.getElementById(config.id);
                if (!select) continue;
                select.innerHTML = '';
                
                docSnap.data().options.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt.name;
                    el.textContent = opt.name;
                    el.dataset.price = opt.price || 0;
                    el.dataset.margin = opt.margin || 0;
                    el.dataset.url = opt.url || "";
                    el.dataset.imageUrl = opt.imageUrl || ""; 
                    el.dataset.costMargin = opt.costMargin || 0;
                    el.dataset.delivery = opt.delivery || 0; 
                    el.dataset.weight = opt.weight || 0; 
                    select.appendChild(el);
                });
            }
        }

        const sizeType = document.getElementById('sizeType');
        const sizeList = document.getElementById('sizeList');
        const wIn = document.getElementById('widthInput');
        const hIn = document.getElementById('heightInput');

        sizeType.addEventListener('change', () => {
            const isCustom = sizeType.value === 'custom';
            wIn.disabled = !isCustom;
            hIn.disabled = !isCustom;
            sizeList.disabled = isCustom;
            if (!isCustom) {
                const [w, h] = sizeList.value.split(',');
                wIn.value = w; hIn.value = h;
                updatePrice();
            }
        });

        sizeList.addEventListener('change', () => {
            const [w, h] = sizeList.value.split(',');
            wIn.value = w; hIn.value = h;
            updatePrice();
        });

        updatePrice();

        setTimeout(() => {
            const firstSelect = document.querySelector('select');
            if (firstSelect && firstSelect.options.length > 0) {
                const firstOpt = firstSelect.options[0];
                if (firstOpt.dataset.imageUrl) {
                    updateMainImage(firstOpt.dataset.imageUrl);
                }
            }
            updateDeliveryDisplay(); 
        }, 500);
    }

// 기존 updateMainImage 함수를 아래 내용으로 교체하세요
function updateMainImage(imageUrl) {
    if (!imageUrl || imageUrl.trim() === "") return;
    
    const mainImg = document.getElementById('mainProductImage');
    const bottomImg = document.getElementById('bottomProductImage');
    
    // 메인 상단 이미지 URL 업데이트
    if (mainImg) mainImg.src = imageUrl;
    
    // 하단 상세 이미지 업데이트 (기존 방식 유지)
    if (bottomImg) bottomImg.style.backgroundImage = `url("${imageUrl}")`;
}

    // 중략 없이 모든 파이어베이스 용지/편집 옵션 마진 및 할증 공식이 복구된 가격 산출 함수
   async function updatePrice() {
    if (!priceConfigCache) {
        const configSnap = await getDoc(doc(db, "products", "myeong_price2"));
        if (!configSnap.exists()) return;
        priceConfigCache = configSnap.data();
    }

    const { base500, areaRate, marginRate } = priceConfigCache;
    const w = parseFloat(document.getElementById('widthInput').value) || 0;
    const h = parseFloat(document.getElementById('heightInput').value) || 0;
    
    const qtySelect = document.getElementById('qtySelect');
    const qty = parseInt(qtySelect.value) || 500;
    const count = parseInt(document.getElementById('setCountInput').value) || 1;
    
    // 수량에 따른 배율 확보
    const qtyFactor = parseFloat(qtySelect.options[qtySelect.selectedIndex].dataset.multi) || 1;

    // 용지 무게 계산
    const paperSelect = document.getElementById('paperSelect');
    const weightDisplay = document.getElementById('weightDisplay');
    let paperWeight = 0;
    if (paperSelect && paperSelect.options[paperSelect.selectedIndex]) {
        paperWeight = parseFloat(paperSelect.options[paperSelect.selectedIndex].dataset.weight) || 0;
    }

    if (paperWeight > 0) {
        const totalWeightKg = ((w * h) / 1000000) * (paperWeight / 1000) * qty * count;
        weightDisplay.textContent = totalWeightKg < 1 ? Math.round(totalWeightKg * 1000) + 'g' : totalWeightKg.toFixed(2) + 'kg';
    } else {
        weightDisplay.textContent = '0kg';
    }

    // 기본 인쇄비 계산
    let calcW = w, calcH = h;
    const currentSizeType = document.getElementById('sizeType').value;
    if (currentSizeType === 'custom' && ((w <= 90 && h <= 50) || (w <= 50 && h <= 90))) {
        calcW = 90; calcH = 50;
    }

    const area = areaRate * calcW * calcH;
    const margin = 1 + (marginRate / 100);
    let finalPrice = (area * margin) * qtyFactor;

    // 옵션 및 후가공비 합산 (qtyFactor를 곱하여 수량 비례 적용)
    let optionPriceSum = 0;
    document.querySelectorAll('select').forEach(sel => {
        if (sel.selectedIndex >= 0) {
            const selectedOpt = sel.options[sel.selectedIndex];
            const p = parseFloat(selectedOpt.dataset.price) || 0;
            const cm = parseFloat(selectedOpt.dataset.costMargin) || 0;
            const m = parseFloat(selectedOpt.dataset.margin) || 0;
            
            if (sel.classList.contains('finishing-select')) {
                if (p > 0) optionPriceSum += (p * (1 + (cm / 100))) * qtyFactor;
            } else if (sel.id !== 'sizeType' && sel.id !== 'sizeList' && sel.id !== 'qtySelect') {
                let priceWithCostMargin = p * (1 + (cm / 100));
                if (selectedOpt.value.includes('양면') && currentSizeType === 'custom') priceWithCostMargin *= 2.9;
                optionPriceSum += (priceWithCostMargin * (1 + (m / 100))) * qtyFactor;
            }
        }
    });

    // 규격 사이즈 할인 적용
    if (currentSizeType === 'standard') {
        const inkValue = document.getElementById('inkSelect').value;
        finalPrice = Math.round(finalPrice * (inkValue.includes('양면') ? 0.6 : 0.5));
    }

    // 최종 합산 (인쇄비/옵션비 각각 건수 곱함)
    finalPrice = Math.round(((finalPrice * count) + (optionPriceSum * count)) / 100) * 100;



// [수정/추가] 하단 선택 옵션 서머리 문자열 구성 및 출력
    const summary = [];
    const paper = document.getElementById('paperSelect');
    if (paper && paper.selectedIndex >= 0) summary.push(paper.options[paper.selectedIndex].text);
    
    const ink = document.getElementById('inkSelect');
    if (ink && ink.selectedIndex >= 0) summary.push(ink.options[ink.selectedIndex].text);
    
    summary.push(`가로 ${w}mm × 세로 ${h}mm`);
    summary.push(`${qty}매`);
    summary.push(`${count}건`);

    document.querySelectorAll('.finishing-select').forEach(sel => {
        if (sel.value) summary.push(sel.value);
    });

    // 후가공 중복 방지 검증
    const finishingValues = [];
    let hasDuplicateFinishing = false;
    document.querySelectorAll('.finishing-select').forEach(sel => {
        if (!sel.value) return;
        if (finishingValues.includes(sel.value)) hasDuplicateFinishing = true;
        finishingValues.push(sel.value);
    });

    const summaryEl = document.getElementById('selectedOptionsSummary');
    if (hasDuplicateFinishing) {
        summaryEl.innerHTML = '<span style="color:red">동일한 후가공을 중복 선택할 수 없습니다.</span>';
        document.getElementById('priceDisplay').textContent = "0원";
        return;
    }

    summaryEl.textContent = summary.filter(Boolean).join(' + ');
    document.getElementById('priceDisplay').textContent = finalPrice.toLocaleString() + '원';
}

        sel.addEventListener('change', (e) => {

// 후가공 선택 시 새 창 열기 및 가격 업데이트 로직
function setupFinishingListener(selectElement) {
    selectElement.addEventListener('change', (e) => {
        const selectedOpt = e.target.options[e.target.selectedIndex];
        
        // URL이 존재하는지 확인
        const hasUrl = selectedOpt && selectedOpt.dataset.url && selectedOpt.dataset.url.startsWith('http');
        
        if (hasUrl) {
            // 1. URL이 있는 경우: 새 창 열기 및 부모 창 새로고침
            if (!window.isOpening) {
                window.isOpening = true;
                window.open(selectedOpt.dataset.url, '_blank');
                setTimeout(() => { window.isOpening = false; }, 500);
            }
            window.location.reload(); 
        } else {
            // 2. URL이 없는 경우: 새로고침 없이 가격 계산만 수행
            updatePrice();
            updateDeliveryDisplay();
        }
    });
}

window.handleOrder = function() {
    // 1. 데이터 수집
    const paper = document.getElementById('paperSelect').value;
    const ink = document.getElementById('inkSelect').value;
    const qty = document.getElementById('qtySelect').value;
    const count = document.getElementById('setCountInput').value;
    const width = document.getElementById('widthInput').value;
    const height = document.getElementById('heightInput').value;
    const price = document.getElementById('priceDisplay').textContent;

    // 2. 무게 추출 (kg 단위 통일)
    const weightText = document.getElementById('weightDisplay').textContent;
    let weightValue = 0;
    if (weightText.includes('kg')) {
        weightValue = parseFloat(weightText);
    } else if (weightText.includes('g')) {
        weightValue = parseFloat(weightText) / 1000;
    }

    // 3. 후가공 목록 추출
    const finishings = [];
    document.querySelectorAll('.finishing-select').forEach(sel => {
        if (sel.value && sel.value !== "선택안함") finishings.push(sel.value);
    });

    // 4. 파라미터 생성 (한글 깨짐 방지 encodeURIComponent 적용)
    const params = new URLSearchParams({
        paper: encodeURIComponent(paper),
        ink: encodeURIComponent(ink),
        qty: qty,
        count: count,
        width: width,
        height: height,
        price: encodeURIComponent(price),
        weight: weightValue,
        finishings: encodeURIComponent(finishings.join(','))
    }).toString();

    // 5. URL 분기
    let targetUrl = "";
    if (ink.includes("즉시인쇄")) {
        targetUrl = "/myjs/includes/ecopro1";
    } else if (ink.includes("셀프인쇄")) {
        targetUrl = "/myjs/includes/ecopro2";
    } else {
        targetUrl = "/myjs/includes/ecopro2";
    }

    // 6. 새 창 열기
    window.open(`${targetUrl}?${params}`, '_blank');
}
