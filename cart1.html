<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCP TEST ORDER</title>

<script src="https://testspay.kcp.co.kr/plugin/kcp_spay_hub.js"></script>
</head>

<body>

<h2>주문 (테스트 10원)</h2>

<input id="name" placeholder="이름">
<input id="phone" placeholder="전화">
<input id="address" placeholder="주소">

<div>결제금액: 10원</div>

<button onclick="goPay()">카드결제</button>

<form name="order_info" method="post">

<input type="hidden" name="site_cd" value="T0000">
<input type="hidden" name="pay_method" value="CARD">
<input type="hidden" name="currency" value="410">

<input type="hidden" name="ordr_idxx">
<input type="hidden" name="good_name" value="TEST PRODUCT">
<input type="hidden" name="good_mny" value="10">

<input type="hidden" name="Ret_URL" value="https://YOUR_DOMAIN/success.html">

</form>

<script>
function goPay(){

const id = crypto.randomUUID();

document.order_info.ordr_idxx.value = id;

KCP_Pay_Execute_Web(document.order_info);

}
</script>

</body>
</html>
