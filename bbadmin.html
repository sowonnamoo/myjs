<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배송 관리자 페이지</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        .box { margin: 0 auto; padding: 20px; border: 1px solid #ddd; width: 350px; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #03c75a; color: white; }
    </style>
</head>
<body>

    <div class="box">
        <h3>운송장 정보 등록</h3>
        <input type="text" id="phone" placeholder="전화번호 (예: 01012345678)">
        <input type="text" id="url" placeholder="운송장 URL">
        <button onclick="saveData()">저장하기</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDU8d6ShVNtgLYEQZeyms88G-TDNnRd2aA",
    authDomain: "board-291e3.firebaseapp.com",
    projectId: "board-291e3",
    storageBucket: "board-291e3.firebasestorage.app",
    messagingSenderId: "25881766316",
    appId: "1:25881766316:web:c03e118cf26d3fff11b209"
  };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. 페이지 접속 시 자동 삭제 실행
        window.onload = async () => {
            const now = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(now.getDate() - 30);
            const dateString = thirtyDaysAgo.toISOString().split('T')[0];

            const q = query(collection(db, 'woonso'), where("date", "<", dateString));
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((document) => {
                deleteDoc(doc(db, 'woonso', document.id));
            });
        };

        // 2. 데이터 저장 함수
        window.saveData = async () => {
            const phoneVal = document.getElementById('phone').value;
            const urlVal = document.getElementById('url').value;
            
            if(!phoneVal || !urlVal) { 
                alert('전화번호와 URL을 모두 입력해주세요.'); 
                return; 
            }

            try {
                await addDoc(collection(db, 'woonso'), {
                    phone: phoneVal,
                    url: urlVal,
                    date: new Date().toISOString().split('T')[0]
                });
                alert('저장 완료!');
                document.getElementById('phone').value = '';
                document.getElementById('url').value = '';
            } catch (e) {
                alert('저장 실패: ' + e.message);
            }
        };
    </script>
</body>
</html>
