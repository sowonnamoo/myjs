<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; background-color: #f9f9f9; }
        .controls { margin-bottom: 10px; padding: 10px; background: #eee; border-radius: 8px; }
        button { padding: 8px 12px; cursor: pointer; }
        .save-btn { background-color: #4CAF50; color: white; border: none; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <select id="weightSelect">
            <option value="Thin">Thin</option>
            <option value="ExtraLight">ExtraLight</option>
            <option value="Light">Light</option>
            <option value="Regular">Regular</option>
            <option value="Medium">Medium</option>
            <option value="SemiBold">SemiBold</option>
            <option value="Bold">Bold</option>
            <option value="ExtraBold">ExtraBold</option>
            <option value="Black">Black</option>
        </select>
        <button onclick="addText()">글자 추가(벡터 변환)</button>
        <button class="save-btn" onclick="saveAsSVG()">SVG로 저장</button>
    </div>

    <canvas id="c" width="800" height="400"></canvas>

    <script>
        const canvas = new fabric.Canvas('c');

        // 텍스트 추가 함수
        async function addText() {
            const text = document.getElementById('textInput').value;
            const weight = document.getElementById('weightSelect').value;

            if (!text) { alert('텍스트를 입력하세요!'); return; }

            try {
                const response = await fetch('https://myeongserver.onrender.com/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, weight })
                });

                if (!response.ok) throw new Error('서버 통신 실패');
                
                const data = await response.json();

                const path = new fabric.Path(data.pathData, {
                    left: 100, 
                    top: 100, 
                    fill: 'black',
                    selectable: true
                });
                canvas.add(path);
                canvas.renderAll();
            } catch (error) {
                console.error(error);
                alert('폰트 변환 중 오류가 발생했습니다.');
            }
        }

        // SVG 저장 함수
        function saveAsSVG() {
            const svgData = canvas.toSVG();
            const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'my-business-card.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
