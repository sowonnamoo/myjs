<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="controls">

        <button onclick="saveSVG('front')" style="background-color: #4CAF50; color: white;">앞면 저장</button>
<button onclick="saveSVG('back')" style="background-color: #4CAF50; color: white;">뒷면 저장</button>

        
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <select id="weightSelect">
          <option value="Thin">Thin</option>
    <option value="ExtraLight">ExtraLight</option>
    <option value="Light">Light</option>
    <option value="Regular">Regular</option>
    <option value="Medium">Medium</option>
    <option value="SemiBold">SemiBold</option>
    <option value="Bold">Bold</option>
    <option value="ExtraBold">ExtraBold</option>
    <option value="Black">Black</option>
        </select>
        <button onclick="addText()">글자 추가(벡터 변환 요청)</button>
    </div>
    <canvas id="c" width="800" height="400"></canvas>

  <script>
    const canvas = new fabric.Canvas('c');

    async function addText() {
        // 1. 입력창과 선택창에서 값 가져오기
        const text = document.getElementById('textInput').value;
        const weight = document.getElementById('weightSelect').value; // id를 weightSelect로 수정

        // 2. 서버로 요청 보내기
        const response = await fetch('https://myeongserver.onrender.com/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }, // 이게 있어야 서버가 인식합니다!
            body: JSON.stringify({ text: text, weight: weight }) // "내 이름" 대신 입력한 text를 전달
        });

        const data = await response.json();

        // 3. 서버에서 받은 Path 데이터로 캔버스에 그리기
        const path = new fabric.Path(data.pathData, {
            left: 100, 
            top: 100, 
            fill: 'black'
        });
        canvas.add(path);
    }

    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `business-card-${side}.svg`;
    link.click();
}





      
</script>
</body>
</html>
