<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>완성형 벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 10px; padding: 15px; background: #eee; border-radius: 8px; }
        canvas { border: 2px solid #333; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <select id="weightSelect">
            <option value="Thin">Thin</option>
            <option value="ExtraLight">ExtraLight</option>
            <option value="Light">Light</option>
            <option value="Regular">Regular</option>
            <option value="Medium">Medium</option>
            <option value="SemiBold">SemiBold</option>
            <option value="Bold">Bold</option>
            <option value="ExtraBold">ExtraBold</option>
            <option value="Black">Black</option>
        </select>
        <button onclick="addVectorText()" style="background-color: #2196F3; color: white;">벡터로 추가</button>
        <button onclick="saveAsSVG()" style="background-color: #4CAF50; color: white;">SVG 저장</button>
        <button onclick="deleteObject()" style="background-color: #f44336; color: white;">삭제</button>
    </div>

    <canvas id="c" width="800" height="400"></canvas>

    <script>
        const canvas = new fabric.Canvas('c');

        // 서버에서 벡터 데이터 받아와서 캔버스에 추가
        async function addVectorText() {
            const text = document.getElementById('textInput').value;
            const weight = document.getElementById('weightSelect').value;
            if (!text) return alert("텍스트를 입력하세요!");

            try {
                const response = await fetch('https://myeongserver.onrender.com/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, weight })
                });

                const data = await response.json();
                
                // 서버에서 받은 데이터를 기반으로 Path 생성
                const path = new fabric.Path(data.pathData, {
                    left: 100,
                    top: 100,
                    fill: 'black',
                    strokeWidth: 0
                });
                
                // 여기서부터 포토샵처럼 편집 가능해짐
                canvas.add(path);
                canvas.setActiveObject(path);
                canvas.renderAll();
            } catch (err) {
                alert("서버 연결 실패: " + err.message);
            }
        }

        function saveAsSVG() {
            const svgData = canvas.toSVG();
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'business-card.svg';
            link.click();
        }

        function deleteObject() {
            canvas.remove(canvas.getActiveObject());
        }
    </script>
</body>
</html>
