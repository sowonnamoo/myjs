<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <select id="weightSelect">
            <option value="Thin">Thin</option>
            <option value="Regular">Regular</option>
            <option value="Bold">Bold</option>
            <option value="Black">Black</option>
        </select>
        <button onclick="addText()">글자 추가(벡터 변환 요청)</button>
    </div>
    <canvas id="c" width="800" height="400"></canvas>

    <script>
        const canvas = new fabric.Canvas('c');

        async function addText() {
            const text = document.getElementById('textInput').value;
            const weight = document.getElementById('weightSelect').value;

            // 1. 서버의 API 주소 (나중에 실제 서버 주소로 변경하세요)
            const response = await fetch('https://myeongserver.onrender.com/convert', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, weight })
});

            const data = await response.json();

            // 2. 서버에서 받은 Path 데이터로 캔버스에 그리기
            const path = new fabric.Path(data.pathData, {
                left: 100, top: 100, fill: 'black'
            });
            canvas.add(path);
        }
    </script>
</body>
</html>
