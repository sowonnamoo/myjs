<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="controls">

        가로(cm): <input type="number" id="canvasWidthCm" value="9" style="width: 60px;">
        세로(cm): <input type="number" id="canvasHeightCm" value="5" style="width: 60px;">
        <button onclick="updateCanvasSize()">캔버스 크기 적용</button>
        <button onclick="zoomCanvas(1.1)">확대 (+)</button>
        <button onclick="zoomCanvas(0.9)">축소 (-)</button>

        <input type="file" onchange="setBackgroundImage(this)" accept=".jpg, .jpeg, .png">
        <button onclick="saveSVG()">SVG 저장하기</button>
        <button onclick="deleteSelected()" style="background-color: #f44336; color: white;">삭제</button> 
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <button onclick="alignLeft()">좌측정렬</button>
        <button onclick="distributeVertically()">자간정렬</button>
        <button onclick="addRectangle()">사각형 추가</button>
        <button onclick="addCircle()">원 추가</button>
        <button onclick="changeFontSize(1.1)">글자 크게 (+)</button>
        <button onclick="changeFontSize(0.9)">글자 작게 (-)</button>
        
        <label for="colorPicker">색상: </label>
        <input type="color" id="colorPicker" onchange="changeColor(this.value)">

        <select id="weightSelect">
            <option value="Thin">Thin</option>
            <option value="ExtraLight">ExtraLight</option>
            <option value="Light">Light</option>
            <option value="Regular">Regular</option>
            <option value="Medium">Medium</option>
            <option value="SemiBold">SemiBold</option>
            <option value="Bold">Bold</option>
            <option value="ExtraBold">ExtraBold</option>
            <option value="Black">Black</option>
            
        </select>
        <button onclick="addText()">글자 추가(벡터 변환 요청)</button>
    </div>
    <canvas id="c" width="800" height="400"></canvas>

    <script src="myapp.js"></script>
</body>
</html>
