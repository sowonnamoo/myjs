<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>лІЎн„° лӘ…н•Ё л””мһҗмқё нҲҙ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="controls">

        <button onclick="saveSVG('front')" style="background-color: #4CAF50; color: white;">м•һл©ҙ м ҖмһҘ</button>
<button onclick="saveSVG('back')" style="background-color: #4CAF50; color: white;">л’·л©ҙ м ҖмһҘ</button>

        <button onclick="saveSVG()">SVG м ҖмһҘн•ҳкё°</button>
        
        <input type="text" id="textInput" placeholder="н…ҚмҠӨнҠё мһ…л Ҙ">
        <select id="weightSelect">
          <option value="Thin">Thin</option>
    <option value="ExtraLight">ExtraLight</option>
    <option value="Light">Light</option>
    <option value="Regular">Regular</option>
    <option value="Medium">Medium</option>
    <option value="SemiBold">SemiBold</option>
    <option value="Bold">Bold</option>
    <option value="ExtraBold">ExtraBold</option>
    <option value="Black">Black</option>
        </select>
        <button onclick="addText()">кёҖмһҗ м¶”к°Җ(лІЎн„° ліҖнҷҳ мҡ”мІӯ)</button>
    </div>
    <canvas id="c" width="800" height="400"></canvas>

  <script>
    const canvas = new fabric.Canvas('c');

    async function addText() {
        // 1. мһ…л Ҙм°Ҫкіј м„ нғқм°Ҫм—җм„ң к°’ к°Җм ёмҳӨкё°
        const text = document.getElementById('textInput').value;
        const weight = document.getElementById('weightSelect').value; // idлҘј weightSelectлЎң мҲҳм •

        // 2. м„ңлІ„лЎң мҡ”мІӯ ліҙлӮҙкё°
        const response = await fetch('https://myeongserver.onrender.com/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }, // мқҙкІҢ мһҲм–ҙм•ј м„ңлІ„к°Җ мқёмӢқн•©лӢҲлӢӨ!
            body: JSON.stringify({ text: text, weight: weight }) // "лӮҙ мқҙлҰ„" лҢҖмӢ  мһ…л Ҙн•ң textлҘј м „лӢ¬
        });

        const data = await response.json();

        // 3. м„ңлІ„м—җм„ң л°ӣмқҖ Path лҚ°мқҙн„°лЎң мә”лІ„мҠӨм—җ к·ёлҰ¬кё°
        const path = new fabric.Path(data.pathData, {
            left: 100, 
            top: 100, 
            fill: 'black'
        });
        canvas.add(path);
    }




    function saveSVG() {
    // мә”лІ„мҠӨ к°қмІҙм—җм„ң SVG лҚ°мқҙн„° м¶”м¶ң
    const svgData = canvas.toSVG();
    
    // Blob мғқм„ұ л°Ҹ лӢӨмҡҙлЎңл“ң мӢӨн–ү
    const blob = new Blob([svgData], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'my-design.svg';
    link.click();
}





      
</script>
</body>
</html>
