<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 명함 디자인 툴</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 10px; padding: 15px; background: #eee; border-radius: 8px; }
        canvas { border: 2px solid #333; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <select id="weightSelect">
            <option value="100">Thin</option>
            <option value="400">Regular</option>
            <option value="700">Bold</option>
            <option value="900">Black</option>
        </select>
        <button onclick="addVectorText()" style="background-color: #2196F3; color: white;">벡터로 추가</button>
        <button onclick="saveAsSVG()" style="background-color: #4CAF50; color: white;">SVG 저장</button>
    </div>

    <canvas id="c" width="800" height="400"></canvas>

    <script>
        const canvas = new fabric.Canvas('c');
        let font = null;

        // 1. 깃허브에서 폰트 파일 로드 (최초 1회만)
        async function initFont() {
            if (font) return;
            const fontUrl = 'https://raw.githubusercontent.com/사용자계정/저장소명/main/PretendardVariable.ttf';
            font = await opentype.load(fontUrl);
        }

        async function addVectorText() {
            await initFont(); // 폰트가 로드되어 있는지 확인
            
            const text = document.getElementById('textInput').value;
            const weight = parseInt(document.getElementById('weightSelect').value);
            
            if (!text) return alert("텍스트를 입력하세요!");

            // 2. 브라우저 CPU를 사용하여 벡터 패스 생성
            const pathData = font.getPath(text, 0, 0, 72, { weight: weight }).toPathData();

            // 3. Fabric.js 객체로 변환 및 캔버스 추가
            const path = new fabric.Path(pathData, {
                left: 100, top: 100, fill: '#000000'
            });

            canvas.add(path);
            canvas.renderAll();
        }

        function saveAsSVG() {
            const svgData = canvas.toSVG();
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'business-card.svg';
            link.click();
        }
    </script>
</body>
</html>
