<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패</title>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; padding: 40px 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #ff3b30; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        /* 버튼 스타일은 여기에 정의합니다 */
        .btn { 
            display: inline-block; 
            padding: 12px 30px; 
            background: #111; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>❌ 결제 실패</h1>
        <p>결제 중 오류가 발생했거나 취소되었습니다.<br>다시 한번 시도해 주세요.</p>
        
        <a href="index.html" class="btn">주문 페이지로 이동</a>
    </div>
</body>
</html>
