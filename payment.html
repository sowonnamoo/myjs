<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 진행</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h2 class="text-xl font-bold mb-6 text-gray-800">결제 상세정보</h2>
        
        <div class="mb-6">
            <p class="text-gray-500 text-sm">결제 예정 금액</p>
            <div id="display-price" class="text-3xl font-bold text-blue-600 mt-2">0원</div>
        </div>

        <button onclick="requestPayment()" class="w-full py-3 bg-blue-900 text-white font-bold rounded hover:bg-blue-800 transition">
            결제하기
 </button>



        

    <div class="p-3 rounded text-left text-xs text-gray-600">
            <div class="flex items-center gap-2 mb-1 text-gray-700 font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/>
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                </svg>
                <span>결제창이 뜨지 않을 때</span>
            </div>
            <p>인터넷 창 우측 상단 <strong>팝업 아이콘(차단됨)</strong>을 클릭하여 <strong>"항상 허용"</strong>으로 변경해주세요.</p>
        </div>
    </div>

 

    <script>
        // 1. URL에서 price 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const price = urlParams.get('price'); 
        const totalAmount = Number(price) || 0;

        // 화면에 금액 표시
        if (totalAmount > 0) {
            document.getElementById("display-price").innerText = totalAmount.toLocaleString() + "원";
        } else {
            alert("결제 금액을 불러올 수 없습니다.");
        }

        // 2. 결제 함수
        async function requestPayment() {
            if (totalAmount <= 0) {
                alert("유효한 결제 금액이 아닙니다.");
                return;
            }

            try {
                // 본인의 결제 설정이 담긴 워커 URL
                const WORKER_URL = "https://proud-math-2d41.ecogr.workers.dev/";
                const res = await fetch(WORKER_URL);
                const data = await res.json();

                // 포트원 결제 요청
                const response = await PortOne.requestPayment({
                    storeId: data.STORE_ID,
                    channelKey: data.CHANNEL_KEY_CARD,
                    paymentId: "PAY_" + Date.now(), // 고유 주문번호
                    orderName: "주문 상품 결제",
                    totalAmount: totalAmount,
                    currency: "KRW",
                    payMethod: "CARD"
                });

                // 결제 결과 확인
                if (response.code != null) {
                    alert("결제 실패: " + response.message);
                } else {
                    alert(totalAmount.toLocaleString() + "원이 결제되었습니다.");
                    window.close(); // 결제 완료 후 창 닫기
                }
            } catch (error) {
                console.error(error);
                alert("결제 진행 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
