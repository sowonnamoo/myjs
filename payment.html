<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
            authDomain: "ecogr-636c6.firebaseapp.com",
            projectId: "ecogr-636c6",
            storageBucket: "ecogr-636c6.firebasestorage.app",
            messagingSenderId: "95745358447",
            appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.addDoc = addDoc;
        window.collection = collection;
    </script>
    <style>
        @keyframes blink-red-black { 0% { color: #1f2937; } 50% { color: #dc2626; } 100% { color: #1f2937; } }
        .blink-text { animation: blink-red-black 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h2 class="text-xl font-bold mb-6 text-gray-800">결제 상세정보</h2>
        <div class="mb-6">
            <p class="text-gray-500 text-sm">결제 예정 금액</p>
            <div id="display-price" class="text-3xl font-bold text-blue-600 mt-2">0원</div>
        </div>
        <button onclick="requestPayment()" class="w-full py-3 bg-blue-900 text-white font-bold rounded hover:bg-blue-800 transition">결제하기</button>
        <div class="p-3 rounded text-left text-xs text-gray-600 mt-4">
            <div class="flex items-center gap-2 mb-1 font-bold blink-text"><span>카드사 선택 후 결제창이 뜨지 않을 때</span></div>
            <p>인터넷 창 우측 상단 <strong>팝업 아이콘</strong>을 클릭하여 <strong>"항상 허용"</strong>으로 변경해주세요.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const price = urlParams.get('price');
        const totalAmount = Number(price) || 0;
        document.getElementById("display-price").innerText = totalAmount.toLocaleString() + "원";

window.requestPayment = async function() {
    // 1. 데이터 가져오기 (이전 페이지에서 userPhone, totalAmount를 localStorage에 저장해두셨죠?)
    const phone = localStorage.getItem("userPhone") || "010-0000-0000"; 
    const totalAmount = Number(localStorage.getItem("totalAmount")) || 0;

    if (totalAmount <= 0) return alert("결제 금액 오류");

    try {
        const res = await fetch("https://proud-math-2d41.ecogr.workers.dev/");
        const data = await res.json();
        const paymentId = "PAY_" + Date.now();

        // 2. 결제 요청
        const response = await PortOne.requestPayment({
            storeId: data.STORE_ID,
            channelKey: data.CHANNEL_KEY_CARD,
            paymentId: paymentId,
            orderName: "주문 상품 결제",
            totalAmount: totalAmount,
            currency: "KRW",
            payMethod: "CARD"
        });

        if (response.code != null) return alert("결제 실패: " + response.message);

        // 3. 파이어베이스 저장 (전화번호, 승인번호, 카드사 정보 모두 포함!)
        await addDoc(collection(window.db, "cards1"), {
            paymentId: paymentId,
            tno: response.txId,
            amount: totalAmount,
            phone: phone, 
            approvalNumber: response.approvalNumber || "없음",
            cardCompany: response.cardName || "정보없음",
            status: "결제완료",
            createdAt: new Date().toISOString()
        });

        // 4. 성공 시 success4.html로 파라미터와 함께 이동
        window.location.href = `success4.html?tno=${response.txId}&order_no=${paymentId}&price=${totalAmount}`;
        
    } catch (error) {
        console.error(error);
        alert("결제 처리 중 오류가 발생했습니다.");
    }
}
    </script>
</body>
</html>
