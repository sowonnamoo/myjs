<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드 결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzHogA2iaUQqOOsNVL55stsdMH8lCQ4Ek",
            authDomain: "ecogr-636c6.firebaseapp.com",
            projectId: "ecogr-636c6",
            storageBucket: "ecogr-636c6.firebasestorage.app",
            messagingSenderId: "95745358447",
            appId: "1:95745358447:web:94cde53f6b36e6be95eb9a"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.addDoc = addDoc;
        window.collection = collection;
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="w-[400px] bg-white p-8 rounded-2xl shadow-lg text-center">
        <h2 class="text-xl font-bold text-gray-800 mb-6">💳 카드 결제</h2>
        <div class="text-3xl font-bold text-blue-600 mb-6" id="total-price">0원</div>
        <button onclick="goCard()" class="w-full py-4 bg-blue-900 text-white font-bold rounded-xl hover:bg-blue-800 transition">결제하기</button>
    </div>

    <script>
        const WORKER_URL = "https://proud-math-2d41.ecogr.workers.dev/";
        const total = Number(localStorage.getItem("totalAmount")) || 0;
        document.getElementById("total-price").innerText = total.toLocaleString() + "원";

        window.goCard = async function() {
            try {
                const res = await fetch(WORKER_URL);
                const data = await res.json();
                const paymentId = "PAY_" + Date.now();

                const response = await PortOne.requestPayment({
                    storeId: data.STORE_ID,
                    channelKey: data.CHANNEL_KEY_CARD,
                    paymentId: paymentId,
                    orderName: "주문상품 결제",
                    totalAmount: total,
                    currency: "KRW",
                    payMethod: "CARD"
                });

                if(response.code != null) return alert("결제 실패: " + response.message);

                await addDoc(collection(window.db, "card2"), {
                    orderId: paymentId,
                    amount: total,
                    approvalNumber: response.approvalNumber || "없음",
                    cardCompany: response.cardName || "정보없음",
                    status: "결제완료",
                    createdAt: new Date().toISOString(),
                    fullData: response
                });

                // 성공 시 success4.html로 이동!
                window.location.href = "success4.html";
            } catch(e) {
                console.error(e);
                alert("결제 오류 발생.");
            }
        }
    </script>
</body>
</html>
