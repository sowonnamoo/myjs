<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스티커 견적 계산기</title>
    <style>
        /* ... (기존 스타일 동일) ... */
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Noto Sans KR',sans-serif; }
        body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; }
        .mobile-container { width:100%; max-width:500px; background:#fff; border-radius:16px; border:3px solid #111; padding:20px; }
        .product-title { text-align:center; font-size:32px; font-weight:900; color:#e31e23; margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:18px; font-weight:900; margin-bottom:6px; }
        .form-control { width:100%; height:56px; border:2px solid #aaa; border-radius:10px; padding:0 14px; font-size:20px; font-weight:bold; outline:none; }
        .result-box { background:#fff4f4; border:1px solid #ffcaca; border-radius:12px; padding:18px; margin-top:20px; }
        .result-price { display:block; text-align:right; font-size:42px; font-weight:900; color:#e31e23; }
        .submit-btn { width:100%; height:60px; border:none; border-radius:12px; background:#1e5fa9; color:#fff; font-size:24px; font-weight:900; cursor:pointer; margin-top:20px; }
        .info-box { margin-top:20px; background:#f8fbff; border:1px solid #d5e6ff; border-radius:12px; padding:16px; font-size:14px; line-height:1.8; }
    </style>
</head>
<body>

<div class="mobile-container">
    <h1 class="product-title">스티커 견적 계산기</h1>
    
    <div class="form-group">
        <label>품명</label>
        <select id="product" class="form-control" onchange="runCalc()">
            <option value="ST001">아트지(코팅)</option>
            <option value="ST004">아트지(무무광코팅)</option>
            <option value="ST002">아트지(무광코팅)</option>
            <option value="ST003">아트지(무코팅)</option>
        </select>
    </div>

    <div class="form-group"><label>가로(mm)</label><input type="number" id="w" class="form-control" value="100" oninput="runCalc()"></div>
    <div class="form-group"><label>세로(mm)</label><input type="number" id="h" class="form-control" value="50" oninput="runCalc()"></div>
    <div class="form-group"><label>주문수량</label><input type="number" id="qty" class="form-control" value="1000" oninput="runCalc()"></div>

    <div class="result-box">
        <div class="result-sub" id="priceInfo">계산중...</div>
        <span class="result-price" id="result">0원</span>
    </div>

    <button class="submit-btn" onclick="alert('주문기능 연결예정')">주문하기</button>

    <div class="info-box">
        • 모든 금액은 부가세 포함입니다.<br>
        • 배송비 3,000원 포함 계산됩니다.
    </div>
</div>

<script>
async function runCalc() {
    const data = {
        productCode: document.getElementById('product').value,
        w: Number(document.getElementById('w').value),
        h: Number(document.getElementById('h').value),
        qty: Number(document.getElementById('qty').value)
    };

    try {
        // 서버에 계산 요청 (본인의 Workers 주소로 변경하세요)
        const response = await fetch('https://pricing-api.ecogr.workers.dev/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const res = await response.json();

        // 결과 반영
        document.getElementById('result').innerText = res.price.toLocaleString() + '원';
        document.getElementById('priceInfo').innerHTML = `
            상품 : ${res.name}<br>
            규격 : ${data.w} × ${data.h} mm<br>
            수량 : ${data.qty.toLocaleString()}매
        `;
    } catch (error) {
        console.error("계산 오류:", error);
    }
}

window.onload = runCalc;
</script>

</body>
</html>
